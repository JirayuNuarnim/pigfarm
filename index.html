<!-- เปิดเต็มจอเหมือนแอปเมื่อ "เพิ่มไปหน้าโฮม" บนมือถือ -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ฟาร์มหมู">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15212d">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');
  :root{
    --bg:#28383b; --card:#ffffff; --ink:#1b2a36; --ink-2:#3a4f61; --muted:#62748a;
    --line:#e3ece9; --line-2:#eef3f1; --brand:#1f7d6e; --brand-d:#18655a; --brand-soft:#ddf1ec;
    --ok:#1f9d62; --ok-soft:#e4f5ec; --warn:#c8932f; --warn-soft:#fdf3df;
    --bad:#d6483b; --bad-soft:#fbe7e4; --info:#2f6fd0; --info-soft:#e9f1fc;
    --coral:#e07a5f; --coral-soft:#f7ddcf; --magenta:#c95ab0; --magenta-soft:#f3e3f1;
    --soft:#f1f6f4; --app:#eaf0ee;
    --shadow-sm:0 1px 2px rgba(30,60,55,.05); --shadow:0 1px 2px rgba(30,60,55,.04),0 6px 18px rgba(30,60,55,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"IBM Plex Sans Thai",-apple-system,"Segoe UI","Sarabun","Noto Sans Thai",sans-serif;
    background:var(--app);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--info)}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  /* shell — เต็มจอ + พื้นหลังไฮเทค (กริด + แสงเรืองมุมจอ + ลายดอกจางมุมล่าง) */
  .app{max-width:none;margin:0;min-height:100vh;position:relative;
    background:
      radial-gradient(55% 38% at 88% -6%, rgba(31,125,110,.12), transparent 62%),
      radial-gradient(46% 34% at -8% 104%, rgba(43,95,168,.10), transparent 62%),
      radial-gradient(30% 22% at 50% 118%, rgba(31,125,110,.07), transparent 70%),
      linear-gradient(rgba(31,125,110,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,125,110,.05) 1px, transparent 1px),
      var(--app);
    background-size:auto,auto,auto,36px 36px,36px 36px,auto}
  .app::after{content:"";position:fixed;right:-70px;bottom:-90px;width:340px;height:340px;pointer-events:none;z-index:0;
    background-color:rgba(31,125,110,.06);-webkit-mask:var(--logoico) center/contain no-repeat;mask:var(--logoico) center/contain no-repeat}
  .topbar{position:sticky;top:0;z-index:30;background:linear-gradient(90deg,#233840 0%,#1e4a41 100%);color:#fff;
    display:flex;align-items:center;gap:10px;padding:11px 16px;box-shadow:0 6px 20px rgba(20,35,50,.14);
    border-bottom:1px solid rgba(83,234,210,.35)}
  .topbar .logo{font-weight:700;font-size:16px;letter-spacing:.2px;display:flex;align-items:center;gap:5px;white-space:nowrap;flex:none}
  .topbar .logo span{color:var(--brand)}

  .logo-ico{display:inline-block;width:1.05em;height:1.05em;vertical-align:-0.16em;background-color:currentColor;-webkit-mask:var(--logoico) center/contain no-repeat;mask:var(--logoico) center/contain no-repeat}
  .topbar .spacer{flex:1;min-width:0}
  .pill{background:rgba(255,255,255,.10);padding:5px 11px;border-radius:999px;font-size:12.5px;display:flex;gap:6px;align-items:center;border:1px solid rgba(255,255,255,.08);white-space:nowrap}
  .pill b{font-weight:600}
  .linkbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:#fff;
    padding:6px 12px;border-radius:9px;font-size:13px;transition:background .12s;white-space:nowrap;flex:none}
  .linkbtn:hover{background:rgba(255,255,255,.14)}
  /* จอมือถือแคบ: ย่อแถบบนให้พอดี ไม่ให้วันที่/ปุ่ม "ออก" ตกบรรทัดหรือถูกตัด */
  @media(max-width:440px){
    .topbar{gap:6px;padding:9px 10px}
    .topbar .logo{font-size:13.5px;gap:3px}
    .pill{padding:4px 8px;font-size:11px;gap:4px}
    .userPill{max-width:96px}
    .linkbtn{padding:5px 9px;font-size:12px}
    #datePill{display:none}        /* ป้ายวันที่ซ้ำกับหัวข้อทุกหน้า → ซ่อนบนจอแคบ เปิดที่ให้ปุ่ม "ออก" ไม่ถูกตัด */
  }
  .content{padding:18px 20px 96px;max-width:1500px;margin:0 auto;position:relative;z-index:1}
  @media(max-width:600px){.content{padding:18px 14px 96px}}
  h2.page{margin:6px 0 0;font-size:22px;font-weight:700;letter-spacing:-.01em;position:relative;padding-bottom:8px}
  h2.page::after{content:"";position:absolute;left:0;bottom:0;width:44px;height:3.5px;border-radius:99px;background:linear-gradient(90deg,var(--brand),#3fb8a6)}
  .sub{color:var(--muted);font-size:13px;margin:5px 0 16px;line-height:1.5}

  /* ===== UI-LIFT: ไอคอน SVG ในชิปไล่สี + การ์ดเมนูแบบกดง่าย ===== */
  .mi{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;display:block}
  .icochip{position:relative;flex:0 0 auto;width:54px;height:54px;display:flex;align-items:center;justify-content:center;border-radius:16px;color:#fff}
  .chip-a{background:linear-gradient(135deg,#2a9d8a,#17655a);box-shadow:0 4px 12px rgba(31,125,110,.30)}
  .chip-b{background:linear-gradient(135deg,#4f8ede,#2b5fa8);box-shadow:0 4px 12px rgba(47,111,208,.28)}
  .chip-c{background:linear-gradient(135deg,#e8926f,#c85f38);box-shadow:0 4px 12px rgba(224,122,95,.30)}
  .chip-d{background:linear-gradient(135deg,#c96fb4,#9d3f88);box-shadow:0 4px 12px rgba(201,90,176,.28)}
  .chip-e{background:linear-gradient(135deg,#5d6b8f,#39435f);box-shadow:0 4px 12px rgba(70,80,110,.28)}
  .mrow{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;background:var(--card,#fff);border:1px solid var(--line);border-radius:18px;padding:15px 16px;box-shadow:0 2px 10px rgba(20,35,50,.06);transition:transform .1s,box-shadow .12s,border-color .12s}
  .mrow:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(20,35,50,.12);border-color:rgba(31,125,110,.45)}
  .mrow:active{transform:scale(.985)}
  .mrow .t{font-weight:800;font-size:16px;color:var(--ink)}
  .mrow .d{color:var(--muted);font-size:12.5px;margin-top:2px;line-height:1.4}
  .gobtn{flex:0 0 auto;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:999px;background:var(--brand-soft);color:var(--brand)}
  .gobtn .mi{width:20px;height:20px;stroke-width:2.6}
  .gfull{position:fixed!important;inset:0;z-index:120;border-radius:0!important;margin:0!important;display:flex;flex-direction:column}
  body.gfullmode .topbar{z-index:0} /* ตอนเต็มจอ: กดแถบบนแอปลงใต้กราฟ — ไม่งั้นมาทับแถวปุ่มซูม/พาชมของกราฟ */
  .gfull #fgsvg{flex:1;height:auto!important;min-height:0}
  .ginfofloat{position:fixed;left:12px;right:auto;bottom:12px;z-index:121;box-shadow:0 14px 44px rgba(0,0,0,.45);max-width:470px;max-height:38vh;overflow:auto;margin:0} /* ชิดซ้าย+ย่อ — ไม่บังจุดกลาง/ขวาจอ (เดิมการ์ดกว้างกลางจอ ทำให้กดจุดแถวล่างไม่ติด) */
  #fgsvg{user-select:none;-webkit-user-select:none}
  #fgsvg text{user-select:none;-webkit-user-select:none;pointer-events:none}
  @keyframes gfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .gfloat{animation:gfloat 6s ease-in-out infinite}
  @keyframes gping{0%{transform:scale(1);opacity:.85}70%{transform:scale(2.05);opacity:0}100%{transform:scale(2.05);opacity:0}}
  .gping{animation:gping 2.6s ease-out infinite;transform-origin:center;transform-box:fill-box;pointer-events:none}
  .gping-bad{animation-duration:1.5s}
  @keyframes gdash{to{stroke-dashoffset:-52}}
  .gedge{stroke-dasharray:7 8;animation:gdash 3s linear infinite}
  .gvetline{animation:gdash 4s linear infinite}
  @keyframes gbr{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  .gbreathe{animation:gbr 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center} /* ชีพจรเล้า: ปกติเต้นช้า */
  .gbreathe.gtrouble{animation-duration:1.25s} /* มีตายวันนี้ = เต้นถี่ */
  @keyframes gflashk{0%{filter:none}20%{filter:drop-shadow(0 0 18px rgba(53,224,200,1)) brightness(1.6)}100%{filter:none}}
  .gflash{animation:gflashk 1.6s ease-out 3} /* วาบเมื่อมีข้อมูลใหม่เข้ามาสดๆ */
  #gFeed{position:absolute;right:10px;bottom:12px;top:auto;width:240px;max-height:40%;overflow:hidden;display:none;flex-direction:column;justify-content:flex-end;gap:6px;z-index:5;pointer-events:none} /* ล่างขวา — พ้นป้ายผู้ซื้อ/เส้นทองกลางขวา และไม่ชนแผงต้องดู */
  @media(min-width:900px){#gFeed{display:flex}}
  @keyframes gfin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
  .gfi{background:rgba(13,26,31,.74);border:1px solid rgba(83,234,210,.16);border-radius:10px;padding:7px 10px;color:#cfe0db;font-size:11.5px;line-height:1.45;backdrop-filter:blur(3px);animation:gfin .35s ease both;pointer-events:auto} /* การ์ดกดได้ (บินไปหาหลัง) · ช่องว่างระหว่างการ์ดยังลาก/ซูมแผนที่ทะลุได้ */
  .gfi b{color:#8fd8ca}
  #fgsvg .ghouse,#fgsvg .gvetg,#fgsvg .gfarmg,#fgsvg .gvetline,#fgsvg .gedge{transition:opacity .28s}
  #fgsvg .glab{paint-order:stroke;stroke:#0d1a1f;stroke-width:2.6px;stroke-linejoin:round}
  #fgsvg .gvetline.goff{opacity:.22;stroke-width:.8;animation:none;pointer-events:none} /* เส้นหมอ→เล้าว่าง: จางบาง เห็นความเชื่อมโยงแต่ไม่รก (ไม่ animate ประหยัดแรงเครื่อง) */
  #fgsvg.spot .ghouse{opacity:.08}
  #fgsvg.spot .gfarmg{opacity:.22}
  #fgsvg.spot .gedge{opacity:.08}
  #fgsvg.spot .gvetg{opacity:.12}
  #fgsvg.spot .gvetline{opacity:.04}
  #fgsvg.spot .ghouse.gglow,#fgsvg.spot .gvetg.gglow{opacity:1}
  #fgsvg.spot .ghouse.gglow.gempty{opacity:.6}
  #fgsvg.spot .ghouse.gglow .glab{fill:#eaf6f2}
  #fgsvg.spot .gvetline.gglow{opacity:.95}
  #fgsvg.spot .gvetline.goff.gglow{opacity:.5}
  #fgsvg .gvetline.gglow{stroke-width:2;opacity:.95;animation-duration:1.2s;filter:drop-shadow(0 0 5px rgba(201,90,176,.9))}
  #fgsvg .gvetg.gglow circle{filter:drop-shadow(0 0 8px rgba(243,183,227,.95))}
  #fgsvg.spot .gvetg.gglow circle.gnode{transform:scale(1.3);transform-box:fill-box;transform-origin:center}
  .gnode{cursor:pointer;transition:filter .12s}
  .gnode:hover{filter:brightness(1.25) drop-shadow(0 0 6px rgba(83,234,210,.8))}
  .gnode.gsel{stroke:#fff;stroke-width:3;filter:drop-shadow(0 0 8px rgba(83,234,210,.9))}
  .glab{font-size:11px;fill:#9db8b2;text-anchor:middle;pointer-events:none}
  .glab.gfarm{font-size:12.5px;font-weight:700;fill:#8fd8ca}
  .glab.gvet{fill:#e3a7d3}
  .glab.gnum{font-size:10.5px;font-weight:700;fill:#6fcab8}
  .seclab{display:flex;align-items:center;gap:10px;margin:20px 2px 12px;color:var(--muted);font-size:12.5px;font-weight:800;letter-spacing:.4px}
  .seclab::before{content:"";width:4px;height:15px;border-radius:99px;background:linear-gradient(180deg,var(--brand),#3fb8a6)}
  /* ===== แถบเมนูซ้ายถาวร (จอคอม ≥1100px) ===== */
  .shell{display:flex;align-items:stretch}
  #sbar{display:none}
  .homelist{display:flex;flex-direction:column;gap:10px}
  @media(min-width:1100px){
    #sbar{display:flex;flex-direction:column;gap:2px;position:sticky;top:58px;align-self:flex-start;width:206px;flex:0 0 206px;height:calc(100vh - 58px);overflow-y:auto;padding:9px 6px 14px;background:rgba(255,255,255,.72);backdrop-filter:blur(8px);border-right:1px solid var(--line)}
    .seg.pagenav{display:none} /* จอกว้างมีเมนูข้างซ้ายแล้ว — ซ่อนแถบหัวข้อบนหน้า กันเมนูซ้ำสองชั้น */
    .content{flex:1;min-width:0;padding:16px 26px 70px;max-width:none}
    .homelist{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
  }
  .sbi{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:10px;border:none;background:transparent;color:var(--ink-2,#3c4a47);font-size:14px;font-weight:600;text-align:left;cursor:pointer;width:100%;transition:background .1s}
  .sbi:hover{background:var(--brand-soft);color:var(--brand-d)}
  .sbi.on{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;box-shadow:0 3px 10px rgba(31,125,110,.28)}
  .sbi .mi{width:20px;height:20px;flex:0 0 auto;stroke-width:2}
  .sbi .sbt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sbi .bd{margin-left:auto;background:var(--warn);color:#fff;font-size:11px;font-weight:800;border-radius:999px;padding:1px 8px;flex:0 0 auto}
  .sbsec{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin:8px 6px 3px}
  /* ===== ฟอร์มลงข้อมูลแบบกระชับ: มือถือ 2 คอลัมน์ (เท่าเดิม) · จอคอมเรียงแถวนอนแบบตาราง ===== */
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
  .fgrid .frow{margin-bottom:0}
  .fgrid .fspan{grid-column:1/-1}
  @media(min-width:1100px){
    .fgrid{grid-template-columns:repeat(auto-fit,minmax(148px,1fr))}
    .fgrid .fspan{grid-column:auto}
    .content .frow{margin-bottom:10px}
    .content .frow label{margin-bottom:3px;font-size:12.5px}
    .content .cin{padding:8px 10px;font-size:14px}
    .content .grid2{gap:10px}
    .content .card{padding:14px 16px;margin-bottom:12px}
    .content .card h3{margin-top:0}
  }
  .seclab::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  @keyframes rowin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .mrow{animation:rowin .32s ease both}
  .mrow:nth-child(2){animation-delay:.04s}.mrow:nth-child(3){animation-delay:.08s}.mrow:nth-child(4){animation-delay:.12s}
  .mrow:nth-child(5){animation-delay:.16s}.mrow:nth-child(6){animation-delay:.20s}.mrow:nth-child(7){animation-delay:.24s}
  .statchip{flex:1;min-width:104px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.20);border-radius:13px;padding:9px 12px}
  .statchip .l{font-size:11.5px;opacity:.88;font-weight:600}
  .statchip .v{font-size:19px;font-weight:800;margin-top:1px;line-height:1.2}

  .login h1{color:#fff;font-size:27px;font-weight:700;margin:0 0 2px;text-align:center;letter-spacing:-.01em}
  .login h1 span{color:var(--brand)}
  .login-date{color:#cfdbe8;font-size:13px;font-weight:600;text-align:center;margin:9px 0 4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);padding:6px 15px;border-radius:999px}
  .login p{color:#95a7b9;margin:16px 0 26px;text-align:center;font-size:14px}
  .roles{display:grid;gap:12px;width:100%;max-width:432px}
  .role{background:#fff;border:none;border-radius:15px;padding:16px 17px;display:flex;
    gap:14px;align-items:center;text-align:left;box-shadow:0 10px 30px rgba(0,0,0,.26);transition:transform .14s,box-shadow .14s}
  .role:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.32)}
  .role:active{transform:translateY(0) scale(.99)}
  .role .ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none}
  .role .t{font-weight:700;font-size:16px}
  .role .d{color:var(--muted);font-size:12.5px;margin-top:1px}
  .demo-note{color:#7990a3;font-size:11.5px;margin-top:24px;text-align:center;max-width:432px;line-height:1.65}
  /* login form (เข้าสู่ระบบจริง) */
  .loginbox{width:100%;max-width:380px;display:flex;flex-direction:column;gap:13px;margin-top:8px}
  .lf{display:flex;flex-direction:column;gap:6px;color:#aebccb;font-size:12.5px;font-weight:600}
  .lf input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:11px;
    padding:12px 14px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s,background .15s}
  .lf input:focus{border-color:var(--brand);background:rgba(255,255,255,.10)}
  .lf input::placeholder{color:#5d7186}
  .lg-err{color:#ff9d8a;font-size:12.5px;font-weight:600;display:none}
  .lg-err.show{display:block}
  .lg-primary{background:var(--brand);color:#fff;border:none;border-radius:11px;padding:13px;
    font-size:15.5px;font-weight:700;font-family:inherit;cursor:pointer;transition:filter .15s,transform .1s;margin-top:2px}
  .lg-primary:hover{filter:brightness(1.07)} .lg-primary:active{transform:scale(.99)}
  .lg-or{display:flex;align-items:center;gap:12px;color:#6f8497;font-size:12px;margin:3px 0}
  .lg-or:before,.lg-or:after{content:"";flex:1;height:1px;background:rgba(255,255,255,.12)}
  .lg-line{background:#06C755;color:#fff;border:none;border-radius:11px;padding:12px;
    font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:filter .15s,transform .1s}
  .lg-line:hover{filter:brightness(1.05)} .lg-line:active{transform:scale(.99)}
  .lg-line .li{background:#fff;color:#06C755;font-weight:800;font-size:11px;border-radius:5px;padding:2px 5px;letter-spacing:-.02em}
  .demo-accounts{width:100%;max-width:380px;margin-top:20px;text-align:center}
  .da-title{color:#7c91a4;font-size:11.5px;font-weight:600;margin-bottom:9px}
  .da-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .da{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);color:#d4dfea;
    border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .14s,border-color .14s}
  .da:hover{background:rgba(255,255,255,.13);border-color:var(--brand)}
  .userPill{max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* KPI + cards */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px 14px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .12s}
  .kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),#3fb8a6);opacity:1}
  .kpi::after{content:"";position:absolute;right:-22px;top:-22px;width:76px;height:76px;border-radius:50%;background:radial-gradient(circle,rgba(31,125,110,.07),transparent 70%)}
  .kpi .lab{color:var(--muted);font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:27px;font-weight:700;margin-top:6px;line-height:1.08;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .kpi .delta{font-size:11.5px;margin-top:4px;font-weight:500}
  .up{color:var(--bad)} .down{color:var(--ok)} .flat{color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:17px 18px;margin-bottom:15px;box-shadow:var(--shadow-sm)}
  .card h3{margin:0 0 13px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.01em;padding-left:11px;border-left:3px solid var(--brand);min-height:18px}
  .card h3 .more{margin-left:auto;font-size:12.5px;font-weight:500;color:var(--muted)}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:9px 9px;text-align:left;border-bottom:1px solid var(--line-2)}
  th{color:var(--ink-2);font-weight:600}
  thead th{background:#edf4f2;color:#4a6b62;font-weight:600;font-size:11.5px;letter-spacing:.01em;white-space:nowrap;padding:8px 9px;border-bottom:1px solid var(--line)}
  tbody tr:nth-child(even) td,tbody tr:nth-child(even) th{background:#f6faf8}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr.clk{cursor:pointer;transition:background .1s}
  tbody tr.clk:hover td,tbody tr.clk:hover th{background:var(--brand-soft)}
  tfoot td{border-top:2px solid var(--line);font-weight:700;background:#f2f8f5}
  .tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;line-height:1.4;white-space:nowrap}
  .tag.ok{background:var(--ok-soft);color:#177a4b}
  .tag.warn{background:var(--warn-soft);color:#9a6a12}
  .tag.bad{background:var(--bad-soft);color:#b5392e}
  .tag.wait{background:#eef1f5;color:#5b6b7c}

  /* house grid */
  .search{display:flex;gap:8px;margin-bottom:14px}
  .search input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:15px;background:#fff;font-family:inherit}
  .search input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px}
  .farmgroup{margin-bottom:22px}
  .farmhead{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14.5px;margin:0 0 11px;
    padding:11px 14px;background:linear-gradient(90deg,#f2f9f6,#fff 55%);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:13px;box-shadow:var(--shadow-sm)}
  .farmhead .fcount{margin-left:auto;font-weight:600;font-size:12px;color:var(--brand);background:var(--brand-soft);padding:3px 10px;border-radius:999px}
  .hcell{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:14px 11px;text-align:center;position:relative;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .12s,border-color .12s;cursor:pointer}
  .hcell:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(31,125,110,.45)}
  .hcell:active{transform:translateY(0) scale(.97)}
  .hcell .hn{font-weight:800;font-size:16.5px;letter-spacing:-.01em}
  .hcell .hc{color:var(--muted);font-size:11.5px;margin-top:2px}
  .dot{position:absolute;top:9px;right:9px;width:9px;height:9px;border-radius:50%;box-shadow:0 0 0 3px #fff}
  .dot.ok{background:var(--ok);box-shadow:0 0 0 3px #fff,0 0 9px rgba(31,158,117,.8)}
  .dot.wait{background:var(--warn);box-shadow:0 0 0 3px #fff,0 0 9px rgba(239,159,39,.8)}
  .dot.bad{background:var(--bad);box-shadow:0 0 0 3px #fff,0 0 9px rgba(214,72,59,.8)}

  /* form */
  .frow{margin-bottom:14px}
  .frow label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:var(--ink-2)}
  .frow label .req{color:var(--bad)}
  .frow label .hint{font-weight:400;color:var(--muted);font-size:12px}
  .frow input,.frow select,.frow textarea{width:100%;padding:11px 13px;border:1px solid var(--line);
    border-radius:11px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);transition:border-color .12s,box-shadow .12s}
  .frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .frow .err{color:var(--bad);font-size:12.5px;margin-top:5px;display:none}
  .frow.invalid input{border-color:var(--bad);background:#fff7f6}
  .frow.invalid .err{display:block}
  .frow .unit{position:relative}
  .frow .unit .u{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .banner{border-radius:11px;padding:11px 14px;font-size:13.5px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start;line-height:1.45;border:1px solid transparent}
  .banner.info{background:var(--info-soft);color:#1d4e8f;border-color:#cfe0f6}
  .banner.bad{background:var(--bad-soft);color:#a52a20;border-color:#f3cdc8}
  .banner.ok{background:var(--ok-soft);color:#1d6e48;border-color:#c9ebd8}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;border-radius:13px;
    padding:13px 18px;font-size:15px;font-weight:600;background:linear-gradient(135deg,#26907e,var(--brand-d));color:#fff;width:100%;transition:filter .12s,transform .08s,box-shadow .12s;box-shadow:0 3px 12px rgba(31,125,110,.32)}
  .btn:hover{filter:brightness(1.07);box-shadow:0 6px 16px rgba(31,125,110,.38)}
  .btn:active{transform:translateY(1px) scale(.995)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .btn.ghost:hover{border-color:#cdd6e0;background:#fafbfc}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px}
  .actions{display:flex;gap:10px;margin-top:8px}

  .back{background:none;border:none;color:var(--muted);font-size:15px;padding:9px 0;margin-bottom:8px;display:inline-flex;align-items:center;gap:6px;font-weight:600}
  .back:hover{color:var(--brand)}

  /* segmented */
  .seg{display:flex;background:#e3ece9;border-radius:14px;padding:4px;margin-bottom:16px;gap:4px}
  .seg button{flex:1;border:none;background:transparent;padding:12px 8px;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);transition:background .12s,color .12s}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:#fff;color:var(--brand);box-shadow:0 1px 3px rgba(20,35,50,.13)}

  /* config field rows */
  .fieldrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line-2)}
  .fieldrow .grip{color:#c2ccd6;font-size:18px}
  .fieldrow .fmeta{flex:1}
  .fieldrow .fmeta .fn{font-weight:600;font-size:14px}
  .fieldrow .fmeta .fd{color:var(--muted);font-size:12px}
  .switch{width:44px;height:25px;border-radius:999px;background:#cdd6e0;position:relative;border:none;flex:none;transition:background .15s}
  .switch.on{background:var(--ok)}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.16s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .switch.on::after{left:22px}

  /* simple bars */
  .bars{display:flex;flex-direction:column;gap:10px}
  .bar{display:flex;align-items:center;gap:10px}
  .bar .bl{width:84px;font-size:12.5px;color:var(--muted);flex:none}
  .bar .track{flex:1;background:#e9edf2;border-radius:7px;height:15px;overflow:hidden}
  .bar .fill{height:100%;border-radius:7px;background:var(--brand);transition:width .4s ease}
  .bar .bv{width:54px;text-align:right;font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums}

  .cin{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;text-align:right;font-variant-numeric:tabular-nums;background:#fff;color:var(--ink);transition:border-color .12s,box-shadow .12s}
  .cin:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft),0 0 12px rgba(31,125,110,.12)}
  .cin.tl{text-align:left}
  td.lab{font-size:13px;color:var(--ink);white-space:nowrap;font-weight:600}
  .sumgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(124px,1fr));gap:10px}
  .sumbox{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .sumbox .l{font-size:11.5px;color:var(--muted)}
  .sumbox .v{font-size:20px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#17262c,#173832);color:#fff;
    padding:13px 20px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:60;box-shadow:0 10px 34px rgba(0,0,0,.34),0 0 18px rgba(53,224,200,.14);border:1px solid rgba(83,234,210,.30)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* กราฟแท่งในแอป (วาดเอง ไม่ใช้ไลบรารีนอก) */
  @keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .chartbar{height:100%;border-radius:8px;transform-origin:left;animation:barGrow .7s cubic-bezier(.2,.8,.2,1)}

  /* ===== 🌙 ธีมมืด โทนกรมท่า-มินต์ (สลับได้จากปุ่มบนแถบบน · จำค่าต่อเครื่อง) ===== */
  body.theme-dark{
    --bg:#1b2338; --card:#2b3554; --ink:#eef1f8; --ink-2:#ccd4e8; --muted:#93a0c2;
    --line:#3a4668; --line-2:#333f60; --brand:#4fd6a4; --brand-d:#2fae83; --brand-soft:#28455c;
    --ok:#57d9a7; --ok-soft:#26494b; --warn:#e6bb54; --warn-soft:#453f2a;
    --bad:#f27d72; --bad-soft:#4b2f3d; --info:#86a8f2; --info-soft:#2c3a61;
    --coral:#eb8f70; --coral-soft:#4a3536; --magenta:#d883c4; --magenta-soft:#45304c;
    --soft:#242e4c; --app:#1e2740;
    --shadow-sm:0 1px 2px rgba(0,0,0,.25); --shadow:0 2px 4px rgba(0,0,0,.2),0 8px 22px rgba(0,0,0,.3);
  }
  body.theme-dark .app{background:
    radial-gradient(55% 38% at 88% -6%, rgba(79,214,164,.08), transparent 62%),
    radial-gradient(46% 34% at -8% 104%, rgba(109,128,173,.10), transparent 62%),
    linear-gradient(rgba(109,128,173,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(109,128,173,.06) 1px, transparent 1px),
    var(--app);background-size:auto,auto,36px 36px,36px 36px,auto}
  body.theme-dark .app::after{background-color:rgba(79,214,164,.05)}
  body.theme-dark .topbar{background:linear-gradient(90deg,#161d30,#1c3a41);border-bottom-color:rgba(79,214,164,.3)}
  body.theme-dark #sbar{background:rgba(27,35,56,.86);border-right-color:var(--line)}
  body.theme-dark .sbi{color:var(--ink-2)}
  body.theme-dark .sbi:hover{background:#33406a;color:#7fd9b8}
  body.theme-dark thead th{background:#26304e;color:#9fb3d6;border-bottom-color:var(--line)}
  body.theme-dark tbody tr:nth-child(even) td,body.theme-dark tbody tr:nth-child(even) th{background:#2f3a5c}
  body.theme-dark tfoot td{background:#26304e;border-top-color:var(--line)}
  body.theme-dark .seg{background:#1c2440}
  body.theme-dark .seg button.on{background:#2b3554;color:#7fd9b8;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  body.theme-dark .btn.ghost{background:#2b3554;color:var(--ink);border-color:var(--line)}
  body.theme-dark .btn.ghost:hover{background:#33406a;border-color:#4a5880}
  body.theme-dark .farmhead{background:linear-gradient(90deg,#2c3a5e,#2b3554)}
  body.theme-dark .cin{background:#242e4c;color:var(--ink);border-color:var(--line)}
  body.theme-dark .dot{box-shadow:0 0 0 3px var(--card)}
  body.theme-dark .dot.ok{box-shadow:0 0 0 3px var(--card),0 0 9px rgba(84,214,165,.8)}
  body.theme-dark .dot.wait{box-shadow:0 0 0 3px var(--card),0 0 9px rgba(230,187,84,.8)}
  body.theme-dark .dot.bad{box-shadow:0 0 0 3px var(--card),0 0 9px rgba(242,125,114,.8)}
  body.theme-dark .banner.info{color:#a9c2f5;border-color:#3a4d7d}
  body.theme-dark .banner.bad{color:#f5b0a8;border-color:#6b4050}
  body.theme-dark .banner.ok{color:#9fe8c9;border-color:#31635f}
/* ── (SS) ปุ่ม/ตัวควบคุมบนแผนผัง: โทนเข้มกลืนกับพื้นกราฟ อ่านชัด (แทนปุ่มขาวโดดๆ) ── */
#gCard .btn.ghost{background:rgba(19,36,42,.85);color:#cfe8e2;border:1px solid rgba(83,234,210,.3);box-shadow:none}
#gCard .btn.ghost:hover{background:rgba(35,62,70,.95);border-color:rgba(83,234,210,.6);color:#fff}
#gCard .btn.sm:not(.ghost){box-shadow:0 2px 10px rgba(31,125,110,.35)}
#gCard .seg{background:rgba(13,26,31,.78);border:1px solid rgba(83,234,210,.22);border-radius:12px;padding:3px;gap:3px;margin-bottom:0}
#gCard .seg button{background:transparent;color:#93b8b0;padding:8px 12px;font-size:12.5px;font-weight:700}
#gCard .seg button:hover{color:#e6f6f2}
#gCard .seg button.on{background:linear-gradient(135deg,#26907e,#1f7d6e);color:#fff;box-shadow:0 2px 8px rgba(31,125,110,.4)}
#gCard .cin{background:rgba(13,26,31,.82);border:1px solid rgba(83,234,210,.3);color:#dff3ee}
#gCard .cin::placeholder{color:#6f918a}
#gCard .cin:focus{border-color:rgba(83,234,210,.65);outline:none}
/* ── (SS) ฟอร์มบิลแท่นขาย: แถบสรุปสดลอยติดจอ ── */
.sbsticky{position:sticky;top:52px;z-index:35;background:rgba(255,255,255,.92);backdrop-filter:blur(7px);border:1px solid var(--line);border-radius:13px;padding:9px 13px;margin-bottom:12px;box-shadow:0 4px 16px rgba(20,35,50,.08)}
body.theme-dark .sbsticky{background:rgba(27,35,56,.92);border-color:var(--line)}
.sbchip{display:inline-flex;align-items:baseline;gap:5px;border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:12.5px;font-weight:700;white-space:nowrap}
.sbchip b{font-size:14px}
.sbchip.ok{background:#e6f4ea;border-color:transparent;color:var(--ok)}
.sbchip.warn{background:#fdf3e0;border-color:transparent;color:#b7791f}
.sbchip.bad{background:#fdeae7;border-color:transparent;color:var(--bad)}
body.theme-dark .sbchip.ok{background:rgba(30,126,79,.18)}
body.theme-dark .sbchip.warn{background:rgba(183,121,31,.18)}
body.theme-dark .sbchip.bad{background:rgba(226,75,74,.16)}
/* ── (CF) ข้อมูลประจำฟาร์มแบบแน่น: ตารางหนาแน่น + หัวติดบน + เลื่อนในกรอบ (ไม่ต้องไถทั้งหน้า) ── */
.densewrap{max-height:64vh;overflow:auto;border:1px solid var(--line);border-radius:10px}
.densetbl{font-size:12px;border-collapse:collapse;width:100%}
.densetbl th{position:sticky;top:0;z-index:2;font-size:10.5px;padding:6px 8px;background:#e8efec;white-space:nowrap;cursor:default}
.densetbl td{padding:3px 8px;white-space:nowrap;border-bottom:1px solid #eef2f0}
.densetbl tr.clk{cursor:pointer}
.densetbl tr.clk:hover td{background:rgba(31,125,110,.07)}
body.theme-dark .densetbl th{background:#26304e}
body.theme-dark .densetbl td{border-bottom-color:#2b3554}
.cfchip{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;background:var(--panel,#fff);color:var(--ink-2)}
.cfchip.on{background:var(--brand);border-color:var(--brand);color:#fff}
/* ── (SS) แผนผังฟาร์ม: ชั้นผู้ซื้อสไตล์ญี่ปุ่น (เส้นเงินไหล ฟาร์ม→ผู้ซื้อ) ── */
.gsale{transition:opacity .25s,stroke-width .25s}
.gflowline{stroke-dasharray:8 10;animation:gsflow 1.5s linear infinite}
@keyframes gsflow{to{stroke-dashoffset:-36}}
.gsalepend{animation:gsflow 1.1s linear infinite,gspend 1.3s ease-in-out infinite alternate}
@keyframes gspend{from{opacity:.28}to{opacity:.95}}
.glantern{animation:gspend 1.15s ease-in-out infinite alternate}
.gbuyg{transition:opacity .25s}
/* ── (SS) หน้าดูบิลแท่นขาย + พิมพ์ A4 ── */
#sbPrintOverlay{position:fixed;inset:0;z-index:220;background:rgba(8,14,26,.74);overflow:auto;padding:18px 12px}
#sbPrintOverlay .sbp-tools{max-width:794px;margin:0 auto 10px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
#sbPrintPage{background:#fff;color:#1a1a1a;width:794px;max-width:100%;margin:0 auto;padding:26px 30px;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.45);font-family:'IBM Plex Sans Thai',Tahoma,sans-serif}
/* บิลต้องเป็นกระดาษขาวเสมอ — กันธีมมืดของแอปทะลุเข้าตาราง (แถวสลับ/หัวตาราง) */
body.theme-dark #sbPrintPage table, body.theme-dark #sbPrintPage tbody tr:nth-child(even) td, body.theme-dark #sbPrintPage tbody tr:nth-child(even) th, body.theme-dark #sbPrintPage tbody td, body.theme-dark #sbPrintPage tbody th, body.theme-dark #sbPrintPage thead th{background:transparent;color:#1a1a1a;border-color:#444}
body.theme-dark #sbPrintPage th[style*="f1f1ea"], body.theme-dark #sbPrintPage td[style*="f1f1ea"]{background:#f1f1ea}
#sbPrintPage table{color:#1a1a1a}
.sbpaper{background:#fff;color:#1a1a1a;border-radius:10px;padding:16px 20px;font-family:'IBM Plex Sans Thai',Tahoma,sans-serif;box-shadow:inset 0 0 0 1px #e3e3da}
.sbpaper table{color:#1a1a1a}
body.theme-dark .sbpaper table, body.theme-dark .sbpaper tbody tr:nth-child(even) td, body.theme-dark .sbpaper tbody tr:nth-child(even) th, body.theme-dark .sbpaper tbody td, body.theme-dark .sbpaper tbody th, body.theme-dark .sbpaper thead th{background:transparent;color:#1a1a1a;border-color:#444}
body.theme-dark .sbpaper th[style*="f1f1ea"], body.theme-dark .sbpaper td[style*="f1f1ea"]{background:#f1f1ea}
@media print{
  body>*:not(#sbPrintOverlay){display:none!important}
  #sbPrintOverlay{position:static;background:#fff;padding:0;overflow:visible}
  #sbPrintOverlay .sbp-tools{display:none!important}
  #sbPrintPage{width:auto;max-width:none;margin:0;padding:0;border-radius:0;box-shadow:none}
  @page{size:A4 portrait;margin:10mm}
}
</style>

<script>
/* ---------- วันที่จำลองของระบบ (prototype) — ใช้ให้ตรงกันทั้งแอป ----------
   เปลี่ยนเป็นวันจริงของเครื่องได้โดยตั้ง DEMO_DATE = new Date() */
const DEMO_DATE = new Date();                // ✅ วันจริงของเครื่อง (โปรดักชัน) · เดโม่เดิม: new Date(2026,5,17)
const _THMON = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; // กัน TDZ (THAI_MON_ABBR ประกาศด้านล่าง)
const DEMO_DATE_DAY   = DEMO_DATE.getDate()+' '+_THMON[DEMO_DATE.getMonth()];   // เช่น "29 มิ.ย." — ดีไรฟ์จากวันจริง
const DEMO_DATE_SHORT = DEMO_DATE_DAY+' '+(DEMO_DATE.getFullYear()+543);        // เช่น "29 มิ.ย. 2569" (พ.ศ.)
function demoDateLong(){try{return DEMO_DATE.toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}catch(e){return DEMO_DATE_SHORT;}}

/* ---------- mock data ---------- */
const ZONES = ["โซน A","โซน B","โซน C","โซน D"];
function houseCount(){return HOUSES.length}
// สถานะเล้า: ว่าง / กำลังเลี้ยง (หมู>0 อัตโนมัติ) / กำลังล้างคอก (เสมียนตั้งได้เมื่อหมูเหลือ 0)
// "กำลังล้างคอก" = 3 วันนับจากวันกดยืนยันปิดชุด (h.cleanStart) — คืนจำนวนวันที่เหลือ (0 = พ้น 3 วัน → ว่าง)
const CLEAN_DAYS=3;
function cleaningDaysLeft(h){
  if(!h.cleanStart) return 0;
  try{
    const p=String(h.cleanStart).split('-');               // 'YYYY-MM-DD'
    const start=new Date(+p[0],+p[1]-1,+p[2]);              // เที่ยงคืนเวลาท้องถิ่น
    const today=new Date(DEMO_DATE.getFullYear(),DEMO_DATE.getMonth(),DEMO_DATE.getDate());
    const passed=Math.round((today-start)/86400000);        // จำนวนวันที่ผ่านมา
    return passed<CLEAN_DAYS?(CLEAN_DAYS-passed):0;
  }catch(e){ return h.status==='กำลังล้างคอก'?CLEAN_DAYS:0; }
}
function houseStatus(h){
  if((h.pigs||0)>0) return 'กำลังเลี้ยง';
  return cleaningDaysLeft(h)>0 ? 'กำลังล้างคอก' : 'ว่าง';
}
function penStatus(h){const s=houseStatus(h);
  if(s==='กำลังเลี้ยง') return '<span class="tag ok">🟢 กำลังเลี้ยง</span>';
  if(s==='กำลังล้างคอก') return '<span class="tag warn">🧹 กำลังล้างคอก</span>';
  return '<span class="tag wait">⬜ เล้าว่าง</span>';}
// ISO 'YYYY-MM-DD' → เที่ยงคืน "เวลาท้องถิ่น" (ให้ตรงกับ DEMO_DATE/cleaningDaysLeft ไม่เพี้ยนเพราะ timezone)
function isoLocal(s){const p=String(s||'').split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
// จำนวนวันเลี้ยงของรุ่นปัจจุบัน: นับจากวันรับเข้า → วันนี้ (กำลังเลี้ยง) หรือ → วันปิดชุด (เมื่อหมูหมดหลัง)
function houseDays(h){
  const din=h&&h.intake&&h.intake.dateIn; if(!din) return 0;
  const end=((h.pigs||0)<=0 && h.closedDate)? isoLocal(h.closedDate) : DEMO_DATE;
  const d=Math.round((end-isoLocal(din))/86400000);
  return d>0?d:0;
}
// เรียงตามรหัสหลัง A→Z (ตัวอักษรก่อน แล้วตามด้วยตัวเลข)
function byCode(a,b){
  const pa=String(a.code||'').match(/^([A-Za-z]*)(\d*)/), pb=String(b.code||'').match(/^([A-Za-z]*)(\d*)/);
  const la=(pa[1]||'').toUpperCase(), lb=(pb[1]||'').toUpperCase();
  if(la!==lb) return la<lb?-1:1;
  return (parseInt(pa[2])||0)-(parseInt(pb[2])||0);
}
// generate sample houses (representing 500; show ~24 in grid)
function seedHouses(){
  const arr=[];
  for(let i=1;i<=24;i++){
    const cap = [380,420,450,500][i%4];
    const pigs = cap - (40 + (i%7)*8); // เหลือช่องว่าง 40-88 ตัวจากความจุ (กันคงเหลือเกินรับเข้าในประวัติ)
    const statusRoll = i%7;
    const letter=["A","B","C","D"][i%4];
    arr.push({
      id:i, code:letter+i, name:"หลัง "+String(i).padStart(3,"0"),
      farm:FARMS[i%FARMS.length], zone:ZONES[i%4], cap, area:[320,360,400,450][i%4],
      fanNo:2+(i%3), fanSh:2+(i%2), fanTotal:(2+(i%3))+(2+(i%2)), pigs, received:cap,
      breed:["พ่อพันธุ์","ขุน","อนุบาล","แม่พันธุ์"][i%4],
      vet:VETS[i%VETS.length], assistant:ASSTS[i%ASSTS.length], worker:WORKERS[i%WORKERS.length],
      source:SOURCES[i%SOURCES.length],
      pigletHistory:"รุ่น 25"+(68+i%2)+"/"+((i%12)+1)+" · "+(cap-20)+" ตัว · อายุแรกเข้า "+(21+i%7)+" วัน · น้ำหนัก "+(6+i%3)+" กก. · รับเมื่อ "+((i%28)+1)+" พ.ค. 69",
      vaccineHistory:"อหิวาต์ ✓ · ปากเท้าเปื่อย (FMD) ✓ · PRRS "+(i%2?"✓ ครบโดส":"รอเข็ม 2"),
      originVet:VETS[(i+1)%VETS.length], originAsst:ASSTS[(i+2)%ASSTS.length], originWorker:WORKERS[(i+3)%WORKERS.length],
      note:i%5===0?"ลูกหมูแข็งแรงดี คัดไซซ์สม่ำเสมอ":(i%5===2?"พบลูกแคระ 3 ตัว แยกเลี้ยง":""),
      filled: statusRoll!==0 && statusRoll!==3, // some not filled today
      deadToday: statusRoll===5?6: (i%3),
      cullToday: i%4===0?(1+i%3):0,
      soldToday: i%5===0? 40: 0,
      sick: statusRoll===5?12:(i%4===0?3:0),
      fcr: (2.3 + (i%9)/20).toFixed(2),
      mortality: (1.0 + (i%9)/8).toFixed(1)
    });
  }
  return arr;
}
const FARMS=["ฟาร์มเบิกไพร","ฟาร์มวันครู1","ฟาร์มวันครู2","ฟาร์มวันครู3","ท่าม่วงหมูขุน","ท่าม่วงแม่พันธุ์"];
const SOURCES=["ฟาร์มพ่อแม่พันธุ์ CP","ฟาร์มเบิกไพร (อนุบาล)","ท่าม่วงแม่พันธุ์","ฟาร์มวันครู1 (โรงเรือนแม่)"];
const VETS=["น.สพ. สมชาย","น.สพ. ปรีชา","สพญ. มาลี","น.สพ. วิรัช"];
const ASSTS=["กิตติ","สุดา","ประยุทธ","นภา","อรุณ"];
const WORKERS=["บุญมี","สมหญิง","ดำรง","พิมพ์","วิเชียร","สายฝน"];

function genMeds(){

    if(h.meds&&h.meds.length) return; // keep existing
    const n=3+(h.id*3%6), meds=[];

// generate sample daily-record log per house (most recent first)
function genDailyLog(){
  const CUST=['เฮียสมชาย','ล้งภาคกลาง','ตลาดศรีเมือง'];
  HOUSES.forEach(h=>{
    if(h.dailyLog&&h.dailyLog.length) return;
    const intake=h.received||h.cap, empty=(h.pigs||0)<=0;
    const log=[], days=4+(h.id%3); let rem=h.pigs;
    // งบสูญเสีย/ขายย้อนหลัง = ช่องว่าง (รับเข้า − คงเหลือ) → ตาย+คัด+ขายรวม = รับเข้า − คงเหลือ พอดี (อนุรักษ์จำนวน)
    // หลังว่าง(เลี้ยงจบ): คงเหลือ=0 → งบ=รับเข้าทั้งหมด (เดิมใส่ค่าคงที่เล็กๆ ทำให้หมูบางส่วน "หาย" จากบันทึก)
    let budget = Math.max(0, intake-h.pigs);
    for(let d=0;d<days;d++){
      const day=17-d;
      let dead=0, soldN=0, cullN=0;
      if(budget>0){
        dead=Math.min(budget, 1+((h.id+d)%3)); budget-=dead;
        if(d===0 && budget>=10){ soldN=Math.min(budget, 15+((h.id*7)%25)); budget-=soldN; }
        else if(d===2 && budget>=2){ cullN=Math.min(budget, 1+(h.id%3)); budget-=cullN; }
        if(d===days-1 && budget>0){ soldN+=budget; budget=0; } // วันเก่าสุด: เทงบที่เหลือลงยอดขายขุน → ตาย+คัด+ขายรวม = รับเข้า − คงเหลือ พอดี
      }
      const outN=soldN+cullN;
      const avgW=118+((h.id+d)%12), soldW=soldN*avgW, cullW=cullN*avgW;
      const value=(soldW*75)+(cullW*60);
      const cust=outN?CUST[(h.id+d)%3]:'-', bill=outN?'BL-'+String(1000+h.id*10+d):'-';
      log.push({date:day+' มิ.ย.',dead,
        deadType:dead?['ตาย','ตายใหญ่','ตายเน่า'][(h.id+d)%3]:'', deadN:dead, deadW:0, deadP:0, deadCust:'-', deadBill:'-',
        cullType:cullN?'คัดขายปกติ':'', cullN, cullW, cullP:cullN?60:0, cullCust:cullN?cust:'-', cullBill:cullN?bill:'-',
        soldN, soldW, soldP:soldN?75:0, soldCust:soldN?cust:'-', soldBill:soldN?bill:'-',
        outN, value, avg:soldN?avgW:0, cust, bill, by:h.worker||'เสมียน', remain:rem});
      rem=rem+dead+outN;
    }
    h.dailyAnchor=rem; // จำนวนต้นวันของรายการเก่าสุด (ใช้คำนวณคงเหลือใหม่ตอนแก้ไข)
    h.dailyLog=log;
  });
}

/* ========== ระบบคลัง/สต็อกต่อฟาร์ม ==========
   STOCK[farm] = { moves:[ {ts,date,type,delta,cat,name,price,by,ref,note} ], min:{ key:จำนวนขั้นต่ำ } }
   · delta เป็นค่าบวก(รับเข้า)/ลบ(เบิกออก) · ยอดคงเหลือ = ผลรวม delta ต่อรายการ (moves = สมุดบันทึกความจริง)
   · "ยาสูตร" เป็นสูตรผสม ไม่นับเป็นชิ้นในคลัง → ยกเว้นจากการคุมสต็อก */
let STOCK={};
const STOCK_SEP='␟';
const STOCK_NOQTY_CATS=['ยาสูตร'];                              // หมวดที่ไม่คุมสต็อก
function stockKey(cat,name){ return (cat||'')+STOCK_SEP+(name||''); }
function farmStock(farm){ farm=farm||'ไม่ระบุฟาร์ม'; if(!STOCK[farm])STOCK[farm]={moves:[],min:{}}; if(!STOCK[farm].moves)STOCK[farm].moves=[]; if(!STOCK[farm].min)STOCK[farm].min={}; return STOCK[farm]; }
function stockBalMap(farm){ const m={}; (farmStock(farm).moves||[]).forEach(mv=>{const k=stockKey(mv.cat,mv.name); m[k]=(m[k]||0)+(Number(mv.delta)||0);}); return m; }
function stockOnHand(farm,cat,name){ return stockBalMap(farm)[stockKey(cat,name)]||0; }
function stockMinOf(farm,cat,name){ return Number(farmStock(farm).min[stockKey(cat,name)]||0); }
function stockMoveAdd(farm,mv){ farmStock(farm).moves.unshift(Object.assign({ts:Date.now()},mv)); }   // ความเคลื่อนไหวล่าสุดอยู่บนสุด
function stockCountable(cat){ return STOCK_NOQTY_CATS.indexOf(cat)<0; }
function catalogItemOf(cat,name){ return (REQ_DATA[cat]||[]).find(x=>x.name===name)||null; }
function catalogPriceOf(cat,name){ const it=catalogItemOf(cat,name); return it?(Number(it.price)||0):0; }
function stockCats(){ return Object.keys(REQ_DATA).filter(stockCountable); }
// ── วันหมดอายุยา/วัคซีน (ราย farm+item · เก็บ ISO 'YYYY-MM-DD' ของล็อตล่าสุดที่รับเข้า) ──
function farmExpMap(farm){ const fs=farmStock(farm); if(!fs.exp)fs.exp={}; return fs.exp; }
function stockExpOf(farm,cat,name){ return farmExpMap(farm)[stockKey(cat,name)]||''; }
function setStockExp(farm,cat,name,iso){ const m=farmExpMap(farm), k=stockKey(cat,name); if(iso) m[k]=iso; else delete m[k]; }
// ── ล็อตคงเหลือรายรายการ (FEFO) — สร้างจาก moves: ล็อตรับเข้า(delta>0) เรียงวันหมดอายุเร็วสุดก่อน แล้วหักยอดเบิก/ปรับลดออกตามลำดับ → ของหลายล็อต/หลายวันหมดอายุไม่ถูกยุบรวม ──
function stockLotsOf(farm,cat,name){
  const moves=(farmStock(farm).moves||[]).filter(m=>m.cat===cat&&m.name===name);
  let lots=moves.filter(m=>(Number(m.delta)||0)>0).map(m=>({qty:Number(m.delta)||0,exp:m.exp||'',date:m.date||'',ref:m.ref||'',ts:m.ts||0}));
  lots.sort((a,b)=>{ if(a.exp&&b.exp) return a.exp<b.exp?-1:(a.exp>b.exp?1:(a.ts-b.ts)); if(a.exp) return -1; if(b.exp) return 1; return a.ts-b.ts; }); // มีวันหมดอายุ→เร็วสุดก่อน · ไม่ระบุ→ท้าย
  let out=moves.reduce((s,m)=>{const d=Number(m.delta)||0; return s+(d<0?-d:0);},0);   // ยอดเบิก+ปรับลดรวม → หักแบบ FEFO
  for(let i=0;i<lots.length&&out>0;i++){ const take=Math.min(lots[i].qty,out); lots[i].qty-=take; out-=take; }
  return lots.filter(l=>l.qty>0);
}

}
function queueSave(){ if(_saveTimer) return; _saveTimer=setTimeout(function(){_saveTimer=null;saveState();}, 400); } // debounce กันบันทึกถี่
function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY); if(!raw) return false;
    const d=JSON.parse(raw); if(!d || d.v!==STORE_VER || !Array.isArray(d.HOUSES)) return false;
    HOUSES=d.HOUSES;
    if(Array.isArray(d.FARMS)){ FARMS.length=0; d.FARMS.forEach(f=>FARMS.push(f)); }
    if(Array.isArray(d.VETS)){ VETS.length=0; d.VETS.forEach(v=>VETS.push(v)); }
    applyOpts(d.OPTS);                       // คืนค่าตัวเลือกฟอร์มเสมียน (แหล่งรับเข้า/ตาย/คัด/ลูกค้า)
    if(Array.isArray(d.MEDFORMULAS)){ MEDFORMULAS.length=0; d.MEDFORMULAS.forEach(f=>MEDFORMULAS.push(f)); } // คืนสูตรยาที่แก้ไว้
    if(d.REQ_DATA&&typeof d.REQ_DATA==='object'){ Object.keys(d.REQ_DATA).forEach(k=>{ if(Array.isArray(d.REQ_DATA[k])) REQ_DATA[k]=d.REQ_DATA[k]; }); } // คืนแคทาล็อกเบิกยา
    if(d.STOCK&&typeof d.STOCK==='object') STOCK=d.STOCK;   // คืนคลัง/สต็อกต่อฟาร์ม
    return true;
  }catch(e){ console.warn("loadState ล้มเหลว", e); return false; }
}

/* ---------- (C) Supabase adapter — เก็บสถานะทั้งก้อนเป็น 1 แถว JSON (เอกสาร) ----------
   ใช้ REST ของ Supabase ตรงๆ ไม่ต้องโหลดไลบรารี. saveState จะยิงขึ้นคลาวด์อัตโนมัติ */
async function cloudSave(){
  const c=CONFIG.supabase; if(!(c.enabled&&c.url&&c.anonKey)) return false;
  const t=await supaToken();
  if(ROLE!==null && !t){ sessionExpired(); return false; }   // ล็อกอินอยู่แต่ token หมดอายุกู้ไม่ได้ → ไม่บันทึกเงียบๆ (กันข้อมูลหายโดยไม่รู้ตัว)
  const send=tok=>fetch(`${c.url}/rest/v1/${c.table}?on_conflict=id`,{
      method:"POST", keepalive:true,   // keepalive: ให้คำขอบันทึกยังส่งต่อได้แม้กำลังปิด/รีเฟรชหน้า (กันการแก้ครั้งสุดท้ายไม่ขึ้นคลาวด์)
      headers:{apikey:c.anonKey, Authorization:"Bearer "+(tok||c.anonKey), "Content-Type":"application/json", Prefer:"resolution=merge-duplicates"},
      body:JSON.stringify({id:c.rowId, data:{HOUSES,FARMS,VETS,v:STORE_VER,ts:Date.now(),OPTS:snapOpts(),MEDFORMULAS,REQ_DATA,STOCK}, updated_at:new Date().toISOString()})
    });
  try{
    let r=await send(t);
    if(r.status===401||r.status===403){                       // token หมดอายุ → รีเฟรชแล้วลองใหม่ · ถ้ารีเฟรชไม่ได้ → แจ้งผู้ใช้
      if(await supaRefresh()) r=await send(SUPA.access_token);
      else if(ROLE!==null){ sessionExpired(); return false; }
    }
    return r.ok;
  }catch(e){ console.warn("cloudSave ล้มเหลว", e); return false; }
}
async function cloudLoad(){
  if(CONFIG.supabase.backend==='v2') return await cloudLoadV2(); // v2: โหลดรายหลังผ่าน RPC
  const c=CONFIG.supabase; if(!(c.enabled&&c.url&&c.anonKey)) return false;
  const t=await supaToken();
  if(ROLE!==null && !t){ sessionExpired(); return false; }
  const fetchRow=tok=>fetch(`${c.url}/rest/v1/${c.table}?id=eq.${encodeURIComponent(c.rowId)}&select=data,updated_at`,{
      headers:{apikey:c.anonKey, Authorization:"Bearer "+(tok||c.anonKey)}
    });
  try{
    let r=await fetchRow(t);
    if(r.status===401||r.status===403){
      if(await supaRefresh()) r=await fetchRow(SUPA.access_token);
      else if(ROLE!==null){ sessionExpired(); return false; }
    }
    if(!r.ok) return false;
    const rows=await r.json(); const row=rows&&rows[0]; const d=row&&row.data;
    if(!d || !Array.isArray(d.HOUSES)) return false;
    if(d.v!==STORE_VER) return 'stale';      // คลาวด์เป็นข้อมูลคนละรุ่น (โครงสร้าง/ตัวอย่างเก่า) → ใช้ข้อมูลตัวอย่างรุ่นใหม่แล้วเขียนทับขึ้นไป
    // กันข้อมูลในเครื่องที่ "ยังไม่ถูกซิงก์" ถูกคลาวด์รุ่นเก่ากว่าเขียนทับ → เทียบเวลาแก้ล่าสุด
    const cloudTs=Date.parse((row&&row.updated_at)||0)||(d.ts||0)||0;
    let localTs=0; try{ const ls=JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); if(ls&&ls.v===STORE_VER) localTs=ls.ts||0; }catch(e){}
    if(localTs>cloudTs && loadState()){ cloudSave(); return true; } // ในเครื่องใหม่กว่า → ใช้ของในเครื่อง แล้วดันขึ้นคลาวด์
    HOUSES=d.HOUSES;
    if(Array.isArray(d.FARMS)){ FARMS.length=0; d.FARMS.forEach(f=>FARMS.push(f)); }
    if(Array.isArray(d.VETS)){ VETS.length=0; d.VETS.forEach(v=>VETS.push(v)); }
    applyOpts(d.OPTS);                       // คืนค่าตัวเลือกฟอร์มเสมียนจากคลาวด์
    if(Array.isArray(d.MEDFORMULAS)){ MEDFORMULAS.length=0; d.MEDFORMULAS.forEach(f=>MEDFORMULAS.push(f)); } // คืนสูตรยาที่แก้ไว้
    if(d.REQ_DATA&&typeof d.REQ_DATA==='object'){ Object.keys(d.REQ_DATA).forEach(k=>{ if(Array.isArray(d.REQ_DATA[k])) REQ_DATA[k]=d.REQ_DATA[k]; }); } // คืนแคทาล็อกเบิกยา
    if(d.STOCK&&typeof d.STOCK==='object') STOCK=d.STOCK;   // คืนคลัง/สต็อกต่อฟาร์ม
    return true;
  }catch(e){ console.warn("cloudLoad ล้มเหลว", e); return false; }
}

   ทำงานเมื่อ CONFIG.supabase.backend==='v2' (กฎสิทธิ์ตามบทบาท/ฟาร์มบังคับที่เซิร์ฟเวอร์)
   ============================================================ */
const VET_KEYS=['vetLog','meds','feedReqs','vaccineLog']; // "งานหมอ" (vaccineLog = ประวัติการทำวัคซีนรายครั้ง)
const CORE_KEYS=['code','farm','zone','cap','area','fanTotal','fanNo','fanSh','breed','vet','worker','assistant','source','status','cleanStart','closedDate','sick','mortality','fcr','note','pigletHistory','vaccineHistory','originVet','originAsst','originWorker']; // "ข้อมูลหลัง"
function _pick(o,keys){const r={};keys.forEach(k=>{if(o[k]!==undefined)r[k]=o[k];});return r;}
function houseCoreData(h){ return _pick(h,CORE_KEYS); }
function houseVetData(h){ const d=_pick(h,VET_KEYS); d.editLog=(h.editLog||[]).filter(e=>e&&e._dom==='vet'); return d; }
function houseClerkData(h){ // "งานเสมียน" = ที่เหลือทั้งหมด (intake/pigs/dailyLog/incoming/batch/closedBatches…)
  const skip={id:1}; VET_KEYS.forEach(k=>skip[k]=1); CORE_KEYS.forEach(k=>skip[k]=1); skip.editLog=1;
  const d={}; Object.keys(h).forEach(k=>{ if(!skip[k]) d[k]=h[k]; });
  d.editLog=(h.editLog||[]).filter(e=>!(e&&e._dom==='vet')); // ประวัติแก้ของเสมียน/ผู้ดูแล
  return d;
}
function mergeHouse(row){ // ประกอบ 3 ช่อง → object หลังในหน่วยความจำ
  const h=Object.assign({}, row.core||{}, row.clerk||{}, row.vet||{});
  h.id=row.id; h.farm=row.farm; h.code=row.code||h.code;
  const cl=(row.clerk&&row.clerk.editLog)||[], vl=(row.vet&&row.vet.editLog)||[];
  h.editLog=cl.concat(vl).sort((a,b)=>(b.ts||0)-(a.ts||0)); // รวมประวัติแก้จากทั้งสองช่อง (ใหม่สุดก่อน)
  return h;
}
async function supaFetch(path, opts){ // REST helper พร้อม token + รีเฟรชอัตโนมัติ
  const c=CONFIG.supabase; const t=await supaToken();
  if(ROLE!==null && !t){ sessionExpired(); return null; }
  opts=opts||{};
  const go=tok=>fetch(c.url+path, Object.assign({}, opts, {keepalive:true,
    headers:Object.assign({apikey:c.anonKey, Authorization:"Bearer "+(tok||c.anonKey)}, opts.headers||{})}));
  try{
    let r=await go(t);
    if(r.status===401||r.status===403){ if(await supaRefresh()) r=await go(SUPA.access_token); else if(ROLE!==null){ sessionExpired(); return null; } }
    return r;
  }catch(e){ console.warn('supaFetch',path,e); return null; }
}

function syncHouse(h, section){
  queueSave(); // เก็บลงเครื่อง (cache offline) · v1 ยิงคลาวด์ทั้งก้อนด้วย
  if(CONFIG.supabase.enabled && CONFIG.supabase.backend==='v2' && h){ _dirtyH[h.id+':'+section]={h:h,section:section}; scheduleSyncV2(); }
}
function syncHouseClerk(h){ syncHouse(h,'core'); syncHouse(h,'clerk'); } // เสมียนแก้ → core(สถานะ/ทีม)+clerk
function syncHouseVet(h){ syncHouse(h,'vet'); }
function syncHouseCore(h){ syncHouse(h,'core'); }
function syncConfig(){ queueSave(); if(CONFIG.supabase.enabled && CONFIG.supabase.backend==='v2'){ _dirtyCfg=true; scheduleSyncV2(); } }
function scheduleSyncV2(){ if(_syncTimer2) return; _syncTimer2=setTimeout(flushSyncV2,500); }
async function flushSyncV2(){
  _syncTimer2=null;
  const items=Object.values(_dirtyH); _dirtyH={};
  const cfg=_dirtyCfg; _dirtyCfg=false;
  const bills=Object.values(_dirtySB); _dirtySB={};
  let requeue=false; // 🛡️ ซิงก์ล้มเหลว (เน็ตสะดุด) = คิวกลับไว้ส่งใหม่ ไม่ปล่อยการแก้หายเงียบ (เดิมล้างคิวก่อนส่ง → sbCloudLoad/rtPoll ดึงฉบับเก่ามาทับ)
  for(const it of items){ let ok=false; try{ ok=await saveHouseSection(it.h,it.section); }catch(e){ console.warn('sync house',e); }
    if(!ok){ const k=it.h.id+':'+it.section; if(!_dirtyH[k]) _dirtyH[k]=it; requeue=true; } }
  if(cfg){ let ok=false; try{ ok=await saveConfigAll(); }catch(e){ console.warn('sync cfg',e); } if(!ok){ _dirtyCfg=true; requeue=true; } }
  for(const b of bills){ let r=false; try{ r=await saveSaleBillRemote(b); }catch(e){ console.warn('sync salebill',e); }
    if(r===false){ if(!_dirtySB[b.id]) _dirtySB[b.id]=b; requeue=true; } }   // r==='conflict' = มีกล่องถามผู้ใช้แล้ว ไม่ต้องคิวซ้ำ
  if(requeue) setTimeout(()=>{ scheduleSyncV2(); }, 5000);
  try{ rtBaseline(); }catch(e){}   // absorb ของที่เราเพิ่งเขียนเข้าเส้นฐาน → poll จะไม่เตือน "ข้อมูลใหม่" จากการแก้ของตัวเอง
}
/* ---------- Realtime-lite: เตือนเมื่อทีมคนอื่นแก้ข้อมูล (poll updated_at ทุก 25 วิ · ไม่ทับข้อมูลที่กำลังพิมพ์) ---------- */
let _rtTimer=null, _rtSeenTs=0;
function rtActive(){ const c=CONFIG.supabase; return !!(c&&c.enabled&&c.backend==='v2'&&ROLE!==null); }
async function rtMaxTs(){
  const q=async tbl=>{ const r=await supaFetch('/rest/v1/'+tbl+'?select=updated_at&order=updated_at.desc&limit=1',{method:'GET'}); if(!r||!r.ok) return 0; const a=await r.json(); return (a&&a[0]&&a[0].updated_at)?Date.parse(a[0].updated_at):0; };
  try{ const a=await Promise.all([q('houses'),q('app_config'),q('sale_bills')]); return Math.max(a[0]||0,a[1]||0,a[2]||0); }catch(e){ return 0; }
}
async function rtBaseline(){ if(!rtActive()) return; const t=await supaToken(); if(!t) return; const mx=await rtMaxTs(); if(mx) _rtSeenTs=mx; }
async function rtPoll(){
  try{
    if(document.hidden||!rtActive()) return;
    const t=await supaToken(); if(!t) return;
    const mx=await rtMaxTs(); if(!mx) return;
    if(_rtSeenTs===0){ _rtSeenTs=mx; return; }     // ครั้งแรก = ตั้งเส้นฐานเฉยๆ
    if(mx>_rtSeenTs){ _rtSeenTs=mx;
      const top=navHist[navHist.length-1];
      if(top&&top.key==='fgraph'&&typeof gLiveRefresh==='function'){ gLiveRefresh(); } // หน้าแผนผัง = โหลด+วาดใหม่เอง + วาบแสงเล้าที่เปลี่ยน
      else if(top&&top.key==='sbmonitor'){ /* หน้ามอนิเตอร์แท่นขายรีเฟรชตัวเองทุก 5 วิอยู่แล้ว — ไม่ต้องเด้งแบนเนอร์ทับจอ */ }
      else if(top&&top.key==='salestand'&&!SB_D){ // หน้ารายการบิล = ดึงบิลใหม่ของทีมมาแสดงเองเลย (ไม่มีฟอร์มเปิดอยู่ ปลอดภัย)
        try{ await sbCloudLoad(); const t2=navHist[navHist.length-1]; if(t2&&t2.key==='salestand'&&!SB_D){ renderSaleStand(); toast('🔄 มีบิลใหม่จากทีม — อัปเดตรายการให้แล้ว'); } }catch(e){}
      }
      else rtShowBanner();
    }
  }catch(e){}
}
function rtStart(){ if(_rtTimer||!rtActive()) return; _rtTimer=setInterval(rtPoll,25000); }
function rtShowBanner(){
  if(document.getElementById('rtBanner')) return;
  const d=document.createElement('div'); d.id='rtBanner';
  d.style.cssText='position:fixed;left:50%;top:62px;transform:translateX(-50%);z-index:70;background:var(--brand,#0f6b5f);color:#fff;padding:9px 14px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.28);font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:12px;max-width:92vw';
  const btn=document.createElement('span'); btn.style.cursor='pointer'; btn.textContent='🔄 มีข้อมูลใหม่จากทีม — แตะเพื่อโหลดล่าสุด'; btn.onclick=rtRefresh;
  const x=document.createElement('span'); x.style.cssText='cursor:pointer;opacity:.75;font-weight:400'; x.textContent='✕'; x.onclick=function(e){ e.stopPropagation(); d.remove(); };
  d.appendChild(btn); d.appendChild(x); document.body.appendChild(d);
}
async function rtRefresh(){
  const el=document.getElementById('rtBanner'); if(el) el.remove();
  try{ await cloudLoadV2(); }catch(e){}
  try{ const mx=await rtMaxTs(); if(mx) _rtSeenTs=mx; }catch(e){}
  try{ const top=navHist[navHist.length-1]; if(top&&top.fn) top.fn(); }catch(e){}
  try{ toast('โหลดข้อมูลล่าสุดจากทีมแล้ว ✓'); }catch(e){}
}

/* ---------- (C2) Supabase Auth — ล็อกอินจริง (ชื่อผู้ใช้ + รหัสผ่าน) ผ่าน GoTrue REST ----------
   เก็บ session (access/refresh token) ใน localStorage · ใช้ token ของผู้ใช้เวลาอ่าน/เขียนข้อมูล
   พนักงานพิมพ์แค่ "ชื่อผู้ใช้" → map เป็นอีเมลภายใน <user>@pigfarm.local */
const AUTH_KEY="farmAuth", AUTH_DOMAIN="@pigfarm.local";
let SUPA=null, _sessExpired=false; // SUPA={access_token, refresh_token, expires_at, user:{...}} · _sessExpired กันแจ้งเตือนหมดอายุซ้ำ
function uname2email(u){ u=String(u||'').trim(); return u.includes('@')?u.toLowerCase():u.toLowerCase()+AUTH_DOMAIN; }
function saveSession(){ try{ localStorage.setItem(AUTH_KEY, JSON.stringify(SUPA)); }catch(e){} }
function clearSession(){ SUPA=null; try{ localStorage.removeItem(AUTH_KEY); }catch(e){} }
function loadSession(){ try{ const s=JSON.parse(localStorage.getItem(AUTH_KEY)||'null'); if(s&&s.access_token) SUPA=s; }catch(e){} return SUPA; }
function setSession(j){ // j = ผลลัพธ์ token จาก GoTrue
  const m=(j.user&&j.user.user_metadata)||{};
  SUPA={ access_token:j.access_token, refresh_token:j.refresh_token,
    expires_at: Date.now()+((j.expires_in||3600)*1000),
    user:{ id:(j.user&&j.user.id)||'', email:(j.user&&j.user.email)||'', role:m.role||'', name:m.name||'', username:m.username||'' } };
  saveSession();
}
function authErrTh(m){ m=String(m||'');   // แปลข้อความ error ของ Supabase เป็นไทย (ผู้ใช้ไม่เทคนิค)
  if(/invalid login credentials/i.test(m)) return "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
  if(/email not confirmed/i.test(m)) return "บัญชีนี้ยังไม่ได้ยืนยัน — แจ้งผู้ดูแลระบบ";
  if(/rate limit|too many|over_email/i.test(m)) return "เข้าสู่ระบบบ่อยเกินไป รอสักครู่แล้วลองใหม่";
  return m || "เข้าสู่ระบบไม่สำเร็จ";
}
async function supaSignIn(username, password){
  const c=CONFIG.supabase;
  try{
    const r=await fetch(c.url+"/auth/v1/token?grant_type=password",{
      method:"POST", headers:{apikey:c.anonKey,"Content-Type":"application/json"},
      body:JSON.stringify({email:uname2email(username), password})
    });
    const j=await r.json();
    if(!r.ok || !j.access_token) return {ok:false, error:authErrTh(j.error_description||j.msg||j.error)};
    setSession(j);
    return {ok:true, user:SUPA.user};
  }catch(e){ return {ok:false, error:"เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ลองใหม่อีกครั้ง"}; }
}
async function supaRefresh(){
  const c=CONFIG.supabase; if(!(SUPA&&SUPA.refresh_token)) return false;
  try{
    const r=await fetch(c.url+"/auth/v1/token?grant_type=refresh_token",{
      method:"POST", headers:{apikey:c.anonKey,"Content-Type":"application/json"},
      body:JSON.stringify({refresh_token:SUPA.refresh_token})
    });
    const j=await r.json();
    if(!r.ok || !j.access_token){ clearSession(); return false; }
    setSession(j); return true;
  }catch(e){ return false; }
}
async function supaToken(){ // คืน access token ที่ยังไม่หมดอายุ (รีเฟรชอัตโนมัติถ้าใกล้หมด)
  if(!SUPA) return null;
  if(Date.now() > (SUPA.expires_at||0) - 60000){ const ok=await supaRefresh(); if(!ok) return null; }
  return SUPA.access_token;
}
async function supaSignOut(){
  const c=CONFIG.supabase;
  try{ if(SUPA&&SUPA.access_token) await fetch(c.url+"/auth/v1/logout",{method:"POST",headers:{apikey:c.anonKey,Authorization:"Bearer "+SUPA.access_token}}); }catch(e){}
}
// map บัญชีที่ล็อกอิน → โปรไฟล์ในแอป (บทบาท + ฟาร์มที่ดูแล + ชื่อ) · ฟาร์มที่ดูแลกำหนดในแอป, บทบาท/ชื่อจาก token
function appProfile(u){
  // v2: ใช้โปรไฟล์จากตาราง app_users (บทบาท+ฟาร์ม) ที่ดึงมาตอน cloudLoad · เจ้าของ/ผู้ดูแล/เสมียน=เห็นทุกฟาร์ม("*") · หมอ=เฉพาะฟาร์มที่ถูกผูกไว้
  const p=_dbProfile;
  if(p && p.role){
    const seeAll=(p.role==='owner'||p.role==='admin'||p.role==='clerk');
    return { username:p.username||u.username||'', name:p.name||u.name||'', role:p.role, farms: seeAll?"*":(Array.isArray(p.farms)?p.farms:[]) };
  }
  // fallback (v1 / ยังไม่มีโปรไฟล์): บัญชีที่ไม่มีใน USERS → ไม่เห็นฟาร์มใดเลย ([]) กันเห็นข้อมูลทั้งหมดโดยไม่ได้ตั้งใจ
  const base=USERS.find(x=>x.username===u.username) || USERS.find(x=>x.role===u.role) || {};
  return { username:u.username||base.username||'', name:u.name||base.name||'', role:u.role||base.role||'clerk', farms:(base.farms!==undefined?base.farms:[]) };
}
// เซสชันหมดอายุระหว่างใช้งาน (รีเฟรช token ไม่ได้) → แจ้งผู้ใช้ + กลับไปหน้าล็อกอิน (กันบันทึกไม่ขึ้นคลาวด์โดยไม่รู้ตัว)
function sessionExpired(){
  if(ROLE===null || _sessExpired) return;   // ยังไม่ได้เข้าแอป หรือแจ้งไปแล้ว → ไม่ทำซ้ำ
  _sessExpired=true;
  toast("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่ (ข้อมูลที่แก้ล่าสุดยังอยู่ในเครื่องนี้)");
  logout();
}

/* ---------- (D) LINE Login (LIFF) + แจ้งเตือน ---------- */
async function lineLogin(){
  const c=CONFIG.line;
  if(!(c.enabled && c.liffId && window.liff)){            // ยังไม่ตั้งค่า → ไม่เข้าระบบให้ (ต้องล็อกอินด้วยรหัสผ่านจริง)
    toast("ระบบ LINE Login ยังไม่เปิดใช้ — เข้าสู่ระบบด้วยชื่อผู้ใช้และรหัสผ่าน");
    return;
  }
  try{
    await liff.init({liffId:c.liffId});
    if(!liff.isLoggedIn()){ liff.login(); return; }       // redirect ไปยืนยันใน LINE แล้วกลับมา
    const p=await liff.getProfile();                       // {userId, displayName, ...}
    const u=USERS.find(x=>x.lineUserId===p.userId);        // ผูก LINE userId → บัญชีพนักงาน
    if(u) doLogin(u);
    else toast("บัญชี LINE \""+p.displayName+"\" ยังไม่ได้ผูกกับพนักงาน — แจ้งผู้ดูแลเพื่อเพิ่มสิทธิ์");
  }catch(e){ console.warn(e); toast("เชื่อม LINE ไม่สำเร็จ ลองใหม่อีกครั้ง"); }
}
// ส่งแจ้งเตือนผ่าน backend (backend ถือ token แล้วเรียก Messaging API push) — ไม่ทำอะไรถ้ายังไม่ตั้งค่า
async function notifyLine(message, toUserId){
  const c=CONFIG.line; if(!(c.enabled && c.notifyEndpoint)) return false;
  try{ const r=await fetch(c.notifyEndpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({to:toUserId||null, message})}); return r.ok; }
  catch(e){ console.warn("notifyLine ล้มเหลว", e); return false; }
}

// ── Audit กันโกงฝั่งเซิร์ฟเวอร์: ยิงบันทึกเข้า audit_log (append-only · เซิร์ฟเวอร์ประทับผู้แก้จาก token จริง) ──
// fire-and-forget · ทำงานเฉพาะโหมดคลาวด์จริงที่มี token · ไม่มี token (เช่น preview) → ข้ามเงียบๆ ไม่ล็อกเอาต์/ไม่พังของเดิม
async function logAudit(entity, entity_id, action, changes, note){
  try{
    const c=CONFIG.supabase;
    if(!(c && c.enabled && c.backend==='v2' && c.url && c.anonKey)) return;
    const t=await supaToken(); if(!t) return;
    fetch(c.url+'/rest/v1/audit_log',{method:'POST',keepalive:true,
      headers:{'Content-Type':'application/json',apikey:c.anonKey,Authorization:'Bearer '+t,Prefer:'return=minimal'},
      body:JSON.stringify({entity:entity||'', entity_id:(entity_id==null?'':String(entity_id)), action:action||'', changes:(changes&&changes.length)?changes:null, note:note||''})
    }).catch(e=>console.warn('logAudit',e));
  }catch(e){ console.warn('logAudit',e); }
}
function logHouseEdit(h,changes,note){
  if(!h) return;
  changes=(changes||[]).filter(c=>c);
  if(!changes.length && !note) return;
  h.editLog=h.editLog||[];
  h.editLog.unshift({time:nowStamp(),ts:Date.now(),by:whoNow(),role:ROLE_LABEL[ROLE]||'-',_dom:(ROLE==='vet'?'vet':'clerk'),changes:changes,note:note||''});
  logAudit('หลัง', h.code, note||'แก้ไขข้อมูล', changes, note);   // สำเนากันโกงลงเซิร์ฟเวอร์ (ครอบคลุม รายวัน/รับเข้า/เบิกยา/หมอ/ย้อนหลัง)
  queueSave(); // ตัวคอลเลอร์จะ syncHouse(ช่องที่ถูกต้อง) ตามมา ทำให้ประวัติแก้ถูกเก็บลงช่อง core/clerk/vet
}
function diffFields(o,nw,labels){
  o=o||{}; nw=nw||{};
  const cmp=v=>{ if(v==null||v===''||v==='-'||v===0||v==='0') return ''; return String(v).trim(); }; // 0/ว่าง/-/undefined = ค่าเดียวกัน
  const disp=v=>(v==null||v===''||v==='-')?'(ว่าง)':v;
  return Object.keys(labels).filter(k=>cmp(o[k])!==cmp(nw[k]))
    .map(k=>({label:labels[k],from:disp(o[k]),to:disp(nw[k])}));
}

  route();
  try{ rtStart(); rtBaseline(); }catch(e){}   // เริ่มเฝ้าดูข้อมูลใหม่จากทีม (realtime-lite)
  try{ presenceStart(); }catch(e){}           // ☄️ ส่งสัญญาณออนไลน์ — โผล่เป็นดาวหางบนแผนผังของทุกคน

// ตรวจชื่อผู้ใช้ + รหัสผ่านกับ Supabase Auth จริง (เซิร์ฟเวอร์เป็นคนยืนยัน ไม่ใช่โค้ดหน้าเว็บ)
async function login(){
  const err=$("#lg_err"); if(err){err.classList.remove("show");err.textContent="";}
  const uname=(($("#lg_user")||{}).value||"").trim();
  const p=String((($("#lg_pass")||{}).value)||"");
  if(!uname || !p){
    if(err){err.textContent="กรุณากรอกชื่อผู้ใช้และรหัสผ่าน";err.classList.add("show");}
    return;
  }
  const btn=$(".lg-primary"), orig=btn?btn.textContent:'';
  if(btn){ btn.disabled=true; btn.textContent="กำลังเข้าสู่ระบบ…"; }
  const res=await supaSignIn(uname, p);
  if(btn){ btn.disabled=false; btn.textContent=orig; }
  if(!res.ok){
    if(err){err.textContent=res.error||"ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";err.classList.add("show");}
    const pf=$("#lg_pass"); if(pf){pf.value="";pf.focus();}
    return;
  }
  try{ const cl=await cloudLoad(); if(cl==='stale') saveState(); else if(!cl) loadState(); }catch(e){}   // โหลดข้อมูลกลางด้วย token ของผู้ใช้ ก่อนเข้าแอป (คลาวด์รุ่นเก่า → ใช้ตัวอย่างรุ่นใหม่แล้วดันขึ้น)
  doLogin(appProfile(res.user));
}
// แตะปุ่มบทบาท → กรอกชื่อผู้ใช้ให้ (ยังต้องพิมพ์รหัสผ่านเอง — ไม่ใช่ทางลัดข้ามการยืนยันตัวตน)
function enter(role){ const u=USERS.find(x=>x.role===role); const f=$("#lg_user"); if(u&&f){ f.value=u.username; const pf=$("#lg_pass"); if(pf) pf.focus(); } }

function loginWithLine(){ toast("ระบบ LINE Login ยังไม่เปิดใช้ — เข้าสู่ระบบด้วยชื่อผู้ใช้และรหัสผ่าน"); }
function logout(){
  try{ sbLiveClear(); }catch(e){}       // เคลียร์การ์ดบนมอนิเตอร์แท่นขาย (ยิงก่อนโทเคนถูกลบ)
  try{ presenceStop(); }catch(e){}      // หยุดสัญญาณออนไลน์ — ดาวหางหายไปเองใน ~2 นาที
  supaSignOut(); clearSession();        // ออกจากระบบ Supabase + ลบ session ในเครื่อง
  ROLE=null;CURRENT_USER=null;currentHouse=null;navHist=[];
  const e=$("#lg_err"); if(e){e.classList.remove("show");e.textContent="";}
  const uf=$("#lg_user"); if(uf) uf.value="";
  const pf=$("#lg_pass"); if(pf) pf.value="";
  $("#app").classList.add("hidden");$("#login").classList.remove("hidden");
}

/* ---------- navigation history (ปุ่มย้อนกลับ) ---------- */
let navHist=[], navBacking=false;
function histPush(key,fn){
  try{ sbSync((fn&&fn.name)||''); }catch(e){} // อัปเดตแถบเมนูซ้าย (จอคอม) ทุกครั้งที่เปลี่ยนหน้า — รวมตอนกดย้อนกลับ
  if(navBacking) return;
  const top=navHist[navHist.length-1];
  if(top && top.key===key){ top.fn=fn; return; }
  navHist.push({key,fn});
  if(navHist.length>60) navHist.shift();
  refreshBack();
}
function navBack(){
  if(navHist.length<2) return;
  navHist.pop();
  const prev=navHist[navHist.length-1];
  navBacking=true; prev.fn(); navBacking=false;
  refreshBack();
}
function refreshBack(){const b=$("#backBtn"); if(b) b.style.display=navHist.length>1?'inline-flex':'none';}

function gSparkHouse(h){
  const L=(h.dailyLog||[]).slice(0,14).reverse(); if(L.length<2) return '';
  const W2=246,H2=46,bw=W2/Math.max(14,L.length);
  const maxB=Math.max(1,...L.map(e=>(e.deadN||0)+(e.cullN||0)+(e.soldN||0)));
  const maxR=Math.max(1,...L.map(e=>e.remain||0));
  let s='';
  L.forEach((e,i)=>{ const x=i*bw;
    const ho=((e.cullN||0)+(e.soldN||0))/maxB*(H2-14), hd=(e.deadN||0)/maxB*(H2-14);
    if(ho>0.5) s+=`<rect x="${(x+1).toFixed(1)}" y="${(H2-ho).toFixed(1)}" width="${(bw-2.5).toFixed(1)}" height="${ho.toFixed(1)}" fill="#3fb98f" opacity=".85"/>`;
    if(hd>0.5) s+=`<rect x="${(x+1).toFixed(1)}" y="${(H2-ho-hd).toFixed(1)}" width="${(bw-2.5).toFixed(1)}" height="${hd.toFixed(1)}" fill="#e2603f" opacity=".92"/>`;
  });
  s+=`<polyline points="${L.map((e,i)=>((i+0.5)*bw).toFixed(1)+','+(5+(1-(e.remain||0)/maxR)*(H2-20)).toFixed(1)).join(' ')}" fill="none" stroke="#2a9d8f" stroke-width="1.7" opacity=".95"/>`;
  return `<div style="margin-top:8px"><svg width="${W2}" height="${H2}" style="display:block;background:rgba(42,157,143,.07);border-radius:7px">${s}</svg><span class="sub" style="margin:0;font-size:10.5px">แนวโน้ม ${L.length} วันล่าสุด: 🟥 ตาย · 🟩 คัด+ขาย · เส้น = คงเหลือ</span></div>`;
}

function gBurst(x,y){ // เม็ดแสงพุ่งจากเล้าที่มีข้อมูลใหม่ เข้าศูนย์กลาง SJF

function gPartsStart(){ // เม็ดแสงวิ่งตามเส้น เล้า→หมอ→ฟาร์ม→SJF (หยุดเองเมื่อออกจากหน้า)

function gMoveHouse(id,p){

function gRelaxLabels(){
  const pos=window._gHousePos||{}, ids=Object.keys(pos), MIN=70;
  const touched={};
  for(let iter=0;iter<4;iter++){
    let moved=false;
    for(let a=0;a<ids.length;a++){ const p=pos[ids[a]];
      for(let b=a+1;b<ids.length;b++){ const q=pos[ids[b]];
        let dx=q[0]-p[0], dy=q[1]-p[1];
        if(dx>MIN||dx<-MIN||dy>MIN||dy<-MIN) continue;
        const d=Math.hypot(dx,dy);
        if(d>=MIN) continue;
        if(d<1){ dx=1; dy=0; } // ซ้อนพอดี — ดันแนวนอน
        const k=((MIN-Math.max(d,1))/2)/Math.max(d,1);
        p[0]-=dx*k; p[1]-=dy*k; q[0]+=dx*k; q[1]+=dy*k;
        touched[ids[a]]=1; touched[ids[b]]=1; moved=true;
      } }
    if(!moved) break;
  }
  Object.keys(touched).forEach(id=>gMoveHouse(id,pos[id]));
}
function gOrbitSVG(cx,cy,HH,botPad){ // วาดดาวหาง 1 ดวง/คน — ทุกวงอยู่ "นอกเขตเล้า" เสมอ (ไม่วิ่งทับจุด/ตัวเลขใต้เล้า และไม่ทับแถวหมอด้านล่าง)
  const users=(_gpUsers&&_gpUsers.length)?_gpUsers:[{name:(typeof whoNow==='function'?whoNow():'ฉัน'),role:ROLE||'owner'}];
  const COL={owner:'#ffd166',admin:'#6fc6f2',clerk:'#7ae2b8',vet:'#f3a7e0',formula:'#c9b3ff'};
  const n=Math.min(users.length,12);
  // เขตเล้าสุดขอบ = HH/2-185 (ตอนคำนวณผืนกราฟ) + ป้ายตัวเลขใต้เล้า ~40px → วงในสุดเริ่มที่ HH/2-140
  const inner=HH/2-140;
  const outer=Math.max(inner+12, HH/2-Math.max(96,(botPad||40)+34)); // วงนอกสุด: เว้นแถวหมอที่ยังไม่ระบุเล้า (ด้านล่าง) + ขอบผืนกราฟ
  const step=n>1?(outer-inner)/2:0;
  return users.slice(0,12).map((u,i)=>{
    const col=COL[u.role]||'#9fe8d8', RO=inner+(i%3)*step, a0=Math.round(i*360/n), rev=(i%2===1);
    const dur=46+((i*9)%26), hx=cx+RO, hy=cy;
    const tail=[5,4,3,2,1].map(k=>{ const ang=(rev?1:-1)*k*0.045, x=cx+RO*Math.cos(ang), y=cy+RO*Math.sin(ang);
      return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(1+(5-k)*0.75).toFixed(2)}" fill="${col}" opacity="${(0.08+(5-k)*0.13).toFixed(2)}"/>`; }).join('');
    return `<g opacity=".95">
      <animateTransform attributeName="transform" type="rotate" from="${a0} ${cx} ${cy}" to="${a0+(rev?-360:360)} ${cx} ${cy}" dur="${dur}s" repeatCount="indefinite"/>
      ${tail}
      <circle cx="${hx}" cy="${hy}" r="6.5" fill="${col}" style="filter:drop-shadow(0 0 9px ${col})"/>
      <circle cx="${hx}" cy="${hy}" r="2.6" fill="#fff" opacity=".9"/>
      <g><animateTransform attributeName="transform" type="rotate" from="0 ${hx} ${hy}" to="${rev?360:-360} ${hx} ${hy}" dur="${dur}s" repeatCount="indefinite"/>
        <text x="${hx}" y="${hy-15}" text-anchor="middle" style="font-size:13px;font-weight:800;fill:${col};paint-order:stroke;stroke:rgba(10,20,24,.85);stroke-width:3px">${escA((typeof ROLE_ICON!=='undefined'&&ROLE_ICON[u.role])||'👤')} ${escA(u.name||'ผู้ใช้')}</text></g>
    </g>`;
  }).join('');
}

// efficiency score per house from FCR, mortality, data completeness
function houseScore(h){
  const fcr=parseFloat(h.fcr)||2.5, mort=parseFloat(h.mortality)||1.5;
  let s=100 - Math.max(0,(fcr-2.0))*30 - mort*8 - (h.filled?0:8);
  return Math.max(40,Math.min(99,Math.round(s)));
}
function perfBar(label,p){
  const col=p>=85?'var(--ok)':p>=70?'var(--warn)':'var(--bad)';
  return `<div class="bar"><div class="bl">${label}</div>
    <div class="track"><div class="fill" style="width:${p}%;background:${col}"></div></div>
    <div class="bv">${p}%</div></div>`;
}
function avgScore(list){return Math.round(list.reduce((s,h)=>s+houseScore(h),0)/list.length);}
// performance grouped by farm, then by zone within each farm
function perfByFarmHTML(){
  const farms=FARMS.filter(f=>HOUSES.some(h=>h.farm===f));
  const extra=[...new Set(HOUSES.map(h=>h.farm||'ไม่ระบุฟาร์ม'))].filter(f=>!FARMS.includes(f));
  return [...farms,...extra].map(f=>{
    const hs=HOUSES.filter(h=>(h.farm||'ไม่ระบุฟาร์ม')===f);
    if(!hs.length) return '';
    const zones=ZONES.filter(z=>hs.some(h=>h.zone===z));
    const zbars=zones.map(z=>{const zh=hs.filter(h=>h.zone===z);return perfBar(z+' ('+zh.length+' หลัง)',avgScore(zh));}).join("");
    return `<div style="margin-bottom:16px">
      <div class="farmhead" style="margin-bottom:9px">🏭 ${escA(f)}
        <span class="fcount">เฉลี่ยทั้งฟาร์ม ${avgScore(hs)}%</span></div>
      <div class="bars">${zbars}</div>
    </div>`;
  }).join("");
}
// house count + pigs per farm
function farmSummaryHTML(){
  const farms=FARMS.filter(f=>HOUSES.some(h=>h.farm===f));
  const extra=[...new Set(HOUSES.map(h=>h.farm||'ไม่ระบุฟาร์ม'))].filter(f=>!FARMS.includes(f));
  return [...farms,...extra].map(f=>{
    const hs=HOUSES.filter(h=>(h.farm||'ไม่ระบุฟาร์ม')===f);
    if(!hs.length) return '';
    const pigs=hs.reduce((s,h)=>s+h.pigs,0);
    const pending=hs.filter(h=>!h.filled).length;
    return `<tr><td class="lab">🏭 ${escA(f)}</td>
      <td class="num"><b>${hs.length}</b> หลัง</td>
      <td class="num">${fmt(pigs)} ตัว</td>
      <td>${pending?'<span class="tag wait">'+pending+' รอกรอก</span>':'<span class="tag ok">ครบ</span>'}</td></tr>`;
  }).join("");
}

// แปลงวันที่ไทย "8 มิ.ย." → ตัวเลขเรียงได้ (เดือน×100 + วัน) เพื่อเทียบช่วง
const THAI_MON={'ม.ค.':1,'ก.พ.':2,'มี.ค.':3,'เม.ย.':4,'พ.ค.':5,'มิ.ย.':6,'ก.ค.':7,'ส.ค.':8,'ก.ย.':9,'ต.ค.':10,'พ.ย.':11,'ธ.ค.':12};
function isoToThaiDay(iso){ if(!iso) return DEMO_DATE_DAY; const p=String(iso).split('-'); if(p.length<3) return DEMO_DATE_DAY; const d=+p[2],mo=+p[1]; return (d||'')+' '+(THAI_MON_ABBR[mo-1]||''); } // "2026-06-16" → "16 มิ.ย." (THAI_MON_ABBR ประกาศไว้ด้านล่าง)
function thaiDayToISO(s){ const d=parseThaiDate(s); return d?expISO(d):''; } // "16 มิ.ย." → "2026-06-16"
function reqDateKey(d){d=String(d||'');const day=(d.match(/(\d+)/)||[])[1];let mon=0;for(const k in THAI_MON){if(d.indexOf(k)>-1){mon=THAI_MON[k];break;}}return (mon||0)*100+(parseInt(day)||0);}
function reqToday(){ return new Date(DEMO_DATE.getFullYear(), DEMO_DATE.getMonth(), DEMO_DATE.getDate()); }
function parseThaiDate(s){ // "8 มิ.ย." → Date (ใช้ปีของ DEMO_DATE · ถ้าเป็นวันอนาคต = ปีก่อน)
  s=String(s||''); const day=parseInt((s.match(/(\d+)/)||[])[1]); let mon=0;
  for(const k in THAI_MON){ if(s.indexOf(k)>-1){mon=THAI_MON[k];break;} }
  if(!day||!mon) return null;
  let d=new Date(DEMO_DATE.getFullYear(), mon-1, day);
  if(d>reqToday()) d=new Date(DEMO_DATE.getFullYear()-1, mon-1, day);
  return d;
}
function reqExplicitDate(){ return crDateMode==='range' ? !!(crDateFrom||crDateTo) : !!crDate; } // ผู้ใช้เลือกวันเอง
function reqWithinDaysBackN(dateStr,daysBack){ // หน้าต่าง: วันนี้ + ย้อนหลัง N วัน
  const d=parseThaiDate(dateStr); if(!d) return true;
  const today=reqToday(), cutoff=new Date(today); cutoff.setDate(cutoff.getDate()-(daysBack||0));
  return d>=cutoff && d<=today;
}
function farmDateMatch(m,f){ // ตัวกรองวันที่ "รายฟาร์ม": เลือกวันเอง=ตามนั้น · ไม่งั้น=วันนี้+ย้อนหลังของฟาร์มนั้น
  if(reqExplicitDate()) return reqDateMatch(m);
  return reqWithinDaysBackN(m.date, crFarmDaysBack[f]||0);
}
function farmHasMoreHistory(f){ // ฟาร์มนี้ยังมีการเบิกที่เก่ากว่าหน้าต่างปัจจุบันไหม
  if(reqExplicitDate()) return false;
  const today=reqToday(), cutoff=new Date(today); cutoff.setDate(cutoff.getDate()-(crFarmDaysBack[f]||0));
  return clerkReqAll().some(m=>m.farm===f && (!crHouse||m.house===crHouse) && (!crVet||m.vet===crVet) && (function(){const d=parseThaiDate(m.date);return d&&d<cutoff;})());
}
function farmWindowLabel(f){
  const db=crFarmDaysBack[f]||0, today=reqToday(), cutoff=new Date(today); cutoff.setDate(cutoff.getDate()-db);
  const fmtd=d=>d.getDate()+' '+(THAI_MON_ABBR[d.getMonth()]||'');
  return db<=0 ? ('เฉพาะวันนี้ ('+fmtd(today)+')') : ('ตั้งแต่ '+fmtd(cutoff)+' ถึงวันนี้ · ย้อนหลัง '+db+' วัน');
}
function reqShowMoreFarm(f){ crFarmDaysBack[f]=(crFarmDaysBack[f]||0)+2; renderClerkReq(); } // ดูย้อนหลังเพิ่มของฟาร์มนั้นทีละ 2 วัน
function reqDateMatch(m){ // เฉพาะตัวกรองวันที่/ช่วงที่ผู้ใช้เลือกเอง (ไม่เลือก = ผ่านหมด)
  if(crDateMode==='range'){
    if(!crDateFrom && !crDateTo) return true;
    const k=reqDateKey(m.date);
    const a=crDateFrom?reqDateKey(crDateFrom):-Infinity, b=crDateTo?reqDateKey(crDateTo):Infinity;
    return k>=Math.min(a,b) && k<=Math.max(a,b);
  }
  return !crDate || m.date===crDate;
}
function reqDateLabel(){
  if(crDateMode==='range'){ if(!crDateFrom && !crDateTo) return ''; return (crDateFrom||'ต้น')+' ถึง '+(crDateTo||'ล่าสุด'); }
  return crDate||'';
}
function setReqDateMode(m){ crDateMode=m; if(m==='day'){crDateFrom='';crDateTo='';} else {crDate='';} renderClerkReq(); }
function clerkReqFiltered(){return clerkReqAll().filter(m=>(!crFarm||m.farm===crFarm)&&(!crHouse||m.house===crHouse)&&(!crVet||m.vet===crVet)&&farmDateMatch(m,m.farm));}

    rows:data, totals:['รวม '+rows.length+' รายการ','','','','','',qty,'',sum,'',''] });
  downloadXls('รายการเบิกยา'+(crFarm?'_'+crFarm:'')+(crHouse?'_หลัง'+crHouse:'')+(crVet?'_'+crVet:'')+(dlab?'_'+dlab.replace(/ /g,''):'')+'.xls', html);
  toast('ส่งออกไฟล์ Excel แล้ว ('+rows.length+' รายการ) ✓');
