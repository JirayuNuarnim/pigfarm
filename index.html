/* ---------- ศูนย์รวมส่งออก Excel (เสมียน): "📤 การดึงข้อมูลรวม" — รวมทุกหลังที่ดูแล ---------- */
let expFarm='', expFrom='', expTo='', expHouse='', expVet='', expPreset='';
function expFarmOf(h){ return h.farm||'ไม่ระบุฟาร์ม'; }
// ตัวกรองระดับหลัง: ฟาร์ม + หลัง + หมอ (ใช้ร่วมกันแบบ AND)
function expHouses(){ return myHouses().filter(h=>(!expFarm||expFarmOf(h)===expFarm)&&(!expHouse||h.code===expHouse)&&(!expVet||(h.vet||'')===expVet)); }
function expDate(iso){ if(!iso) return null; const p=String(iso).split('-'); return new Date(+p[0],+p[1]-1,+p[2]); } // ISO → เที่ยงคืนเวลาท้องถิ่น (ให้ตรงกับ parseThaiDate ไม่เพี้ยนเพราะ timezone)
function expInRange(d){ // d=Date|null · ช่วง [expFrom,expTo] · เว้นว่าง=ผ่านหมด
  if(!d) return true;
  const lo=expDate(expFrom), hi=expDate(expTo);
  if(lo && d<lo) return false;
  if(hi){ const t=new Date(hi.getFullYear(),hi.getMonth(),hi.getDate(),23,59,59,999); if(d>t) return false; }
  return true;
}
function expDailyRows(){
  const rows=[];
  expHouses().forEach(h=>{(h.dailyLog||[]).forEach(e=>{ if(e._bfSum&&(expFrom||expTo)) return; if(expInRange(parseThaiDate(e.date))) rows.push({farm:expFarmOf(h),house:h.code,e}); });});  // เลือกช่วงวันที่ = ข้ามแถวยอดสรุปย้อนหลัง (ยอดสะสมทั้งรุ่นไม่ใช่ของช่วงนั้น)
  return rows;
}
// เบิกยา: กรองด้วยชุดรหัสหลังที่ผ่านตัวกรอง (ครอบทั้ง ฟาร์ม/หลัง/หมอ) + ช่วงวันที่
function expReqRows(){ const codes=new Set(expHouses().map(h=>h.code)); return clerkReqAll().filter(m=>codes.has(m.house)&&expInRange(parseThaiDate(m.date))); }
function expClosedRows(){ return allClosedBatches().filter(b=>(!expFarm||(b.farm||'ไม่ระบุฟาร์ม')===expFarm)&&(!expHouse||b.code===expHouse)&&(!expVet||(b.vet||'')===expVet)&&expInRange(b.closedOn?expDate(b.closedOn):null)); }
// ปุ่มช่วงวันที่ด่วน — อ้างอิง DEMO_DATE เป็น "วันนี้" (โปรดักชันตั้ง DEMO_DATE=new Date())
function expISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function setExpPreset(k){
  expPreset=k; const n=DEMO_DATE, y=n.getFullYear(), m=n.getMonth();
  const set=(a,b)=>{ expFrom=a?expISO(a):''; expTo=b?expISO(b):''; };
  if(k==='all') set(null,null);
  else if(k==='m0') set(new Date(y,m,1), n);                                   // เดือนนี้ (1 → วันนี้)
  else if(k==='m1') set(new Date(y,m-1,1), new Date(y,m,0));                   // เดือนก่อน (เต็มเดือน)
  else if(k==='d7') set(new Date(y,m,n.getDate()-6), n);                       // 7 วันล่าสุด
  else if(k==='d30') set(new Date(y,m,n.getDate()-29), n);                     // 30 วันล่าสุด
  else if(k==='h'){ const fh=m<6; set(new Date(y,fh?0:6,1), fh?new Date(y,5,30):new Date(y,11,31)); } // ครึ่งปีปัจจุบัน
  else if(k==='y') set(new Date(y,0,1), n);                                    // ปีนี้ (1 ม.ค. → วันนี้)
  renderClerkExport();
}
function downloadXls(filename,inner){
  const doc='<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body>'+inner+'</body></html>';
  const blob=new Blob(['﻿'+doc],{type:'application/vnd.ms-excel'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
}
// ไฟล์ Excel หลายชีต: sheets=[{name, html(<table>)}] — แต่ละ <table> = 1 ชีตเรียงตามลำดับ (เปิดใน MS Excel เป็นชีตแยก)
function downloadXlsMulti(filename,sheets){
  const xmlNames=sheets.map(s=>'<x:ExcelWorksheet><x:Name>'+String(s.name).replace(/[:\\\/?*\[\]]/g,' ').slice(0,31)+'</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>').join('');
  const body=sheets.map(s=>s.html).join('<br style="page-break-before:always">');
  const doc='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8">'
    +'<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>'+xmlNames+'</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>'+body+'</body></html>';
  const blob=new Blob(['﻿'+doc],{type:'application/vnd.ms-excel'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
}
/* ── ตัวสร้างตาราง Excel กลาง (ใช้ได้ทุกหัวข้อ) — หัวกระดาษแบรนด์ + หัวคอลัมน์สีเขียว + ตัวเลขเป็น "ตัวเลขจริง" (mso-number-format → Excel บวก/เรียงได้) + แถวรวม ── */
const XLS_HEAD_BG='#0f6b5f';
function xlsEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function xlsTd(v,type,o){ o=o||{}; const st=['border:1px solid #cfd8d4','padding:3px 8px'];
  const numeric=(type==='num'||type==='money'||type==='dec');
  let disp;
  if(numeric && v!=='' && v!=null && isFinite(Number(v))){ st.push("mso-number-format:'"+(type==='dec'?'#,##0.00':'#,##0')+"'"); st.push('text-align:right'); disp=Number(v); }
  else { disp=xlsEsc(v); if(type==='money'||type==='num'||type==='dec') st.push('text-align:right'); }
  if(o.bold) st.push('font-weight:bold');
  if(o.top){ st.push('border-top:2px solid #2f6f63'); st.push('background:#eaf4f1'); }
  return '<td style="'+st.join(';')+'">'+disp+'</td>';
}
// opts: {title, meta:[{k,v}], columns:[{label,type:'text|num|money|dec',w}], rows:[[...]], totals:[...] }
function xlsSheet(o){
  const cols=o.columns||[], ncol=cols.length||1;
  let h='';
  if(o.title) h+='<tr><td colspan="'+ncol+'" style="font-size:15pt;font-weight:bold;color:'+XLS_HEAD_BG+'">'+xlsEsc(o.title)+'</td></tr>';
  (o.meta||[]).forEach(m=>{ h+='<tr><td style="font-weight:bold;color:#5a6b66">'+xlsEsc(m.k)+'</td><td colspan="'+(ncol-1)+'">'+xlsEsc(m.v)+'</td></tr>'; });
  if(o.title||o.meta) h+='<tr><td colspan="'+ncol+'" style="height:6px"></td></tr>';
  h+='<tr>'+cols.map(c=>'<th style="background:'+XLS_HEAD_BG+';color:#fff;font-weight:bold;border:1px solid #2f6f63;padding:5px 8px;text-align:'+((c.type&&c.type!=='text')?'right':'left')+'">'+xlsEsc(c.label)+'</th>').join('')+'</tr>';
  (o.rows||[]).forEach(r=>{ h+='<tr>'+cols.map((c,ci)=>xlsTd(r[ci],c.type)).join('')+'</tr>'; });
  if(o.totals) h+='<tr>'+cols.map((c,ci)=>xlsTd(o.totals[ci],c.type,{bold:true,top:true})).join('')+'</tr>';
  const widths=cols.map(c=>'<col width="'+(c.w||90)+'">').join('');
  return '<table border="1" style="border-collapse:collapse;font-family:Tahoma,sans-serif;font-size:10pt">'+widths+h+'</table>';
}
// หัวกระดาษมาตรฐานสำหรับศูนย์รวมส่งออก (เสมียน) — บริษัท/ขอบเขตตัวกรอง/ช่วงวันที่/ผู้ออก

// รายงานภาพรวม: สรุปยอดรวม "ต่อหลัง" (รวมจากบันทึกรายวันในช่วงที่กรอง) — ไม่ใส่ชื่อลูกค้า
function expSummaryRows(){
  return expHouses().map(h=>{
    const t={deadN:0,deadW:0,deadVal:0,cullN:0,cullW:0,cullVal:0,soldN:0,soldW:0,soldVal:0,moveN:0,moveInN:0,days:0};
    (h.dailyLog||[]).forEach(e=>{ if(e._bfSum&&(expFrom||expTo)) return; if(!expInRange(parseThaiDate(e.date))) return; t.days++;  // ช่วงวันที่ = ไม่นับแถวยอดสรุปย้อนหลัง (กันยอดสะสมทั้งรุ่นโผล่เป็นยอดของสัปดาห์/เดือนนี้)
      t.deadN+=e.deadN||0; t.deadW+=e.deadW||0; t.deadVal+=(e.deadVal!=null?+e.deadVal:(e.deadW||0)*(e.deadP||0));
      t.cullN+=e.cullN||0; t.cullW+=e.cullW||0; t.cullVal+=(e.cullVal!=null?+e.cullVal:(e.cullW||0)*(e.cullP||0));
      t.soldN+=e.soldN||0; t.soldW+=e.soldW||0; t.soldVal+=(e.soldVal!=null?+e.soldVal:(e.soldW||0)*(e.soldP||0));
      t.moveN+=e.moveN||0; t.moveInN+=e.moveInN||0;
    });
    return {h:h, t:t};
  }).filter(r=>(r.h.received||0)>0 || r.t.days>0); // เฉพาะหลังที่มีการรับเข้า/มีบันทึกในช่วง
}
// ยอดรวมทั้งหมด (ใช้ทั้งในไฟล์ส่งออกและพรีวิวบนจอ)
function expSummaryTotals(rows){
  rows=rows||expSummaryRows();
  const G={houses:rows.length,recv:0,pigs:0,deadN:0,deadW:0,deadVal:0,cullN:0,cullW:0,cullVal:0,soldN:0,soldW:0,soldVal:0,moveN:0,moveInN:0,med:0};
  rows.forEach(r=>{const h=r.h,a=r.t;G.recv+=h.received||0;G.pigs+=h.pigs||0;G.deadN+=a.deadN;G.deadW+=a.deadW;G.deadVal+=a.deadVal;G.cullN+=a.cullN;G.cullW+=a.cullW;G.cullVal+=a.cullVal;G.soldN+=a.soldN;G.soldW+=a.soldW;G.soldVal+=a.soldVal;G.moveN+=a.moveN;G.moveInN+=a.moveInN;G.med+=medTotal(h);});
  G.loss=G.recv?((G.deadN+G.cullN)/G.recv*100):0;
  return G;
}

const THAI_MON_ABBR=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function fmtISOThai(iso){
  if(!iso) return '-';
  const p=String(iso).split('-'); if(p.length<3) return String(iso);
  const y=+p[0], m=+p[1], d=+p[2];
  if(!y||!m||!d) return String(iso);
  return d+' '+(THAI_MON_ABBR[m-1]||'')+' '+(y+543);
}

function ovAlerts(){ // 🚨 จุดต้องดู (เวอร์ชันหน้าภาพรวม — ตรรกะเดียวกับบนแผนผัง แต่ไม่พึ่งพิกัดกราฟ)
  const out=[], hsA=(myHouses()||[]);
  const mv=hsA.filter(h=>(h.pigs||0)>0&&(h.received||0)>0).map(h=>medTotal(h)/h.received).filter(vv=>vv>0).sort((a,b)=>a-b);
  const p50=mv[Math.floor(mv.length*0.5)]||0, p80=mv[Math.floor(mv.length*0.8)]||Infinity;
  hsA.forEach(h=>{
    if((h.pigs||0)<=0) return;
    const L=h.dailyLog||[];
    if((h.deadToday||0)>0){ const past=L.filter(e=>e&&e.date!==DEMO_DATE_DAY).slice(0,14);
      const avg=past.length?past.reduce((sm,e)=>sm+(e.deadN||0),0)/Math.max(7,past.length):0;
      if((h.deadToday||0)>=5||((h.deadToday||0)>=3&&(h.deadToday||0)>2*avg)) out.push({ic:'🪵',msg:'หลัง '+(h.code||'')+' ตายวันนี้ '+fmt(h.deadToday)+' ตัว — สูงกว่าปกติของหลังนี้',t:'h',k:h.id,sev:2}); }
    if(!h.filled){ let days=99; if(L.length&&L[0].date){ const d=parseThaiDate(L[0].date); if(d) days=Math.round((DEMO_DATE-d)/86400000); }
      if(days>=2) out.push({ic:'📝',msg:'หลัง '+(h.code||'')+' ไม่ได้กรอกข้อมูลติดกัน '+(days>30?'นานแล้ว':fmt(days)+' วัน'),t:'h',k:h.id,sev:1}); }
    if((h.received||0)>0&&mv.length>=5){ const mpp=medTotal(h)/h.received;
      if(mpp>p80&&mpp>1.5*p50) out.push({ic:'💊',msg:'หลัง '+(h.code||'')+' ค่ายา '+fmt(Math.round(mpp))+' ฿/ตัว — แพงผิดปกติ',t:'h',k:h.id,sev:1}); }
  });
  const pq=todayISO().split('-'), cut3=expISO(new Date(+pq[0],+pq[1]-1,+pq[2]-3));
  (typeof SALE_BILLS!=='undefined'?SALE_BILLS:[]).forEach(b=>{ if(sbPricePending(b)&&(b.dateISO||'')<=cut3) out.push({ic:'🏮',msg:'บิล '+sbBillRef(b)+' ('+(gNrm(b.buyer)||'ไม่ระบุผู้ซื้อ')+') ค้างราคาเกิน 3 วัน',t:'bill',k:b.id,sev:2}); });
  return out.sort((a,b)=>b.sev-a.sev);
}

// 🍩 โดนัทสรุปต้นทุนยาแยกตามประเภท (SVG · สร้างจากยอดจริง)
function medDonutSVG(keys,byCat,total,colors){
  if(!(total>0)) return '';
  const r=52, C=2*Math.PI*r; let off=0;
  const segs=keys.filter(c=>byCat[c]>0).map(c=>{
    const dash=(byCat[c]/total)*C;
    const s=`<circle cx="64" cy="64" r="${r}" fill="none" stroke-width="20" style="stroke:${colors[c]||'var(--info)'}" stroke-dasharray="${dash.toFixed(1)} ${(C-dash).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 64 64)"/>`;
    off+=dash; return s;
  }).join('');
  return `<div style="position:relative;width:128px;height:128px;flex:none">
    <svg width="128" height="128" viewBox="0 0 128 128" aria-hidden="true">${segs}</svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:14px;font-weight:800;color:var(--brand);font-variant-numeric:tabular-nums">${fmt(total)}</div>
      <div style="font-size:10px;color:var(--muted)">บาท</div>
    </div></div>`;
}

function vetRecordedToday(h){ return (((h&&h.vetLog)||[]).some(e=>e&&e.date===DEMO_DATE_DAY)); }
function houseCells(list){
  return list.map(h=>{
    const cls = (effRole()==='vet'?vetRecordedToday(h):h.filled)?'ok':(h.deadToday>=4||h.sick>5?'bad':'wait'); // มุมหมอ: เขียว=หมอลงข้อมูลวันนี้แล้ว · มุมอื่น: เขียว=กรอกข้อมูลแล้ว
    const close = effRole()==='clerk' && needsClose(h);
    const a = dailyAgg(h); // ผลรวมสะสม ตาย/คัด/ขาย จากบันทึกของเสมียน
    const left = cleaningDaysLeft(h);
    const inc=(h.incoming||[]).reduce((s,t)=>s+(t.n||0),0); // หมูระหว่างทางรอรับเข้า

      ? '<span class="tag bad">🔔 รอปิดชุด</span>'

      <div class="hn">${escA(h.code||h.name.replace("หลัง ",""))}</div>
      <div class="hc" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">🩺 ${escA(h.vet||'-')}</div>
      <div class="hc"><b style="color:var(--ink)">${fmt(h.pigs)}</b>/${fmt(h.received||0)} ตัว</div>
      <div style="margin-top:6px">${statusTag}</div>
      ${inc>0?`<div style="margin-top:5px"><span class="tag" style="background:var(--info-soft);color:#1d4e8f">🚚 รับเข้า ${fmt(inc)}</span></div>`:''}
      <div class="hc" style="margin-top:6px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;font-size:11px;font-weight:700">
        <span title="ตายสะสม" style="color:var(--bad)">⚰️ ${fmt(a.deadN)}</span>
        <span title="คัดขายสะสม" style="color:var(--warn)">🔪 ${fmt(a.cullN)}</span>
        <span title="ขายขุนสะสม" style="color:var(--ok)">💰 ${fmt(a.soldN)}</span>
        ${a.moveN>0?`<span title="ย้ายออกสะสม" style="color:var(--info)">🔄 ${fmt(a.moveN)}</span>`:''}
        ${a.moveInN>0?`<span title="ย้ายเข้าสะสม" style="color:var(--info)">🔄← ${fmt(a.moveInN)}</span>`:''}
      </div>
    </button>`}).join("");
}
// group houses by farm — same-farm houses sit under that farm's heading
function groupedHousesHTML(list){
  if(!list.length) return '<div class="sub">ไม่พบหลังที่ค้นหา</div>';
  const farmOf=h=>h.farm||'ไม่ระบุฟาร์ม';
  const known=FARMS.filter(f=>list.some(h=>farmOf(h)===f));
  const extra=[...new Set(list.map(farmOf))].filter(f=>!FARMS.includes(f));
  return [...known,...extra].map(f=>{
    const hs=list.filter(h=>farmOf(h)===f).slice().sort(byCode);
    if(!hs.length) return '';
    const pending=hs.filter(h=>!h.filled).length;
    return `<div class="farmgroup">
      <div class="farmhead">🏭 ${escA(f)}
        <span class="fcount">${hs.length} หลัง · ${pending?pending+' รอกรอก':'<span class="tag ok">ครบแล้ว</span>'}</span>
      </div>
      <div class="hgrid">${houseCells(hs)}</div>
    </div>`;
  }).join("");
}
// 🩺 ตัวเลือกฟาร์มสำหรับหน้าหมอเลือกหลัง (เพิ่มจากช่องพิมพ์รหัส) — โชว์เมื่อหมอดูแล ≥2 ฟาร์ม
function houseFarmFilterHTML(){
  if(effRole()!=='vet') return '';
  const all=[...new Set(myHouses().map(h=>h.farm||'ไม่ระบุฟาร์ม'))];
  if(all.length<2) return '';
  const known=FARMS.filter(f=>all.includes(f)), extra=all.filter(f=>!FARMS.includes(f));
  const opts='<option value="">— ทุกฟาร์ม —</option>'+[...known,...extra].map(f=>`<option value="${escA(f)}">🏭 ${escA(f)}</option>`).join('');
  return `<div class="frow" style="margin:2px 0 12px"><label style="display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:var(--ink-2)">🏭 เลือกฟาร์ม</label>
    <select id="farmSel" onchange="filterHouses()" style="width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:15px;background:#fff;font-family:inherit;color:var(--ink)">${opts}</select></div>`;
}
// กรองหลัง: รวมช่องพิมพ์ (#q) + ตัวเลือกฟาร์ม (#farmSel ถ้ามี)
function filterHouses(){
  const q=((($("#q")||{}).value)||'').trim().toUpperCase();
  const farm=(($("#farmSel")||{}).value)||'';
  let list=myHouses();
  if(farm) list=list.filter(h=>(h.farm||'ไม่ระบุฟาร์ม')===farm);
  if(q) list=list.filter(h=>(h.code||"").toUpperCase().includes(q)||h.name.includes(q)||(h.farm||"").toUpperCase().includes(q));
  $("#hgroups").innerHTML=groupedHousesHTML(list);
}

// ตัวเลือกฟอร์มเสมียน (ปรับแต่งได้ในหน้าผู้ดูแล)
let DEATH_TYPES=['ตาย','ตายใหญ่','ตายเน่า'];
let CULL_TYPES=['คัดขายปกติ','คัดขายปนขุน','คัดขายแกรน','คัดขายพิเศษ'];
let CUSTOMERS=['เฮียสมชาย','ล้งภาคกลาง','ตลาดศรีเมือง'];
let SOURCE_OPTIONS=['U1ค3','U1ค7(เบิกไพร)'].concat(SOURCES); // 🏭 แหล่งรับเข้า — ผู้ดูแลปรับแต่งตัวเลือกได้
function srcOptsHTML(){return SOURCE_OPTIONS.filter(s=>s&&String(s).trim()).map(s=>'<option>'+escA(s)+'</option>').join('');}
// 💰 ตารางราคาตามช่วงน้ำหนัก (คัดขาย/ตาย) — ตั้งต้นจากระบบบันทึกบิลฟาร์มท่าม่วง · เติมราคา/กก. อัตโนมัติเวลากรอกคัด/ตาย (ผู้ดูแลแก้ได้)
let PRICE_TABLE=[
  {min:0,cull:18,dead:14},{min:10,cull:20,dead:14},{min:15,cull:24,dead:14},{min:20,cull:30,dead:20},
  {min:30,cull:32,dead:20},{min:40,cull:32,dead:20},{min:50,cull:38,dead:22},{min:60,cull:40,dead:24},
  {min:70,cull:44,dead:28},{min:80,cull:48,dead:34},{min:90,cull:52,dead:34},{min:100,cull:52,dead:34},
  {min:121,cull:52,dead:34},{min:151,cull:52,dead:34}
];
// ราคา/กก. ตามน้ำหนัก w + ประเภท ('cull'|'dead') — เลือกช่วงที่ min ≤ w และ min มากสุด (ทนต่อการเรียงผิดลำดับ)
function priceForWeight(w,type){ w=Number(w)||0; let best=null;
  for(const b of PRICE_TABLE){ const m=Number(b.min)||0; if(w>=m && (best===null || m>(Number(best.min)||0))) best=b; }
  return best?((type==='dead'?best.dead:best.cull)||0):0; }
let _autoP={cull:'',dead:''}; // ราคาที่เติมอัตโนมัติล่าสุด (ใช้เช็คว่าผู้ใช้แก้เองหรือยัง)
// เก็บ/คืนค่า "ตัวเลือกฟอร์มเสมียน" ทั้งหมด (เพื่อบันทึกถาวร + ซิงก์ข้ามเครื่อง)
// 👤 ทะเบียนลูกค้าแท่นขาย — ตารางราคาตามน้ำหนักแยกรายเจ้า (เจ้าของแก้ได้ผู้เดียว · แทนตารางกลางเดิมในจัดการเล้า)
let SB_CUST=[];
function custRateForWeight(custName,w,type){ // ราคา/กก. จากทะเบียนลูกค้า (null = เจ้านี้ไม่ได้ตั้ง/ไม่พบชื่อ)
  const nm=gNrm(custName); if(!nm) return null;
  const c=SB_CUST.find(x=>gNrm(x.name)===nm); if(!c||!Array.isArray(c.bands)||!c.bands.length) return null;
  w=Number(w)||0;
  const bd=c.bands.find(b=>w>=b.a&&w<=b.b)||c.bands[c.bands.length-1];
  const r=(type==='dead')?bd.dead:bd.cull;
  return (r===''||r==null)?null:Number(r);
}
function snapOpts(){return {death:DEATH_TYPES,cull:CULL_TYPES,cust:CUSTOMERS,source:SOURCE_OPTIONS,price:PRICE_TABLE,scust:SB_CUST};}
function applyOpts(o){ if(!o) return;
  if(Array.isArray(o.death)) DEATH_TYPES=o.death;
  if(Array.isArray(o.cull))  CULL_TYPES=o.cull;
  if(Array.isArray(o.cust))  CUSTOMERS=o.cust;
  if(Array.isArray(o.source))SOURCE_OPTIONS=o.source;
  if(Array.isArray(o.price)) PRICE_TABLE=o.price; // 💰 ตารางราคากลางเดิม (คงไว้เป็นตัวสำรองตอนไม่ระบุลูกค้า)
  if(Array.isArray(o.scust)) SB_CUST=o.scust;     // 👤 ทะเบียนลูกค้าแท่นขาย + ราคารายเจ้า
}
let entryTab='daily';
let editIdx=-1; // index in dailyLog being edited, -1 = new entry
let intakeEditing=false; // กำลังแก้ไขข้อมูลการรับเข้าของเล้าที่กำลังเลี้ยงอยู่
let extraIntakeOpen=false; // กำลังเปิดฟอร์ม "รับเข้าหมูเพิ่มเติม"
// ---- แก้ไขรายการเบิกยา (เสมียนแก้ได้ในแท็บ "ข้อมูลหมอ") → อัปเดต h.meds ของหลังโดยตรง ----
let medRecSeq=1, medEdit={hid:null,id:null};
function ensureMedIds(h){(h.meds||[]).forEach(m=>{if(m._id==null)m._id='m'+(medRecSeq++);});}
function startMedEdit(hid,id){medEdit={hid:hid,id:id};rerenderCurrent();}
function cancelMedEdit(){medEdit={hid:null,id:null};rerenderCurrent();}
const MED_EDIT_FIELDS=[['date','วันที่','text'],['name','ชื่อยา','text'],['qty','จำนวน','num'],['price','ราคา','num']];
function saveMedEdit(hid,id){ if(blockIfReadonly())return;
  const h=HOUSES.find(x=>x.id===hid); if(!h) return;
  const rec=(h.meds||[]).find(m=>m._id===id); if(!rec) return;
  const farm=h.farm||'ไม่ระบุฟาร์ม';
  // ค่าเดิม (ก่อนแก้) — ใช้คืน/ปรับสต็อก
  const oldCat=rec.cat||'', oldName=rec.name||'', oldQty=Number(rec.qty)||0, oldPrice=Number(rec.price)||0;
  // ค่าใหม่ที่เสนอ — ยังไม่เขียนลง rec จนกว่าจะผ่านการตรวจสต็อก
  const cs=document.getElementById('me_'+id+'_cat');
  const gv=k=>{ const el=document.getElementById('me_'+id+'_'+k); return el?el.value:undefined; };
  const num=raw=>(raw===undefined||String(raw).trim()===''||isNaN(Number(raw)))?0:Number(raw);
  const newCat=cs?cs.value:oldCat;
  const newName=(gv('name')!==undefined)?gv('name'):oldName;
  const newDate=(gv('date')!==undefined)?gv('date'):rec.date;
  const newQty=num(gv('qty')), newPrice=num(gv('price'));
  const sameItem=(newCat===oldCat && newName===oldName);
  // ── ตรวจสต็อก: ปรับการตัดสต็อกให้ตรงกับยอดเบิกใหม่ · บล็อกถ้าทำให้คลังติดลบ (ยกเว้นหมวดที่ไม่นับสต็อก เช่น ยาสูตร) ──
  if(stockCountable(newCat)){
    const avail=stockOnHand(farm,newCat,newName)+((sameItem&&stockCountable(oldCat))?oldQty:0); // คืนของเดิมก่อน (กรณีรายการเดิม)
    if(newQty>avail){ toast('❌ แก้ไม่ได้ — คลัง '+farm+' มี "'+newName+'" เหลือ '+fmt(avail)+' (ยอดเบิกใหม่ '+fmt(newQty)+') · รับเข้าคลังก่อน'); cancelMedEdit(); return; }
  }
  // ── ผ่านแล้ว: เก็บ changes สำหรับ log + เขียนค่าใหม่ลง rec ──
  const changes=[];
  if(newCat!==oldCat) changes.push({label:'ประเภท',from:oldCat||'(ว่าง)',to:newCat||'(ว่าง)'});
  if(String(newDate||'').trim()!==String(rec.date||'').trim()) changes.push({label:'วันที่',from:rec.date||'(ว่าง)',to:newDate||'(ว่าง)'});
  if(newName!==oldName) changes.push({label:'ชื่อยา',from:oldName||'(ว่าง)',to:newName||'(ว่าง)'});
  if(newQty!==oldQty) changes.push({label:'จำนวน',from:fmt(oldQty),to:fmt(newQty)});
  if(oldPrice!==newPrice) changes.push({label:'ราคา',from:fmt(oldPrice),to:fmt(newPrice)});
  const newTotal=newQty*newPrice;
  if((Number(rec.total)||0)!==newTotal) changes.push({label:'รวม(บาท)',from:fmt(rec.total||0),to:fmt(newTotal)});
  rec.cat=newCat; rec.date=newDate; rec.name=newName; rec.qty=newQty; rec.price=newPrice; rec.total=newTotal;
  // ── ปรับสต็อกให้ตรงยอดใหม่ (บันทึกเป็นความเคลื่อนไหว 'ปรับยอด') ──
  if(oldQty!==newQty || !sameItem){
    const by=(CURRENT_USER&&CURRENT_USER.name)||'เสมียน', ref='แก้รายการเบิก หลัง '+(h.code||'');
    let touched=false;
    const mvHouse=h.code||'', mvVet=rec.vet||'';
    if(sameItem){
      if(stockCountable(newCat) && oldQty!==newQty){ stockMoveAdd(farm,{date:newDate||DEMO_DATE_DAY,type:'adjust',delta:(oldQty-newQty),cat:newCat,name:newName,price:newPrice,by,house:mvHouse,vet:mvVet,ref,note:'แก้ยอดเบิก '+fmt(oldQty)+' → '+fmt(newQty)}); touched=true; }
    } else {
      if(stockCountable(oldCat) && oldQty>0){ stockMoveAdd(farm,{date:newDate||DEMO_DATE_DAY,type:'adjust',delta:oldQty,cat:oldCat,name:oldName,price:oldPrice,by,house:mvHouse,vet:mvVet,ref,note:'คืนของเดิม (แก้รายการเบิก)'}); touched=true; }
      if(stockCountable(newCat) && newQty>0){ stockMoveAdd(farm,{date:newDate||DEMO_DATE_DAY,type:'adjust',delta:-newQty,cat:newCat,name:newName,price:newPrice,by,house:mvHouse,vet:mvVet,ref,note:'ตัดสต็อกตามที่แก้'}); touched=true; }
    }
    if(touched) syncConfig();
  }
  if(changes.length){ logHouseEdit(h,changes,'แก้ไขรายการเบิกยา — '+(rec.name||'')+' · '+(rec.date||'')); syncHouseVet(h); toast('บันทึกการแก้ไขรายการเบิกยาแล้ว ('+changes.length+' ช่อง) ✓'); }
  else toast('ไม่มีการเปลี่ยนแปลง');
  medEdit={hid:null,id:null};
  rerenderCurrent();
}
// การ์ดรายการเบิกยา/เวชภัณฑ์ของหลังนี้ (withEdit=true → เสมียนกด ✏️ แก้ไขในแถวได้)
function medListHTML(h,withEdit){
  ensureMedIds(h);
  const meds=h.meds||[];
  const isEd=m=>withEdit&&medEdit.hid===h.id&&medEdit.id===m._id;
  const inp=(rid,k,v,t)=>`<input class="cin tl" id="me_${rid}_${k}" ${t==='num'?'type="number"':''} value="${escA(v)}" style="min-width:${t==='num'?'72px':'94px'}">`;
  const catSel=(rid,v)=>{ const opts=Object.keys(REQ_DATA).slice(); if(v&&opts.indexOf(v)<0) opts.unshift(v); return `<select class="cin tl" id="me_${rid}_cat" style="min-width:118px">${opts.map(c=>`<option ${c===v?'selected':''}>${escA(c)}</option>`).join('')}</select>`; };
  const ehCol=withEdit?'<th class="num">จัดการ</th>':'';
  const act=m=>!withEdit?'':`<td class="num" style="white-space:nowrap">${isEd(m)
    ? `<button class="btn sm" onclick="saveMedEdit(${h.id},'${m._id}')">💾</button> <button class="btn ghost sm" onclick="cancelMedEdit()">✖</button>`
    : `<button class="btn ghost sm" style="color:var(--info)" onclick="startMedEdit(${h.id},'${m._id}')">✏️</button>`}</td>`;
  const row=m=>isEd(m)
    ? `<tr><td>${inp(m._id,'date',m.date)}</td><td>${catSel(m._id,m.cat)}</td><td>${inp(m._id,'name',m.name)}</td><td class="num">${inp(m._id,'qty',m.qty,'num')}</td><td class="num">${inp(m._id,'price',m.price,'num')}</td><td class="num"><b>${fmt((Number(m.qty)||0)*(Number(m.price)||0))}</b></td>${act(m)}</tr>`
    : `<tr><td>${escA(m.date)}</td><td><span class="tag ${m.cat==='วัคซีน'?'ok':m.cat==='ยาไม่มีทะเบียน'?'warn':'wait'}">${escA(m.cat)}</span></td><td style="white-space:normal;min-width:160px;max-width:300px">${escA(m.name)}${m.dose?'<div class="sub">โดส: '+escA(m.dose)+'</div>':''}${m.note?'<div class="sub">📝 '+escA(m.note)+'</div>':''}</td><td class="num">${m.qty}</td><td class="num">${fmt(m.price)}</td><td class="num"><b>${fmt(m.total)}</b></td>${act(m)}</tr>`;

    <div class="densewrap" style="max-height:48vh"><table class="densetbl">
      <thead><tr><th>วันที่</th><th>ประเภท</th><th>ชื่อยา</th><th class="num">จำนวน</th><th class="num">ราคา</th><th class="num">รวม</th>${ehCol}</tr></thead>

        ${meds.length? meds.map(row).join("") : `<tr><td colspan="${colspan}" class="sub">ยังไม่มีรายการเบิกยา</td></tr>`}
      </tbody>
    </table></div>
    ${withEdit?'<div class="sub" style="margin:8px 0 0">✏️ กดแก้ไขได้ — เมื่อบันทึก <b>รวม = จำนวน × ราคา</b> คิดใหม่อัตโนมัติ และอัปเดต <b>ยอดต้นทุนยาของหลังนี้</b> ทันที พร้อมบันทึกประวัติด้านล่าง':''}
  </div>`;
}

  restoreBatch(); calcDaily(); calcBatch(); calcIntake();
}
function switchTab(t){
  entryTab=t;
  $("#tabDaily").classList.toggle('hidden',t!=='daily');
  $("#tabBatch").classList.toggle('hidden',t!=='batch');
  const tv=$("#tabVet"); if(tv) tv.classList.toggle('hidden',t!=='vet');
  $("#segDaily").classList.toggle('on',t==='daily');
  $("#segBatch").classList.toggle('on',t==='batch');
  const sv=$("#segVet"); if(sv) sv.classList.toggle('on',t==='vet');
}
// ---- สถานะเล้า (เสมียนปรับได้ในหน้ากรอกข้อมูลรายวัน) ----
function setHouseStatus(s){
  const h=currentHouse; if(!h) return;
  const pigs=h.pigs||0;
  if(s==='กำลังล้างคอก' && pigs>0){toast('ตั้ง "กำลังล้างคอก" ได้เมื่อจำนวนหมูในเล้าเหลือ 0 เท่านั้น (ตอนนี้ '+fmt(pigs)+' ตัว)');return;}
  if(s==='ว่าง' && pigs>0){toast('ยังมีหมูในเล้า '+fmt(pigs)+' ตัว — สถานะคือ "กำลังเลี้ยง"');return;}
  if(s==='กำลังเลี้ยง' && pigs<=0){toast('ไม่มีหมูในเล้า — เริ่มเลี้ยงโดยกรอกจำนวนหมูที่นำเข้าก่อน');return;}
  const old=houseStatus(h);
  if(s==='กำลังล้างคอก') h.cleanStart=todayISO();   // เริ่มนับ 3 วัน
  else if(s==='ว่าง') h.cleanStart=null;             // ล้างเสร็จก่อนกำหนด → ว่าง
  h.status=s;
  if(old!==houseStatus(h)){
    logHouseEdit(h,[{label:'สถานะเล้า',from:old,to:houseStatus(h)}],'เปลี่ยนสถานะเล้า');
    toast('ตั้งสถานะเล้า '+(h.code||'')+' เป็น "'+houseStatus(h)+'" ✓');
  }
  clerkForm();
}
function houseStatusCardHTML(h){
  const cur=houseStatus(h), pigs=h.pigs||0, empty=pigs<=0;
  const btn=(s,icon,enabled)=>`<button class="${cur===s?'on':''}" ${enabled?'':'disabled style="opacity:.38;cursor:not-allowed"'} style="font-size:12.5px" onclick="setHouseStatus('${s}')">${icon} ${s}</button>`;
  return `<div class="card">
    <h3>🏠 สถานะเล้า <span class="more">${cur}</span></h3>
    <div class="sub" style="margin-top:-4px">หมูคงเหลือ <b style="color:var(--ink)">${fmt(pigs)}</b> ตัว · ${empty?'ไม่มีหมูในเล้า — ตั้ง "ว่าง" หรือ "กำลังล้างคอก" ได้':'มีหมูในเล้า — สถานะคือ "กำลังเลี้ยง"'}</div>
    <div class="seg" style="margin:10px 0 0">
      ${btn('ว่าง','⬜',empty)}
      ${btn('กำลังเลี้ยง','🟢',!empty)}
      ${btn('กำลังล้างคอก','🧹',empty)}
    </div>
    <div class="banner info" style="margin:12px 0 0">${empty?'ℹ️':'🔒'} <div>${empty?'เล้าว่างแล้ว — ตั้ง "กำลังล้างคอก" ระหว่างทำความสะอาด แล้วกลับเป็น "ว่าง" เมื่อพร้อมรับหมูรุ่นใหม่':'เมื่อนำหมูเข้าเลี้ยง สถานะเป็น "กำลังเลี้ยง" อัตโนมัติ · จะตั้ง "กำลังล้างคอก" ได้เมื่อจำนวนหมูเหลือ 0'}</div></div>
    ${ROLE==='owner'&&(h.intake||(h.dailyLog||[]).length||pigs>0)?`<div class="sub" style="margin-top:10px;text-align:right"><a href="#" onclick="ownerResetHouse();return false" style="color:var(--bad);font-weight:600">🗑️ ล้างข้อมูลรุ่นนี้ — กรอกผิดหลัง (เฉพาะเจ้าของ)</a></div>`:''}
  </div>`;
}
// 🗑️ เจ้าของล้างข้อมูลรุ่นปัจจุบัน (กรณีเสมียนกรอกผิดหลัง) → เล้ากลับเป็น "ว่าง"
// เฉพาะ ROLE เจ้าของจริงเท่านั้น (ไม่นับ view-as-role) · ไม่เก็บเข้าประวัติปิดชุด (เป็นข้อมูลผิด ไม่ใช่รุ่นจริง)
// คงไว้: ประวัติการแก้ไข (editLog) + รุ่นที่ปิดแล้ว (closedBatches) + หมูระหว่างทางเข้าหลังนี้ (incoming)
// หลักฐานกันโกง: สรุปข้อมูลก่อนล้างถูกส่งเข้า audit_log ฝั่งเซิร์ฟเวอร์ (แก้/ลบไม่ได้)
function ownerResetHouse(){
  const h=currentHouse; if(!h) return;
  if(ROLE!=='owner'){ toast('🔒 เฉพาะเจ้าของเท่านั้นที่ล้างข้อมูลรุ่นได้'); return; }
  const outRef=HOUSES.some(x=>x.id!==h.id && (x.incoming||[]).some(t=>t.fromId===h.id));
  if(outRef){ alert('ล้างไม่ได้: หลังนี้ "ย้ายออก" หมูไปหลังอื่นและยังรอปลายทางยืนยันรับเข้า — ให้หลังปลายทางยืนยันรับเข้า หรือแก้/ลบรายการย้ายออกก่อน (กันหมูค้างกลางทางไร้ต้นทาง)'); return; }
  const dl=h.dailyLog||[], vl=h.vetLog||[];
  const movedIn=dl.reduce((s,e)=>s+(e.moveInN||0),0);
  const sum='รับเข้า '+fmt(h.received||0)+' ตัว · คงเหลือ '+fmt(h.pigs||0)+' ตัว · บันทึกรายวัน '+dl.length+' รายการ · บันทึกหมอ '+vl.length+' รายการ · ยา '+((h.meds||[]).length)+' รายการ';
  if(!confirm('ล้างข้อมูล "รุ่นปัจจุบัน" ของหลัง '+(h.code||'')+' ทั้งหมด?\n\n'+sum+(movedIn>0?'\n\n⚠️ รุ่นนี้มีหมู "ย้ายเข้า" มาจากหลังอื่น '+fmt(movedIn)+' ตัว — ล้างแล้วหมูจำนวนนี้จะหายจากยอดรวม (หลังต้นทางหักออกไปแล้ว) โปรดแน่ใจก่อน':'')+'\n\nใช้เมื่อ "กรอกผิดหลัง" — เล้าจะกลับเป็นสถานะ "ว่าง"\n(ประวัติการแก้ไข และรุ่นที่ปิดแล้ว จะยังอยู่เป็นหลักฐาน)')) return;
  const typed=prompt('เพื่อความปลอดภัย พิมพ์รหัสหลัง "'+(h.code||'')+'" เพื่อยืนยันการล้าง:');
  if(typed===null) return;
  if((typed||'').trim().toUpperCase()!==String(h.code||'').toUpperCase()){ toast('รหัสหลังไม่ตรง — ยกเลิกการล้าง'); return; }
  const it=h.intake||{};
  const before={intake:{source:it.source||'',dateIn:it.dateIn||'',inN:it.inN||0,price:it.price||0,extra:(it.extra||[]).length},
    received:h.received||0,pigs:h.pigs||0,dailyDays:dl.length,movedIn:movedIn,
    firstDay:dl.length?dl[dl.length-1].date:'',lastDay:dl.length?dl[0].date:'',
    vetRecs:vl.length,meds:(h.meds||[]).length,feedReqs:(h.feedReqs||[]).length};
  h.intake=null; h.dailyLog=[]; h.vetLog=[]; h.meds=[]; h.feedReqs=[]; h.batch=null; h.batchLog=[];
  h.received=0; h.pigs=0; h.dailyAnchor=null; h.closedDate=null; h.cleanStart=null;
  h.deadToday=0; h.cullToday=0; h.soldToday=0; h.moveToday=0; h.sick=0; h.filled=false;
  h.status='ว่าง';
  intakeEditing=false; extraIntakeOpen=false; editIdx=-1;
  logHouseEdit(h,[{label:'ล้างข้อมูลรุ่น',from:sum,to:'ว่าง'}],'🗑️ เจ้าของล้างข้อมูลรุ่น (กรอกผิดหลัง)');
  logAudit('house',h.id,'owner_reset_batch',before,'เจ้าของล้างข้อมูลรุ่นของหลัง '+(h.code||'')+' (กรอกผิดหลัง)');
  syncHouseClerk(h); syncHouseVet(h);
  toast('🗑️ ล้างข้อมูลรุ่นของหลัง '+(h.code||'')+' แล้ว — เล้ากลับเป็น "ว่าง" พร้อมเริ่มใหม่');
  clerkForm();
}
// ---- เนื้อหาแท็บ "บันทึกรายวัน": เล้าว่าง → ต้องกรอกข้อมูลการรับเข้าก่อน ----
function clerkDailyBody(h){
  const empty=(h.pigs||0)<=0, inc=incomingHTML(h);
  if(empty && needsClose(h) && !intakeEditing){
    if(editIdx>=0) return inc+houseStatusCardHTML(h)+dailyHTML(h)+dailyLogHTML(h); // กำลังแก้ไขบันทึกของรุ่นที่จะปิด → เปิดฟอร์มให้แก้
    const hist=(h.dailyLog&&h.dailyLog.length)?dailyLogHTML(h):'';
    return inc+houseStatusCardHTML(h)+mustCloseHTML(h)+hist;
  }
  if(empty || intakeEditing){
    const hist=(h.dailyLog&&h.dailyLog.length)?dailyLogHTML(h):'';
    return inc+houseStatusCardHTML(h)+intakeFormHTML(h)+hist;
  }
  return inc+houseStatusCardHTML(h)+intakeSummaryHTML(h,true)+dailyHTML(h)+dailyLogHTML(h);
}
// ---- ฟอร์มข้อมูลการรับเข้า (เปิดเล้า / เริ่มเลี้ยงรุ่นใหม่) ----
function intakeFormHTML(h){
  const it=h.intake||{}, empty=(h.pigs||0)<=0;
  const v=(k,d)=>{const x=it[k];return (x!=null&&x!=='')?x:(d!=null?d:'');};
  // มีรอบ "รับเข้าเพิ่มเติม" → ฟอร์มนี้แก้เฉพาะ "รอบแรก" (ยอดรวม = รอบแรก + รอบเพิ่ม คิดให้อัตโนมัติตอนบันทึก)
  const xArr=it.extra||[], xN=xArr.reduce((s,e)=>s+(e.n||0),0), xW=xArr.reduce((s,e)=>s+(e.w||0),0);
  const baseN=(it.inN!=null&&it.inN!=='')?Math.max(0,(it.inN||0)-xN):((!empty&&(h.received||h.pigs))||''); // เล้าที่มีหมูแต่ไม่มีข้อมูลรับเข้า (กรอกย้อนหลังจากกระดาษ) → เติมยอดตั้งต้นเดิมให้ กันยอดคงเหลือเพี้ยน
  const baseW=Math.max(0,(it.totalW||0)-xW);
  const baseAvg=(baseN&&baseW)?+(baseW/baseN).toFixed(1):(v('avgW')||'');
  // แถวค่าสายพันธุ์: จำนวนตัว × ค่า/ตัว = มูลค่า
  const breedRow=(key,label)=>`<tr>
    <td class="lab">${label}</td>
    <td><input class="cin" id="i_n${key}" type="number" value="${v('breed'+key+'N')}" placeholder="0" oninput="calcIntake()"></td>
    <td><input class="cin" id="i_b${key}" type="number" value="${v('breed'+key)}" placeholder="0" oninput="calcIntake()"></td>
    <td class="num"><b id="i_a${key}">0</b></td></tr>`;
  return `
  <div class="card">
    <h3>📥 ข้อมูลการรับเข้า <span class="more">${empty?'เริ่มเลี้ยงรุ่นใหม่':'แก้ไขรุ่นปัจจุบัน'}</span></h3>
    <div class="banner ${empty?'bad':'info'}">${empty?'⚠️':'✏️'} <div>${empty?'เล้านี้<b>ว่าง</b> — ต้องกรอก<b>ข้อมูลการรับเข้า</b>ก่อน จึงจะเริ่มบันทึกรายวันได้ (ระบบจะตั้งสถานะเป็น "กำลังเลี้ยง" ให้อัตโนมัติ)':'แก้ไขข้อมูลการรับเข้าของรุ่นที่กำลังเลี้ยงอยู่'}</div></div>
    <div class="frow"><label>แหล่งรับเข้า</label>
      <input id="i_source" class="cin tl" list="srcList" value="${escA(v('source',h.source))}" placeholder="เช่น U1ค3, U1ค7(เบิกไพร)">
      <datalist id="srcList">${srcOptsHTML()}</datalist></div>
    <div class="grid2">
      <div class="frow" style="margin-bottom:0"><label>จำนวนวันเลี้ยงเล้าคลอด/อนุบาล</label><div class="unit"><input id="i_nursery" class="cin tl" type="number" value="${v('nurseryDays',43)}" placeholder="43"><span class="u">วัน</span></div></div>
      <div class="frow" style="margin-bottom:0"><label>วันที่รับเข้า</label><input id="i_dateIn" type="date" class="cin tl" value="${escA(v('dateIn'))}"></div>
    </div>
    <div class="grid2" style="margin-top:10px">
      <div class="frow" style="margin-bottom:0"><label>หมอผู้ดูแล</label><input id="i_vet" class="cin tl" value="${escA(v('vet',h.vet))}" placeholder="🩺 ชื่อหมอ"></div>
      <div class="frow" style="margin-bottom:0"><label>พนักงานประจำหลัง</label><input id="i_worker" class="cin tl" value="${escA(v('worker',h.worker))}" placeholder="👷 ชื่อพนักงาน"></div>
    </div>
    <div class="frow" style="margin-top:10px"><label>พนักงานผู้ช่วย</label><input id="i_asst" class="cin tl" value="${escA(v('assistant',h.assistant))}" placeholder="🧑‍🔧 ชื่อผู้ช่วย"></div>
    <div class="grid2">
      <div class="frow" style="margin-bottom:0"><label>จำนวนรับเข้า${xN?' (รอบแรก)':''} <span class="req">*</span></label><div class="unit"><input id="i_inN" class="cin tl" type="number" value="${baseN}" placeholder="0" oninput="calcIntake()"><span class="u">ตัว</span></div></div>

    </div>
    ${xN?`<div class="banner info" style="margin-top:10px">🔄 <div>หลังนี้มี<b>รอบรับเข้าเพิ่มเติม ${fmt(xN)} ตัว</b> แยกบันทึกไว้แล้ว — ช่องด้านบนแก้เฉพาะ<b>รอบแรก</b> · ยอดรวม (รอบแรก + ${fmt(xN)}) ระบบคิดให้อัตโนมัติตอนบันทึก</div></div>`:''}

function calcIntake(){
  if(!document.getElementById('i_inN')) return;
  const inN=gv('i_inN'), avgW=gv('i_avgW');
  const t=document.getElementById('i_totalW'); if(t) t.value=Math.round(inN*avgW);
  const pr=gv('i_price'), pn=document.getElementById('i_pigCostNote');
  if(pn) pn.innerHTML=(inN>0&&pr>0)?('มูลค่าลูกหมูรอบนี้: <b style="color:var(--brand)">'+fmt(Math.round(inN*pr))+'</b> บาท ('+fmt(inN)+' ตัว × '+fmt(pr)+') — ใช้คิดต้นทุนตอนปิดชุดอัตโนมัติ'):'';
  let bt=0;
  ['Duroc','Cross2','PureL','PureY'].forEach(k=>{
    const amt=gv('i_n'+k)*gv('i_b'+k); bt+=amt;
    const ae=document.getElementById('i_a'+k); if(ae) ae.textContent=fmt(amt);
  });
  const bte=document.getElementById('i_breedTotal'); if(bte) bte.textContent=fmt(bt);
}
function submitIntake(){
  const g=id=>{const e=document.getElementById(id);return e&&e.value!==''?Number(e.value):0;};
  const t=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const inN=g('i_inN');
  if(inN<=0){toast('กรุณากรอก "จำนวนรับเข้า" ให้มากกว่า 0');return;}
  const h=currentHouse, wasEmpty=(h.pigs||0)<=0, avgW=g('i_avgW');
  // ช่องในฟอร์ม = "รอบแรก" เท่านั้น → ยอดรวมจริง = รอบแรก + รอบรับเข้าเพิ่มเติมที่แยกบันทึกไว้ (กันยอดรอบเพิ่มหายตอนแก้ไข)
  const xArr=(h.intake&&h.intake.extra)||[];
  const xN=xArr.reduce((s,e)=>s+(e.n||0),0), xW=xArr.reduce((s,e)=>s+(e.w||0),0);
  const totalInN=inN+xN, totalW=Math.round(inN*avgW)+xW;
  const oldReceived=h.received||0, delta=totalInN-oldReceived;
  // แก้ไขรุ่นที่กำลังเลี้ยง: ห้ามลดจำนวนรับเข้าจนทำให้ "คงเหลือ" บางวันติดลบ (ยอดตาย/คัด/ขายรวมเกินจำนวนจริง)
  if(!wasEmpty && delta!==0 && (h.dailyLog||[]).length){
    const log=h.dailyLog, newAnchor=(h.dailyAnchor!=null?h.dailyAnchor:oldReceived)+delta;
    let running=newAnchor, minRem=newAnchor;
    for(let k=log.length-1;k>=0;k--){ running-=(log[k].deadN||0)+(log[k].cullN||0)+(log[k].soldN||0)+(log[k].moveN||0)-(log[k].moveInN||0); if(running<minRem) minRem=running; }
    if(minRem<0){ toast('จำนวนรับเข้าน้อยเกินไป: ทำให้ "คงเหลือ" บางวันติดลบ (ยอดตาย/คัด/ขายรวมเกินจำนวนรับเข้า)'); return; }
  }
  const oldIt=Object.assign({},h.intake||{}); // ค่าเดิมไว้เทียบบันทึกประวัติ
  h.intake={ source:t('i_source'), nurseryDays:g('i_nursery'), vet:t('i_vet'), worker:t('i_worker'),
    assistant:t('i_asst'), dateIn:t('i_dateIn'), inN:totalInN, avgW:(totalInN&&totalW?+(totalW/totalInN).toFixed(1):avgW), totalW:totalW, price:g('i_price'), note:t('i_note'),
    breedDurocN:g('i_nDuroc'), breedDuroc:g('i_bDuroc'),
    breedCross2N:g('i_nCross2'), breedCross2:g('i_bCross2'),
    breedPureLN:g('i_nPureL'), breedPureL:g('i_bPureL'),
    breedPureYN:g('i_nPureY'), breedPureY:g('i_bPureY'),
    breedTotal:g('i_nDuroc')*g('i_bDuroc')+g('i_nCross2')*g('i_bCross2')+g('i_nPureL')*g('i_bPureL')+g('i_nPureY')*g('i_bPureY') };
  if(oldIt.extra) h.intake.extra=oldIt.extra; // คงรายการ "รับเข้าเพิ่มเติม" ไว้
  h.received=totalInN;
  if(wasEmpty){ h.pigs=totalInN; h.status='กำลังเลี้ยง'; h.filled=true; h.cleanStart=null; } // เริ่มรุ่นใหม่ → ล้างสถานะ "กำลังล้างคอก"
  else if(delta!==0){ // แก้จำนวนรับเข้าของรุ่นที่กำลังเลี้ยง → เลื่อน anchor + คำนวณ "คงเหลือ" ทุกวันใหม่ ให้ received − pigs = ยอดสูญเสียรวม เสมอ
    if((h.dailyLog||[]).length){ h.dailyAnchor=(h.dailyAnchor!=null?h.dailyAnchor:oldReceived)+delta; recalcDailyRemains(h); }
    else { h.pigs=Math.max(0,(h.pigs||0)+delta); h.dailyAnchor=totalInN; }
  }
  if(h.intake.source) h.source=h.intake.source;
  if(h.intake.vet && h.intake.vet!==(oldIt&&oldIt.vet)) h.vet=h.intake.vet; // คัดลอกเฉพาะตอนผู้ใช้แก้ช่องนี้จริง — กันชื่อทีมในข้อมูลนำเข้าเขียนทับหมอประจำหลังเงียบ ๆ ตอนเซฟฟอร์มด้วยเหตุอื่น
  if(h.intake.worker) h.worker=h.intake.worker;
  if(h.intake.assistant) h.assistant=h.intake.assistant;
  if(wasEmpty) logHouseEdit(h,[{label:'จำนวนรับเข้า',from:'(ว่าง)',to:fmt(inN)+' ตัว'}],'เริ่มเลี้ยง / บันทึกการรับเข้า');
  else logHouseEdit(h,diffFields(oldIt,h.intake,INTAKE_EDIT_LABELS),'แก้ไขข้อมูลการรับเข้า');
  intakeEditing=false;
  syncHouseClerk(h);
  toast(wasEmpty?('บันทึกการรับเข้า '+(h.code||'')+' · '+fmt(inN)+' ตัว → เริ่มเลี้ยง ✓'):'บันทึกการแก้ไขข้อมูลการรับเข้าแล้ว ✓');
  clerkForm();
}

function logLines(e){
  const L=[];
  if(e.deadN>0) L.push({grp:'⚰️ ตาย',type:e.deadType||'ตาย',n:e.deadN,avg:0,value:(e.deadW||0)*(e.deadP||0),cust:e.deadCust,bill:e.deadBill});
  if(e.cullN>0) L.push({grp:'🔪 คัดขาย',type:e.cullType||'คัดขาย',n:e.cullN,avg:e.cullW?e.cullW/e.cullN:0,value:(e.cullW||0)*(e.cullP||0),cust:e.cullCust,bill:e.cullBill});
  if(e.soldN>0) L.push({grp:'💰 ขายขุน',type:'ขายขุน',n:e.soldN,avg:e.soldW?e.soldW/e.soldN:0,value:(e.soldW||0)*(e.soldP||0),cust:e.soldCust,bill:e.soldBill});
  if(e.moveN>0) L.push({grp:'🔄 ย้ายออก',type:e.moveDest?'→ หลัง '+e.moveDest:'ย้ายออก',n:e.moveN,avg:e.moveW?e.moveW/e.moveN:0,value:0,cust:e.moveNote||'-',bill:'-'});
  if(e.moveInN>0) L.push({grp:'🔄 ย้ายเข้า',type:e.moveInFrom?'← จากหลัง '+e.moveInFrom:'ย้ายเข้า',n:e.moveInN,avg:e.moveInW?e.moveInW/e.moveInN:0,value:0,cust:e.moveInNote||'-',bill:'-'});
  if(!L.length) L.push({grp:'—',type:'-',n:0,avg:0,value:0,cust:'-',bill:'-'});
  return L;
}

// คำนวณคงเหลือทุกแถวจาก anchor แบบ "ไม่แก้ของจริง" → ใช้ตรวจล่วงหน้าว่าการแก้ไขจะทำให้วันไหนติดลบไหม
function chainRemains(h,log){
  log=log||(h.dailyLog||[]); if(!log.length) return [];
  const old=log[log.length-1];

  const sp=s.split('-'); const cur=new Date(+sp[0],+sp[1]-1,+sp[2]);
  let end; if(e){ const ep=e.split('-'); end=new Date(+ep[0],+ep[1]-1,+ep[2]); } else { end=reqToday(); }
  if(end<cur){toast('วันที่สิ้นสุดต้องไม่ก่อนวันเริ่ม');return;}
  const days=Math.round((end-cur)/86400000)+1;

    if(existByISO[iso]) existByISO[iso].forEach(e=>rows.push(bfRowFromEntry(e)));

  Object.keys(existByISO).forEach(iso=>{ if(!used.has(iso)) existByISO[iso].forEach(e=>{ const r=bfRowFromEntry(e); r._outside=true; rows.push(r); }); }); // คงบันทึกเดิมที่อยู่นอกช่วงไว้ด้วย (ไม่ซ่อน · ติดป้ายให้รู้ว่าไม่ใช่ช่วงที่เลือก)

  renderBackfillGrid(); toast('สร้าง '+days+' วันตามช่วง ('+s+' → '+expISO(end)+') ทั้งตารางรายวันและตารางอาหาร'+(exN?' · บันทึกเดิม '+exN+' รายการ':'')+(outN?' · 📌 มีบันทึกเดิมนอกช่วง '+outN+' แถวแสดงรวมไว้กันตกหล่น':''));
}

function bfBuildEntry(h,r,dThai){

    moveN=bfNum(r.mN), moveW=bfNum(r.mW);

    cullType:cullN?((r.cType||'').trim()||'คัดขาย'):'', cullN, cullW, cullP, cullCust:(r.cCust||'').trim()||'-', cullBill:(r.cBill||'').trim()||'-',
    soldN, soldW, soldP, soldCust:(r.sCust||'').trim()||'-', soldBill:(r.sBill||'').trim()||'-',
    moveN, moveW, moveDest:moveN?(r.mDest||''):'', moveNote:moveN?'ย้ายออก (กรอกย้อนหลัง)':'',
    dead:deadN, outN:soldN+cullN, avg:soldN?+(soldW/soldN).toFixed(1):0, value:(soldW*soldP)+(cullW*cullP)+(deadW*deadP),

function bfApplyRowToEntry(c,r){ // เขียนค่าจากแถว → entry (ตาย/คัด/ขาย + ประเภท/ลูกค้า/บิล · คงการย้ายเข้า/ออกเดิมไว้)
  const deadN=bfNum(r.dead), deadW=bfNum(r.dW), deadP=bfNum(r.dP),
    cullN=bfNum(r.cN), cullW=bfNum(r.cW), cullP=bfNum(r.cP),
    soldN=bfNum(r.sN), soldW=bfNum(r.sW), soldP=bfNum(r.sP);
  c.deadN=deadN; c.deadType=deadN?((r.dType||'').trim()||c.deadType||'ตาย'):''; c.deadW=deadW; c.deadP=deadP; c.dead=deadN;
  c.cullN=cullN; c.cullType=cullN?((r.cType||'').trim()||c.cullType||'คัดขาย'):''; c.cullW=cullW; c.cullP=cullP;
  if((r.cCust||'').trim()) c.cullCust=r.cCust.trim(); if((r.cBill||'').trim()) c.cullBill=r.cBill.trim();
  c.soldN=soldN; c.soldW=soldW; c.soldP=soldP;
  if((r.sCust||'').trim()) c.soldCust=r.sCust.trim(); if((r.sBill||'').trim()) c.soldBill=r.sBill.trim();
  c.outN=soldN+cullN; c.value=(soldW*soldP)+(cullW*cullP)+(deadW*deadP); c.avg=soldN?+(soldW/soldN).toFixed(1):0;
  return c;
}
function bfSubmit(){
  if(blockIfReadonly())return;
  const h=HOUSES.find(x=>x.code===bfHouse); if(!h){toast('เลือกหลังก่อน');return;}
  const received=bfReceived();
  // แถวเดิม (existing) → อัปเดตในที่ · แถวใหม่ที่มีตัวเลข → เพิ่ม
  // อนุญาตหลายรายการในวันเดียวกัน (แยกล็อต/ราคา เช่น ตาย 2 ราคา · ขาย 3 เจ้า) — ระบบรวมยอดต่อวันให้อัตโนมัติทุกหน้า
  const updByRowId={}; const newEntries=[]; let updated=0;
  bfRows.forEach(r=>{
    const hasData=bfNum(r.dead)||bfNum(r.cN)||bfNum(r.sN)||bfNum(r.cW)||bfNum(r.sW)||bfNum(r.dW)||bfNum(r.mN);
    if(r.existing && r.rowId){ updByRowId[r.rowId]=r; updated++; return; }
    if(!r.date || !hasData) return;
    newEntries.push(bfBuildEntry(h,r,isoToThaiDay(r.date)));
  });
  if(!newEntries.length && !updated){ toast('ยังไม่มีข้อมูลให้บันทึก (กรอกอย่างน้อย 1 วันที่มีตัวเลข)'); return; }
  // ประกอบ log ผู้สมัคร (candidate) — ยังไม่แตะของจริงจนกว่าจะผ่านการตรวจ
  const candExisting=(h.dailyLog||[]).map(e=>{ const r=e.rowId&&updByRowId[e.rowId]; return r?bfApplyRowToEntry(Object.assign({},e),r):e; });
  const merged=candExisting.concat(newEntries).sort((a,b)=>(parseThaiDate(b.date)||0)-(parseThaiDate(a.date)||0));
  const savedAnchor=h.dailyAnchor;
  // anchor = ยอดตั้งต้นก่อนหมูย้ายเข้า · received รวมหมูย้ายเข้าไว้แล้ว (addIntakeReceipt) จึงต้องหัก Σ moveInN ออก ไม่งั้นนับซ้ำ → คงเหลือพองเกินจริง
  const moveInSum=merged.reduce((s,e)=>s+(e.moveInN||0),0);
  if(received>0) h.dailyAnchor=received-moveInSum; else if(!(h.dailyLog||[]).length) h.dailyAnchor=(h.received||0)-moveInSum;
  const rems=chainRemains(h,merged); let badK=-1; for(let k=0;k<rems.length;k++){ if(rems[k]<0){badK=k;break;} }
  if(badK>=0){ h.dailyAnchor=savedAnchor; toast('❌ คงเหลือวัน '+merged[badK].date+' ติดลบ ('+fmt(rems[badK])+' ตัว) — ตาย/คัด/ขายรวมเกินหมูที่มี · ตรวจ "จำนวนรับเข้าตั้งต้น" หรือยอดรายวัน'); return; }
  h.dailyLog=merged; recalcDailyRemains(h);
  if(received>0 && !(h.received>0)) h.received=received;
  const note=[newEntries.length?('เพิ่ม '+newEntries.length+' วัน'):'',updated?('แก้ '+updated+' วัน'):''].filter(Boolean).join(' · ');
  logHouseEdit(h,[{label:'กรอกย้อนหลัง',from:'-',to:note}],'กรอกข้อมูลย้อนหลัง · '+note);
  syncHouseClerk(h);
  toast('✅ บันทึกย้อนหลัง — '+note+' → หลัง '+h.code+' · คงเหลือ '+fmt(h.pigs)+' ตัว');
  bfLoadedFor=null; renderBackfill();   // โหลดสถานะล่าสุดกลับมาแสดง (รวมที่เพิ่งบันทึก)
}

function bfsSubmit(){
  if(blockIfReadonly())return;

  if(asOfISO>todayISO()){ toast('วันที่ยอดคงเหลือเลือกล่วงหน้าไม่ได้'); return; }
  const asOfThai=isoToThaiDay(asOfISO);
  const list=_bfsList.length?_bfsList:bfsList();
  let done=0, skip=0; const neg=[], touched=[];
  list.forEach(h=>{ const r=bfsRows[h.id]; if(!r) return;
    const recv=bfNum(r.recv), dead=bfNum(r.dead), cull=bfNum(r.cull), sold=bfNum(r.sold), move=bfNum(r.move);
    const any=recv||dead||cull||sold||move||bfNum(r.deadVal)||bfNum(r.cullVal)||bfNum(r.soldVal)||bfNum(r.medVal);
    if(!any) return;                       // แถวว่าง — ข้าม
    if(recv<=0){ skip++; return; }          // ต้องมี "รับเข้า"
    if(recv-dead-cull-sold-move<0){ neg.push(h.code); return; }
    applyFastSummary(h,{recv,dead,cull,sold,move,asOfThai,
      deadVal:bfNum(r.deadVal),cullVal:bfNum(r.cullVal),soldVal:bfNum(r.soldVal),medVal:bfsVetOK()?bfNum(r.medVal):0});
    touched.push(h); done++;

  if(!done){ if(!neg.length&&!skip) toast('ยังไม่มีหลังที่กรอก'); else if(skip) toast('ทุกแถวที่กรอกยังไม่ได้ใส่ "รับเข้า"'); return; }

  renderBackfillFast();
}
function bfsVetOK(){ return ROLE==='owner'||ROLE==='admin'||ROLE==='vet'; } // ใครเขียนข้อมูลฝั่งหมอ (ค่ายา) ได้

function applyFastSummary(h,x){

  h.intake.inN=x.recv; h.received=x.recv;

  // 2) แถวยอดสรุป (มูลค่าเก็บตรงเป็นบาท) — ลบยอดสรุปเดิมก่อน (กดซ้ำ = แทนที่)

  if(x.medVal>0){ h.meds=(h.meds||[]).filter(m=>!m._bfSum);

  // 4) ประวัติ (กันโกง) + ซิงก์เข้าคลาวด์
  logHouseEdit(h,[{label:'จำนวนรับเข้า',from:fmt(oldRecv),to:fmt(x.recv)},{label:'หมูคงเหลือ',from:fmt(oldPigs),to:fmt(h.pigs)}],
    'ลงยอดรวมย้อนหลัง · ตาย '+fmt(x.dead)+' คัด '+fmt(x.cull)+' ขาย '+fmt(x.sold)+' ตัว · คงเหลือ '+fmt(h.pigs));
  try{ logAudit('หลัง',h.id,'ลงยอดรวมย้อนหลัง',[{label:'รับเข้า',from:fmt(oldRecv),to:fmt(x.recv)},{label:'ตาย',from:'',to:fmt(x.dead)+' ตัว'},{label:'คัด',from:'',to:fmt(x.cull)+' ตัว'},{label:'ขาย',from:'',to:fmt(x.sold)+' ตัว'}],(h.farm||'')+' · '+h.code+' · คงเหลือ '+fmt(h.pigs)); }catch(e){}
  syncHouseClerk(h);

// บวก "หมูรับเข้าเพิ่มเติม" เข้าหลัง → ลิงก์ครบ: ยอดจำนวนรับเข้า (intake.inN/totalW) + คงเหลือ (pigs) + บันทึกรายวัน (ย้ายเข้า) + received

  // 1) ยอดจำนวนรับเข้า (ตารางข้อมูลการรับเข้า) — เพิ่มเข้าทันที + เก็บรายการเพิ่มเติมไว้แสดง (แยกรอบ: วันที่/แหล่ง/นน./ราคา ของตัวเอง)

  h.intake.extra=h.intake.extra||[];
  h.intake.extra.unshift({n:n,w:w,from:from||'',note:note||'',date:dateThai,kind:kind||'รับเข้าเพิ่ม',price:price,cost:price>0?Math.round(n*price):0});

  // 2) บันทึกรายวัน "ย้ายเข้า" — แทรกตามวันที่ (ใหม่→เก่า) รองรับลงย้อนหลัง แล้วคำนวณคงเหลือใหม่ทั้งสาย
  h.dailyLog=h.dailyLog||[];
  if(!h.dailyLog.length && h.dailyAnchor==null) h.dailyAnchor=(h.pigs||0);
  const entry={date:dateThai,by:h.worker||'เสมียน',remain:0,
    deadN:0,cullN:0,soldN:0,moveN:0, moveInN:n,moveInFrom:from||(kind||''),moveInW:w,moveInNote:note||''};
  const log=h.dailyLog, ek=parseThaiDate(dateThai)||DEMO_DATE;
  let pos=log.length; for(let k=0;k<log.length;k++){ const dk=parseThaiDate(log[k].date)||DEMO_DATE; if(dk<=ek){ pos=k; break; } }
  log.splice(pos,0,entry);
  recalcDailyRemains(h); // คงเหลือทุกวัน + pigs + ตัวนับ "วันนี้" (ย้ายเข้าเพิ่มยอดอย่างเดียว ไม่มีทางทำให้ติดลบ)
  if(dateThai===DEMO_DATE_DAY) h.filled=true; // เฉพาะรับเข้าวันนี้จริง — ลงย้อนหลังไม่นับเป็น "กรอกแล้ววันนี้"
  if(h.pigs>0){ h.status='กำลังเลี้ยง'; h.cleanStart=null; }
  // 3) บันทึกลงประวัติการแก้ไขประจำหลัง
  logHouseEdit(h,[{label:'จำนวนรับเข้า',from:fmt(oldInN),to:fmt(h.intake.inN)},{label:'หมูคงเหลือ',from:fmt(oldPigs),to:fmt(h.pigs)}],(kind||'รับเข้าเพิ่ม')+' +'+fmt(n)+' ตัว'+(from?' · จาก '+escA(from):'')+' · วันที่ '+dateThai+(price>0?' · ราคา '+fmt(price)+' บาท/ตัว':''));
  return true;
}

// รวมปริมาณอาหารจากบันทึกการรับอาหารของหมอ ตามเบอร์อาหาร
function feedAgg(h){
  const m={};
  (h.vetLog||[]).filter(e=>e.type==='feed').forEach(e=>{
    const no=e.feedNo||'(ไม่ระบุเบอร์)';
    if(!m[no]) m[no]={no,kg:0,srcs:{},bills:{}};
    m[no].kg+=Number(e.feedKg)||0;
    if(e.feedSrc) m[no].srcs[e.feedSrc]=1;
    if(e.feedBill) m[no].bills[e.feedBill]=1;
  });
  return Object.values(m).map(x=>({no:x.no,kg:x.kg,src:Object.keys(x.srcs).join('/'),bill:Object.keys(x.bills).join(', ')}));
}
// สรุปการกินได้ต่อวัน (จากบันทึก intake ของหมอ) — ล่าสุด / เฉลี่ย / รวม
function intakeAgg(h){
  const recs=(h.vetLog||[]).filter(e=>e.type==='intake');
  if(!recs.length) return {records:0,latest:null,latestKg:0,latestPerPig:0,avgPerPig:0,totalKg:0};
  const latest=recs[0]; // บันทึกใหม่สุดอยู่หน้าสุด (unshift)
  const latestKg=Number(latest.eatKg)||0;
  const latestPerPig=h.pigs>0?latestKg/h.pigs:0;
  let sumPerPig=0,nPerPig=0,totalKg=0;
  recs.forEach(e=>{const kg=Number(e.eatKg)||0;totalKg+=kg;if(h.pigs>0&&kg){sumPerPig+=kg/h.pigs;nPerPig++;}});
  return {records:recs.length,latest,latestKg,latestPerPig,avgPerPig:nPerPig?sumPerPig/nPerPig:0,totalKg};
}
// สรุปการรับอาหารเข้า (จากบันทึก feed ของหมอ) — รวม กก. + ยาผสมล่าสุด
function feedRecvAgg(h){
  const recs=(h.vetLog||[]).filter(e=>e.type==='feed');
  const totalKg=recs.reduce((s,e)=>s+(Number(e.feedKg)||0),0);
  const lastMed=((recs.find(e=>e.feedMed&&e.feedMed.trim())||{}).feedMed||'').trim();
  return {records:recs.length,totalKg,lastMed};
}

// รวมยอดจากบันทึกรายวันทั้งหมดของหลัง
function dailyAgg(h){
  let deadN=0,deadW=0,deadVal=0,cullN=0,cullW=0,cullVal=0,soldN=0,soldW=0,soldVal=0,moveN=0,moveW=0,moveInN=0,moveInW=0;
  (h.dailyLog||[]).forEach(e=>{
    // มูลค่า: ปกติคิดจาก นน.×ราคา/กก. · แต่แถว "ยอดสรุปย้อนหลัง" กรอกมูลค่ารวมเป็นบาทตรงๆ (e.*Val) → ใช้ค่านั้นเลย
    deadN+=e.deadN||0; deadW+=e.deadW||0; deadVal+=(e.deadVal!=null?+e.deadVal:(e.deadW||0)*(e.deadP||0)); // ขายซาก (ถ้ามีราคา)
    cullN+=e.cullN||0; cullW+=e.cullW||0; cullVal+=(e.cullVal!=null?+e.cullVal:(e.cullW||0)*(e.cullP||0));
    soldN+=e.soldN||0; soldW+=e.soldW||0; soldVal+=(e.soldVal!=null?+e.soldVal:(e.soldW||0)*(e.soldP||0));
    moveN+=e.moveN||0; moveW+=e.moveW||0; moveInN+=e.moveInN||0; moveInW+=e.moveInW||0;
  });
  return {deadN,deadW,deadVal,cullN,cullW,cullVal,soldN,soldW,soldVal,moveN,moveW,moveInN,moveInW,
    deadPr:deadW?Math.round(deadVal/deadW):'', cullPr:cullW?Math.round(cullVal/cullW):'', soldPr:soldW?Math.round(soldVal/soldW):''};
}

function gv(id){const e=document.getElementById(id);return e&&e.value!==''?Number(e.value):0;}
// จำนวนวัน เปิดชุด→ปิดชุด (จากวันที่รับเข้า→วันปิดชุด ถ้ากรอกครบ มิฉะนั้นใช้จำนวนวันเลี้ยง)
// จำนวนวันเลี้ยงขุน: นับจากวันที่รับเข้า → วันนี้ (ขณะยังเลี้ยง) หรือ → วันปิดชุด (เมื่อหมูหมดหลัง)
function batchDays(){
  const din=$("#b_dateIn");
  if(din && din.value){
    const pigs=(currentHouse&&currentHouse.pigs)||0, dcl=$("#b_close");
    const end=(pigs<=0 && dcl && dcl.value)? isoLocal(dcl.value) : DEMO_DATE;
    const d=Math.round((end-isoLocal(din.value))/86400000);
    return d>0?d:0;
  }
  return gv('b_days');
}
const FAN_RATE=130; // บาท/พัดลม/วัน
// ค่าใช้จ่ายรายวัน (บาท/วัน) — คิด × จำนวนวันเลี้ยง โดยอัตโนมัติ
const DAILY_COSTS={c_labor:350,c_asst:50,c_vetman:100,c_clerk:50,c_bio:80,c_dep:500};
function calcBatch(){
  if(!document.getElementById('b_inN')) return; // batch form not mounted
  // ค่าไฟฟ้า = จำนวนพัดลม × 130 บาท/วัน × จำนวนวัน
  const fans=(currentHouse&&currentHouse.fanTotal)||0, elecDays=batchDays(), elec=fans*FAN_RATE*elecDays;
  const ce=document.getElementById('c_elec'); if(ce) ce.value=elec;
  const en=document.getElementById('elecNote'); if(en) en.textContent='พัดลม '+fans+' ตัว × '+FAN_RATE+' บาท/วัน × '+elecDays+' วัน = '+fmt(elec)+' บาท';
  // จำนวนวันเลี้ยงขุน (นับอัตโนมัติจากวันที่รับเข้า)
  const bd=document.getElementById('b_days'); if(bd) bd.value=elecDays;
  const dn=document.getElementById('daysNote');
  if(dn){
    const din=$("#b_dateIn"), pigs=(currentHouse&&currentHouse.pigs)||0, dcl=$("#b_close");
    if(din&&din.value){ const frozen=(pigs<=0 && dcl && dcl.value);
      dn.textContent='📅 นับจากวันรับเข้า '+din.value+' ถึง '+(frozen?('วันปิดชุด '+dcl.value):'วันนี้')+' = '+fmt(elecDays)+' วัน'+(frozen?' · ปิดชุดแล้ว (หยุดนับ)':' · กำลังเลี้ยง (นับต่อทุกวัน)');
    } else dn.textContent='⚠️ ใส่ "วันที่รับเข้า" ด้านบน เพื่อให้นับจำนวนวันเลี้ยงอัตโนมัติ';
  }
  // ค่าใช้จ่ายรายวัน = เรต/วัน × จำนวนวันเลี้ยง (อ่านอย่างเดียว)
  Object.keys(DAILY_COSTS).forEach(id=>{
    const amt=DAILY_COSTS[id]*elecDays;
    const e=document.getElementById(id); if(e) e.value=amt;
    const nt=document.getElementById(id+'Note'); if(nt) nt.textContent=DAILY_COSTS[id]+' บาท/วัน × '+elecDays+' วัน = '+fmt(amt)+' บาท';
  });
  const inN=gv('b_inN'),inW=gv('b_inW'),inP=gv('b_inP');
  const sIn=document.getElementById('s_inN'); if(sIn) sIn.textContent=fmt(inN);
  const deadN=gv('b_deadN'),deadW=gv('b_deadW'),deadVal=gv('b_deadVal'),cullN=gv('b_cullN'),cullW=gv('b_cullW'),cullVal=gv('b_cullVal');
  const outN=gv('b_outN'),outW=gv('b_outW'),outVal=gv('b_outVal');
  const days=gv('b_days');
  let feedKg=0,feedCost=0;
  feedAgg(currentHouse).forEach((r,i)=>{const pr=gv('f_pr_'+i);feedKg+=r.kg;feedCost+=r.kg*pr;const amt=document.getElementById('f_amt_'+i);if(amt)amt.textContent=fmt(Math.round(r.kg*pr));});
  const cft=document.getElementById('c_feedTotal'); if(cft) cft.value=Math.round(feedCost);
  const otherCost=['c_inject','c_vaccine','c_feedmed','c_formula','c_supply','c_equip','c_labor','c_asst','c_vetman','c_clerk','c_bio','c_elec','c_dep'].reduce((s,id)=>s+gv(id),0)+bxTotal(); // + ค่าใช้จ่ายอื่นๆ ที่เพิ่มเอง
  const bIt=(currentHouse&&currentHouse.intake)||{}, breedTotal=bIt.breedTotal||0;
  // ต้นทุนลูกหมูแบบหลายรอบ: รอบรับเข้าเพิ่มที่บันทึกราคาไว้ → คิดตามราคาของรอบนั้น · ตัวที่เหลือ (รอบแรก+รอบที่ไม่ใส่ราคา) → คิดด้วย "ราคารับเข้า/ตัว" (b_inP)
  const xLots=(bIt.extra||[]).filter(e=>(e.price||0)>0&&(e.n||0)>0);
  const xN=xLots.reduce((s,e)=>s+e.n,0), xCost=xLots.reduce((s,e)=>s+e.n*e.price,0);
  const pigCost=(inP>0?Math.max(0,inN-xN)*inP:breedTotal)+xCost; // ถ้าไม่กรอก "ราคารับเข้า/ตัว" → ใช้ค่าลูกหมูที่บันทึกตอนรับเข้า (breedTotal) แทน · กันต้นทุนลูกหมูเป็น 0 ทำให้กำไรพองเกินจริง
  const xn=document.getElementById('s_inExtraNote'); if(xn) xn.textContent=xCost>0?('รวมรอบรับเข้าเพิ่ม '+fmt(xN)+' ตัว = '+fmt(Math.round(xCost))+' บาท (ตามราคาแต่ละรอบ) · ราคา/ตัวซ้ายมือใช้กับ '+fmt(Math.max(0,inN-xN))+' ตัวที่เหลือ'):'';
  const revenue=deadVal+cullVal+outVal;
  const totalCost=pigCost+feedCost+otherCost;
  const profit=revenue-totalCost;
  const avgIn=inN?inW/inN:0, avgOut=outN?outW/outN:0;
  const loss=inN?(deadN+cullN)/inN*100:0;
  const adg=(days&&avgOut&&avgIn)?(avgOut-avgIn)/days:0;
  const gainW=(outW+cullW)-avgIn*(outN+cullN); // นน.ที่โตขึ้นของหมูที่ออกแบบมีชีวิต (ขาย+คัด) — เดิมนับเฉพาะขาย ทำให้ FCR เพี้ยน
  const eatKg=intakeAgg(currentHouse).totalKg;  // อาหารที่ "กินจริง" (จากบันทึกการกินได้ของหมอ)
  const fcrFeed=eatKg>0?eatKg:feedKg;           // ใช้อาหาร "กินจริง" ถ้ามี · ไม่งั้น fallback เป็นอาหารรับเข้า (จะสูงกว่าจริงเพราะมีอาหารเหลือในถัง)
  const fcr=(gainW>0 && avgIn>0)?fcrFeed/gainW:0; // FCR = อาหาร ÷ นน.ที่โตขึ้น · ต้องมี "นน.เฉลี่ยเข้า" จึงคิดได้ ไม่งั้นโชว์ "—"
  const liveOut=outN+cullN; // หมูที่ออกแบบมีชีวิต = ขายขุน + คัดขาย (คัดขายก็มีรายได้รวมในกำไร)
  const perPig=liveOut?profit/liveOut:(inN?profit/inN:0); // กำไรเฉลี่ย/ตัว หารด้วยหมูที่ออกแบบมีชีวิต (ขาย+คัด) ให้ตรงกับ FCR
  const setT=(id,val,color)=>{const e=document.getElementById(id);if(e){e.textContent=val;if(color)e.style.color=color;}};
  const c=(ok)=>ok?'var(--ok)':'var(--bad)';
  setT('s_days',days?fmt(days)+' วัน':'—');
  setT('s_loss',inN?loss.toFixed(2)+'%':'—',inN?c(loss<2):'');
  setT('s_adg',adg?adg.toFixed(3):'—',adg?c(adg>=0.78):'');
  setT('s_fcr',fcr?fcr.toFixed(2):'—',fcr?c(fcr<=2.5):'');
  const fb=document.getElementById('s_fcr_basis'); if(fb) fb.textContent=fcr?(eatKg>0?'(จากกินจริง)':'(จากอาหารรับเข้า)'):'';
  const an=document.getElementById('s_adg_note'); if(an){ an.textContent=''; an.style.color='var(--muted)';
    if(avgIn<=0){ an.textContent='— ใส่ "รับเข้า(นน.)" ก่อน'; }
    else if(days>130 && avgIn<15){ an.textContent='⚠️ ตรวจช่วง นน./วัน'; an.style.color='var(--warn)'; } }
  setT('s_rev',fmt(Math.round(revenue)));
  setT('s_cost',fmt(Math.round(totalCost)));
  setT('s_profit',fmt(Math.round(profit)),c(profit>=0));
  setT('s_perpig',(perPig>=0?'+':'')+fmt(Math.round(perPig)),c(perPig>=0));
  setT('s_feed',fmt(Math.round(feedKg))+' กก. · '+fmt(Math.round(feedCost))+' บาท');
  setT('s_avg',(avgIn?avgIn.toFixed(1):'—')+' → '+(avgOut?avgOut.toFixed(1):'—')+' กก.');
  setT('s_inVal',(pigCost>0)?fmt(Math.round(pigCost)):'—'); // โชว์ต้นทุนลูกหมูที่ใช้จริง (รวมกรณีดึงจากค่าลูกหมูตอนรับเข้า)
  setT('s_deadAvg',(deadW&&deadVal)?fmt(Math.round(deadVal/deadW)):'—');
  setT('s_cullAvg',(cullW&&cullVal)?fmt(Math.round(cullVal/cullW)):'—');
  setT('s_outAvg',(outW&&outVal)?fmt(Math.round(outVal/outW)):'—');
  const sold=deadN+cullN+outN, wb=document.getElementById('batchWarn');

function submitBatch(){

}

  const to=(($("#stkTfTo")||{}).value||''), qty=parseFloat(($("#stkTfQty")||{}).value)||0, note=(($("#stkTfNote")||{}).value||'').trim();

  if(to===from){toast('ฟาร์มปลายทางต้องต่างจากต้นทาง');return;}
  if(!name){toast('เลือกรายการที่จะโอน');return;}
  if(!stockCountable(cat)){toast('หมวดนี้ไม่นับสต็อก (เช่น ยาสูตร) — โอนไม่ได้');return;}
  if(qty<=0){toast('ระบุจำนวนที่โอน (มากกว่า 0)');return;}
  const onHand=stockOnHand(from,cat,name);
  if(qty>onHand){toast('❌ สต็อกไม่พอ — '+from+' มี "'+name+'" เหลือ '+fmt(onHand)+' (ขอโอน '+fmt(qty)+')');return;}

  stockMoveAdd(from,{date:DEMO_DATE_DAY,type:'out',delta:-qty,cat,name,price,by,ref:'โอนไป '+to,note:('โอนออกไป '+to)+(note?' · '+note:'')});

  toast('🔄 โอน '+name+' '+fmt(qty)+' → '+to+' · '+from+' เหลือ '+fmt(stockOnHand(from,cat,name))+' ✓');

function stockReceiveSubmit(){
  if(!stockCanEdit()){toast('เฉพาะเสมียน/ผู้ดูแลเท่านั้นที่รับเข้าคลังได้');return;}
  const farm=stockFarm, cat=$("#stkInCat").value, name=($("#stkInName").value||'').trim();
  const qty=parseFloat($("#stkInQty").value)||0, price=parseFloat($("#stkInPrice").value);
  const ref=($("#stkInRef").value||'').trim(), note=($("#stkInNote").value||'').trim();
  const exp=(($("#stkInExp")||{}).value||'').trim();
  if(!name){toast('เลือกรายการที่รับเข้า');return;}
  if(qty<=0){toast('ระบุจำนวนที่รับเข้า (มากกว่า 0)');return;}
  stockMoveAdd(farm,{date:DEMO_DATE_DAY,type:'in',delta:qty,cat,name,price:isNaN(price)?catalogPriceOf(cat,name):price,by:(CURRENT_USER&&CURRENT_USER.name)||'เสมียน',ref:ref||'รับเข้า',note,exp:exp||''});
  // วันหมดอายุเก็บที่ "ล็อต" (move) นี้ — ไม่ทับค่ารวมราย item อีกต่อไป · ของหลายล็อตวันหมดอายุต่างกันจะแสดงแยกล็อตได้
  logAudit('คลัง', farm+' · '+name, 'รับเข้า +'+fmt(qty), [{label:'รับเข้าคลัง',from:'-',to:'+'+fmt(qty)}], (ref?('บิล '+ref):'')+(note?(' · '+note):''));
  syncConfig();
  toast('📥 รับเข้า '+name+' +'+fmt(qty)+' → '+farm+' · คงเหลือ '+fmt(stockOnHand(farm,cat,name))+' ✓');
  renderStock();
}
function stockSetCountIdx(idx){
  if(!stockCanEdit()){toast('เฉพาะเสมียน/ผู้ดูแล');return;}
  const r=_stkRows[idx]; if(!r) return;
  const el=$("#stkset_"+idx), nv=parseFloat(el&&el.value);
  if(isNaN(nv)||nv<0){toast('ใส่จำนวนคงเหลือใหม่');return;}
  const cur=stockOnHand(stockFarm,r.cat,r.name), delta=nv-cur;
  if(delta===0){toast('ยอดเท่าเดิม');return;}
  stockMoveAdd(stockFarm,{date:DEMO_DATE_DAY,type:'adjust',delta,cat:r.cat,name:r.name,price:r.price,by:(CURRENT_USER&&CURRENT_USER.name)||'เสมียน',ref:'ปรับยอด',note:'ปรับ '+fmt(cur)+' → '+fmt(nv)});
  logAudit('คลัง', stockFarm+' · '+r.name, 'ปรับยอดคงเหลือ', [{label:'คงเหลือ',from:fmt(cur),to:fmt(nv)}], '');
  syncConfig(); toast('⚙️ ปรับยอด '+r.name+' = '+fmt(nv)+' ✓'); renderStock();
}
function stockSetMinIdx(idx,val){

// เสมียนแก้ราคา/หน่วย (ที่เดียวที่ตั้งราคา) → เขียนกลับแคทาล็อก + อัปเดตมูลค่าในบันทึกเบิกที่ "ยังไม่ปิดชุด" ให้ตรงราคาใหม่ (รุ่นที่ปิดชุดแล้วตรึงราคาเดิมไว้เป็นประวัติ)
function stockSetPriceIdx(idx,val){
  if(!canEditPrice()){toast('🔒 ราคา/หน่วยแก้ได้เฉพาะเจ้าของเท่านั้น');return;}   // กันเสมียน/ผู้ดูแลแก้ฐานต้นทุน
  const r=_stkRows[idx]; if(!r) return;
  const it=catalogItemOf(r.cat,r.name); if(!it){toast('ไม่พบรายการในแคทาล็อก');return;}
  const oldPrice=Number(it.price)||0, np=Math.max(0,parseFloat(val)||0); if(np===oldPrice){renderStock();return;} it.price=np;
  let touched=0;

function smHouseOf(m){ if(m.house) return m.house; const x=String(m.ref||'').match(/หลัง\s*([^\s·]+)/); return x?x[1]:''; }

  const out=[];
  smFarmList().forEach(f=>{
    const copies=(farmStock(f).moves||[]).map(m=>Object.assign({_farm:f},m));   // ใหม่→เก่า
    const asc=copies.slice().reverse(), run={};
    asc.forEach(c=>{ const k=stockKey(c.cat,c.name); run[k]=(run[k]||0)+(Number(c.delta)||0); c.__after=run[k]; });

function requestMedRow(cat,ci,i){ if(blockIfReadonly())return;
  const name=($("#rn_"+ci+"_"+i).value||'').trim();
  const price=catalogPriceOf(cat,name);   // ราคาจากแคทาล็อกที่เสมียนตั้งในหน้าคลัง — หมอไม่กรอก/ไม่เห็น (ต้นทุนผูกกับของที่เบิกจริง × ราคาที่เสมียนตั้ง)
  const dose=($("#rd_"+ci+"_"+i).value||'').trim();
  const note=($("#rm_"+ci+"_"+i).value||'').trim();
  const qty=parseInt($("#rq_"+ci+"_"+i).value)||0;
  const code=(reqHouseCode||'').toUpperCase();
  if(!code){toast('กรุณาเลือกรหัสหลังที่เบิก (ด้านบน)');return;}

  const h=HOUSES.find(x=>(x.code||'').toUpperCase()===code);

  syncHouseVet(h);

  updateReqHist();
}

const VET_TYPE_LABEL={treat:'การรักษา',feed:'การรับอาหาร',intake:'การกินได้'};
function saveVetEdit(hid,id){ if(blockIfReadonly())return;
  const h=HOUSES.find(x=>x.id===hid); if(!h) return;
  const rec=(h.vetLog||[]).find(e=>e._id===id); if(!rec) return;
  const changes=[];
  (VET_EDIT_FIELDS[rec.type]||[]).forEach(([key,label,kind])=>{
    const el=document.getElementById('ve_'+id+'_'+key); if(!el) return;
    const ov=(rec[key]==null?'':String(rec[key])).trim();
    const nvRaw=el.value, nvTrim=(nvRaw==null?'':String(nvRaw)).trim();
    let nv,newVal;
    if(kind==='num'){ newVal = nvTrim===''?'':Number(nvTrim); nv = nvTrim===''?'':String(newVal); }
    else { newVal = nvRaw; nv = nvTrim; }
    if(ov!==nv){
      changes.push({label:label,from:ov||'(ว่าง)',to:nv||'(ว่าง)'});
      rec[key]=newVal;
    }
  });
  if(changes.length){
    h.editLog=h.editLog||[];
    h.editLog.unshift({time:nowStamp(),ts:Date.now(),by:whoNow(),role:ROLE_LABEL[ROLE]||'-',_dom:'vet',changes:changes,note:'แก้ไขประวัติหมอ — '+(VET_TYPE_LABEL[rec.type]||'')+' · '+(rec.date||'')});
    syncHouseVet(h); // ซิงก์ช่อง "งานหมอ" (v2) — เก็บการแก้ไขประวัติหมอ + ประวัติแก้ลงช่อง vet
    toast('บันทึกการแก้ไขแล้ว ('+changes.length+' ช่อง) ✓');
  } else toast('ไม่มีการเปลี่ยนแปลง');
  vetEdit={hid:null,id:null};
  rerenderCurrent();
}

async function adminUsersCall(payload){
  const tok=await supaToken();
  if(!tok) throw new Error('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
  const r=await fetch(CONFIG.supabase.url+'/functions/v1/admin-users',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok,'apikey':CONFIG.supabase.anonKey},
    body:JSON.stringify(payload)});
  const j=await r.json().catch(()=>({error:'เซิร์ฟเวอร์ตอบกลับผิดพลาด'}));
  if(!r.ok) throw new Error(j.error||('ผิดพลาด ('+r.status+')'));
  return j;
}

async function userCreate(){

// ---- ปรับแต่งตัวเลือกฟอร์มเสมียน ----
function cfgArr(key){return key==='death'?DEATH_TYPES:key==='cull'?CULL_TYPES:key==='source'?SOURCE_OPTIONS:CUSTOMERS;}
// เปลี่ยนชื่อตัวเลือก (สาเหตุตาย/ประเภทคัด/แหล่งรับเข้า/ลูกค้า) → กวาดแก้รายการเก่าที่อ้างชื่อเดิมให้ตามไปด้วย (กันข้อมูลหลุดการเชื่อม)
function cascadeOptionRename(key,oldVal,newVal){
  oldVal=(oldVal||'').trim(); newVal=(newVal||'').trim();
  if(!oldVal||oldVal===newVal||!newVal) return {count:0,houses:[]}; // ค่าใหม่ว่าง = ไม่กวาดแก้ (กันลบค่าออกจากรายการเก่าทั้งหมดโดยไม่ตั้งใจ)
  let n=0; const touched=new Set();
  const hit=(o,f)=>{ if(o&&o[f]===oldVal){ o[f]=newVal; n++; return true; } return false; };
  HOUSES.forEach(h=>{ let ch=false;
    (h.dailyLog||[]).forEach(e=>{
      if(key==='death'){ if(hit(e,'deadType'))ch=true; }
      else if(key==='cull'){ if(hit(e,'cullType'))ch=true; }
      else if(key==='cust'){ if(hit(e,'deadCust'))ch=true; if(hit(e,'cullCust'))ch=true; if(hit(e,'soldCust'))ch=true; if(e.cust===oldVal){e.cust=newVal;ch=true;} }
    });
    if(key==='source'){
      if(h.intake){ if(hit(h.intake,'source'))ch=true; (h.intake.extra||[]).forEach(x=>{ if(hit(x,'from'))ch=true; }); }
      (h.closedBatches||[]).forEach(b=>{ if(hit(b,'source'))ch=true; if(b.intake&&hit(b.intake,'source'))ch=true; });
      if(h.source===oldVal){ h.source=newVal; ch=true; }
    }
    if(ch) touched.add(h);
  });
  return {count:n,houses:[...touched]};
}
function countOptionRefs(key,val){ val=(val||'').trim(); if(!val) return 0; let n=0;
  HOUSES.forEach(h=>{ (h.dailyLog||[]).forEach(e=>{
      if(key==='death'&&e.deadType===val)n++;
      else if(key==='cull'&&e.cullType===val)n++;
      else if(key==='cust'&&(e.deadCust===val||e.cullCust===val||e.soldCust===val))n++; });
    if(key==='source'){ if(h.intake&&h.intake.source===val)n++; (h.closedBatches||[]).forEach(b=>{ if(b.source===val)n++; }); } });
  return n;
}
// เปลี่ยน "รหัสหลัง" → กวาดแก้ลิงก์ย้ายหมู (ปลายทาง moveDest + หมูระหว่างทาง from) ให้ตามไปด้วย
function cascadeHouseRename(oldCode,newCode){
  oldCode=(oldCode||'').trim(); newCode=(newCode||'').trim();
  if(!oldCode||oldCode===newCode) return {count:0,houses:[]};
  let n=0; const touched=new Set();
  HOUSES.forEach(h=>{ let ch=false;
    (h.dailyLog||[]).forEach(e=>{ if(e.moveDest===oldCode){ e.moveDest=newCode; n++; ch=true; } });
    (h.incoming||[]).forEach(t=>{ if(t.from===oldCode){ t.from=newCode; n++; ch=true; } });
    if(ch) touched.add(h);
  });
  return {count:n,houses:[...touched]};
}
function cfgSet(key,i,val){ const arr=cfgArr(key), oldVal=arr[i]; val=(val||'').trim(); arr[i]=val;
  const res=cascadeOptionRename(key,oldVal,val); syncConfig();
  if(res.count>0){ res.houses.forEach(h=>syncHouseClerk(h)); queueSave(); toast('แก้ชื่อแล้ว · อัปเดต '+res.count+' รายการที่ใช้ชื่อเดิมตามไปด้วย'); }
}
function cfgAdd(key){cfgArr(key).push('');syncConfig();renderAdmin();}
function cfgDel(key,i){ const arr=cfgArr(key), val=arr[i], refs=countOptionRefs(key,val);
  if(refs>0 && !confirm('ตัวเลือก "'+val+'" ถูกใช้อยู่ใน '+refs+' รายการเดิม\n\nลบได้ — แต่ตัวเลือกจะหายจากเมนู (รายการเก่ายังเก็บชื่อนี้ไว้ ไม่หาย)\nต้องการลบหรือไม่?')) return;
  arr.splice(i,1); syncConfig(); renderAdmin();
}

  if(outRef){ alert('ลบไม่ได้: หลังนี้ "ย้ายออก" หมูไปหลังอื่น และยังรอปลายทางยืนยันรับเข้า — โปรดให้หลังปลายทางยืนยันรับเข้า หรือยกเลิกการย้ายก่อน แล้วจึงลบ (กันบันทึกย้ายค้างชี้หลังที่ถูกลบ)'); return; }

let SALE_BILLS=[]; try{ const _sb0=JSON.parse(localStorage.getItem('sjfSaleBills')||'[]'); if(Array.isArray(_sb0)) SALE_BILLS=_sb0; }catch(e){}
let _dirtySB={};
function sbPersist(){ try{ localStorage.setItem('sjfSaleBills', JSON.stringify(SALE_BILLS)); }catch(e){} }
async function saveSaleBillRemote(b){
  // 🛡️ ส่ง "เวอร์ชันที่เราโหลดมา" (p_base_ts) ไปด้วย — ถ้ามีคนอื่นบันทึกบิลใบเดียวกันไปก่อน เซิร์ฟเวอร์จะไม่ทับเงียบๆ แต่ตอบ conflict กลับมาให้ถามผู้ใช้
  const body={p_id:b.id, p_farm:b.farm||'', p_bill_date:b.dateISO||todayISO(), p_kind:b.kind||'fatten', p_data:b};
  if(b._baseTs) body.p_base_ts=b._baseTs;
  let r=await supaFetch('/rest/v1/rpc/save_sale_bill',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r&&r.status===404&&body.p_base_ts){ // หลังบ้านยังเป็นรุ่นเก่า (ไม่รู้จัก p_base_ts) → บันทึกแบบเดิมไปก่อน ไม่ให้บิลค้าง
    delete body.p_base_ts;
    r=await supaFetch('/rest/v1/rpc/save_sale_bill',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  }
  if(!r||!r.ok) return false;
  let j=null; try{ j=await r.json(); }catch(e){}
  if(j&&j.conflict){ sbConflict(b,j); return 'conflict'; } // แยกจาก false (เน็ตล้ม) — conflict มีกล่องถามผู้ใช้จัดการแล้ว ไม่ต้องคิวส่งซ้ำ
  b._synced=true; if(j&&j.updated_at) b._baseTs=j.updated_at;  // จำเวอร์ชันล่าสุดไว้ใช้ครั้งหน้า
  sbPersist(); return true;
}
function sbConflict(b,j){ // ⚠️ บิลใบเดียวกันถูกอีกเครื่องบันทึกตัดหน้า — ให้คนตัดสิน ไม่ทับเงียบๆ
  const who=(j&&j.updated_by)||'ผู้ใช้อื่น';

    b._baseTs=null; syncSaleBill(b);   // ผู้ใช้ยืนยันทับ → ส่งใหม่แบบไม่เช็คเวอร์ชัน
  }else{
    try{ localStorage.setItem('sbDraft', JSON.stringify({d:JSON.parse(JSON.stringify(b)), isNew:false, t:nowStamp()})); }catch(e){}
    sbCloudLoad().then(()=>{ const top=navHist[navHist.length-1]; if(top&&top.key==='salestand') renderSaleStand(); toast('โหลดบิลเวอร์ชันของ '+who+' แล้ว — ของเราอยู่ใน "บิลค้าง" เปิดเทียบได้'); });
  }
}
async function sbCloudLoad(){ // โหลดบิลจากระบบกลาง (ถ้าหลังบ้านยังไม่เปิดตาราง → คงข้อมูลในเครื่อง)
  const r=await supaFetch('/rest/v1/rpc/load_sale_bills',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  if(!r||!r.ok) return false;
  const rows=await r.json(); if(!Array.isArray(rows)) return false;
  const cloud=rows.map(x=>{ const d=(x.data&&typeof x.data==='object')?x.data:{}; d.id=x.id; d.farm=x.farm; d.kind=x.kind||d.kind||'fatten'; d.dateISO=(x.bill_date||d.dateISO||'').slice(0,10); d._synced=true; d._baseTs=x.updated_at||null; return d; });
  const ids={}; cloud.forEach(b=>ids[b.id]=1);
  // บิลที่สร้างตอนออฟไลน์/ซิงก์ไม่สำเร็จ (ยังไม่เคยขึ้นคลาวด์) → เก็บไว้ + ดันขึ้นคลาวด์ใหม่ ไม่โดนทับหาย
  const localOnly=SALE_BILLS.filter(b=>b&&b.id&&!b._synced&&!ids[b.id]);
  // บิลที่เพิ่งแก้ในเครื่องแต่ยังซิงก์ไม่เสร็จ (อยู่ในคิว) → ใช้ฉบับในเครื่อง ไม่ให้ฉบับคลาวด์เก่ากว่ามาทับ (คิวจะดันขึ้นเอง)
  const pending={}; Object.keys(_dirtySB).forEach(id=>{ const lb=SALE_BILLS.find(x=>x&&x.id===id); if(lb) pending[id]=lb; });
  SALE_BILLS=localOnly.concat(cloud.map(b=>pending[b.id]||b));
  localOnly.forEach(b=>syncSaleBill(b));
  sbPersist(); return true;
}

function sbHouseRemain(code,farm){ // ยอดหมูคงเหลือปัจจุบันของหลัง (null = หาหลังไม่เจอ/ไม่มีข้อมูล) — บิลระบุฟาร์ม = จับคู่เฉพาะฟาร์มนั้น (เหมือน sbFindHouse ตอนลงเข้าหลังจริง กันเทียบยอดผิดฟาร์ม)

function sbOverList(b){ // 🛡️ หลังไหนที่จำนวนหมูในบิล "เกิน" ยอดคงเหลือจริงของเล้า (กันลงเกิน/ลงผิดหลัง)

function sbBandIdx(b,w){ const bs=b.bands||[]; for(let i=0;i<bs.length;i++){ if(w>=bs[i].a && (i===bs.length-1 || w<bs[i+1].a)) return i; } return bs.length-1; } // ปิดช่องว่างระหว่างช่วง (เช่น 9.5 กก. อยู่ระหว่าง [0,9] กับ [10,14]) — เดิมตกไปช่วงท้ายสุด 151-300 คิดราคาผิดเจ้า
function sbCalc(b){
  const c={n:0,totW:0,avg:0,houseN:0,scaleNet:null,diff:null,gross:null,deduct:0,net:null,pending:false,bandAgg:[]};
  c.houseN=(b.houses||[]).reduce((s,x)=>s+(parseInt(x.n)||0),0);
  if(b.kind==='deadcull'){
    const items=b.items||[]; c.n=items.length; c.totW=items.reduce((s,x)=>s+sbNum(x.w),0);
    const agg=(b.bands||[]).map(()=>({cullW:0,deadW:0}));
    items.forEach(x=>{ const i=sbBandIdx(b,sbNum(x.w)); if(!agg[i]) return; if(x.type==='cull') agg[i].cullW+=sbNum(x.w); else agg[i].deadW+=sbNum(x.w); });
    c.bandAgg=agg;
    let gross=0, missing=false;
    (b.bands||[]).forEach((bd,i)=>{
      if(agg[i].cullW>0){ if(bd.cull===''||bd.cull==null) missing=true; else gross+=agg[i].cullW*sbNum(bd.cull); }
      if(agg[i].deadW>0){ if(bd.dead===''||bd.dead==null) missing=true; else gross+=agg[i].deadW*sbNum(bd.dead); }
    });
    c.gross=(c.totW>0&&!missing)?Math.round(gross):null; c.pending=c.totW>0&&missing;
  }else{
    const ws=b.weights||[]; c.n=ws.length; c.totW=ws.reduce((s,x)=>s+sbNum(x),0);
    const p=b.pricePerKg;
    if(c.totW>0){ if(p===''||p==null) c.pending=true; else c.gross=Math.round(c.totW*sbNum(p)); }
  }
  c.avg=c.n?(c.totW/c.n):0;
  const si=sbNum(b.scaleIn), so=sbNum(b.scaleOut);
  if(si>0&&so>0){ c.scaleNet=Math.abs(so-si); c.diff=Math.round((c.totW-c.scaleNet)*10)/10; }
  c.deduct=(b.deducts||[]).reduce((s,x)=>s+sbNum(x.amt),0);
  if(c.gross!=null) c.net=c.gross-c.deduct;
  // ⏱ เวลาขึ้นหมู (จากเวลาเริ่ม-เสร็จ) + วินาที/ตัว — ตรงกับที่เสมียนเคยจดมือบนบิลกระดาษ
  c.loadMin=null; c.secPig=null;
  if(b.timeStart&&b.timeEnd){ const m=t=>{const q=String(t).split(':');return (+q[0])*60+(+q[1]||0);};
    let d=m(b.timeEnd)-m(b.timeStart);
    if(isFinite(d)){ if(d<0) d+=1440; c.loadMin=d; if(c.n>0&&d>0) c.secPig=Math.round(d*60/c.n); } }
  // 📋 ความครบถ้วนของบิล (โชว์บนแถบสรุปลอย — เห็นทันทีว่าขาดอะไร)
  c.miss=[];
  if(!gNrm(b.buyer)) c.miss.push('ผู้ซื้อ');
  if(!String(b.truck||'').trim()) c.miss.push('ทะเบียนรถ');
  if(!(sbNum(b.scaleIn)>0&&sbNum(b.scaleOut)>0)) c.miss.push('ตาชั่งรถ');
  if(!String(b.billBook||'').trim()&&!String(b.billNo||'').trim()) c.miss.push('เล่ม/เลขที่');
  if(b.kind!=='deadcull'&&!(b.houses||[]).some(x=>x&&x.code)) c.miss.push('แบ่งหลัง');
  return c;
}

  if(SB_D.kind!=='deadcull'&&c.houseN&&c.n) h+=(c.houseN===c.n?chip('🏠 แบ่งหลังครบ','ok'):chip('🏠 แบ่งหลัง '+fmt(c.houseN)+' ≠ '+fmt(c.n),'bad','จำนวนที่แบ่งรายหลังไม่เท่ากับจำนวนที่ชั่งจริง'));
  const ovs=sbOverList(SB_D);
  if(ovs.length) h+=chip('⛔ เกินยอดเล้า: '+ovs.map(o=>escA(o.code)+' ลง '+fmt(o.n)+' > เหลือ '+fmt(o.remain)).join(' · '),'bad','จำนวนหมูที่ลงขายมากกว่ายอดคงเหลือในเล้า — เช็คเลขหลัง/จำนวนกับหน้าเล้าก่อนบันทึก');
  h+=(c.net!=null?chip('💰 <b>'+fmt(c.net)+'</b> บาท','ok'):(c.pending?chip('⏳ รอใส่ราคา','warn'):''));
  if(c.loadMin!=null) h+=chip('⏱ '+fmt(c.loadMin)+' นาที'+(c.secPig?' · <b>'+c.secPig+'</b> วิ/ตัว':''),'','เวลาขึ้นหมูจากเวลาเริ่ม-เสร็จ');
  h+=(c.miss&&c.miss.length?chip('📋 ขาด: '+c.miss.join(' · '),'warn','ช่องสำคัญที่ยังไม่ได้กรอก'):chip('📋 ข้อมูลครบ','ok'));
  return `<div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">${h}</div>`;
}
function sbRefresh(){ // อัปเดตเฉพาะส่วนคำนวณ (ไม่วาดฟอร์มใหม่ทั้งหน้า — โฟกัสช่องพิมพ์ไม่หลุด) + เก็บร่างอัตโนมัติ

/* ---------- 📥 ร่างบิลอัตโนมัติ — เน็ตหลุด/แบตหมด/เผลอกดออก บิลที่พิมพ์ค้างไม่หาย ---------- */
function sbDraftSave(){ try{ if(SB_D) localStorage.setItem('sbDraft', JSON.stringify({d:SB_D, isNew:!!SB_ISNEW, t:nowStamp()})); }catch(e){} }
function sbDraftDrop(){ try{ localStorage.removeItem('sbDraft'); }catch(e){} }
function sbDraftGet(){ try{ const d=JSON.parse(localStorage.getItem('sbDraft')||'null'); return (d&&d.d&&d.d.id)?d:null; }catch(e){ return null; } }
function sbDraftHasContent(d){ // ร่างมี "ของจริง" ที่เสียดายมั้ย (น้ำหนัก/รายการหมู/ผู้ซื้อ/แบ่งหลัง)
  d=d||sbDraftGet(); if(!d||!d.d) return false; const x=d.d;
  return !!(((x.weights||[]).length)||((x.items||[]).some(i=>i&&sbNum(i.w)>0))||gNrm(x.buyer)||((x.houses||[]).some(h=>h&&h.code)));
}
function sbDraftGuard(){ // เรียกก่อนเริ่มบิลใหม่/เปิดบิลอื่น — มีบิลค้างต้องถามก่อน ห้ามทับเงียบๆ · true = ไปต่อได้
  const d=sbDraftGet(); if(!d||!sbDraftHasContent(d)) return true;
  const desc=((SB_KIND[d.d.kind]||{}).t||'บิล')+' · '+(d.d.buyer||'ยังไม่ระบุผู้ซื้อ')+((d.d.weights||[]).length?' · '+fmt(d.d.weights.length)+' ตัว':'');
  if(confirm('📥 มีบิลค้างที่ยังไม่ได้บันทึก ('+desc+')\n\nกด "ตกลง" = กลับไปกรอกบิลค้างต่อ\nกด "ยกเลิก" = ทิ้งบิลค้าง แล้วทำรายการใหม่')){ sbDraftResume(); return false; }
  sbDraftDrop(); return true;
}
function sbDraftResume(){ const d=sbDraftGet(); if(!d){ toast('ไม่พบบิลค้าง'); return; } SB_D=d.d; SB_ISNEW=!!d.isNew; renderSaleBillForm(); toast('📥 กู้บิลค้างกลับมาแล้ว — กรอกต่อได้เลย'); }
/* ---------- 📡 ถ่ายทอดสดร่างบิล — เครื่องเสมียนที่เปิดฟอร์มบิลอยู่ ส่งภาพย่อของบิลขึ้นคลาวด์ (ตาราง sale_stand_live, 1 แถว/เครื่อง)
   → เจ้าของเปิดหน้า "มอนิเตอร์แท่นขาย" เห็นสดทุกแท่นว่าใครกำลังกรอกบิลไหน กี่ตัว กี่ กก. · เบา (ส่งเฉพาะตอนตัวเลขเปลี่ยน สูงสุด ~1 ครั้ง/4 วิ) · พังเงียบถ้าออฟไลน์ ---------- */
let _sbLiveLast=0,_sbLiveTimer=null,_sbLiveSentKey='',_sbLiveHb=null,_sbLiveWasOpen=false;
function sbLiveOn(){ const c=CONFIG.supabase; return !!(c&&c.enabled&&c.backend==='v2'&&ROLE); }
function sbLiveSnap(){ // ภาพย่อของบิลที่กำลังกรอก (เล็กพอส่งบ่อยๆ ได้)
  if(!SB_D) return null;
  let c; try{ c=sbCalc(SB_D); }catch(e){ return null; }
  const lastW=SB_D.kind==='deadcull'
    ? (function(){ const it=(SB_D.items||[]).filter(x=>sbNum(x.w)>0); return it.length?it[it.length-1].w:''; })()
    : ((SB_D.weights||[]).slice(-1)[0]||'');
  return {billId:SB_D.id, kind:SB_D.kind, farm:SB_D.farm||'', buyer:SB_D.buyer||'', dateISO:SB_D.dateISO||'',
    n:c.n, totW:Math.round(c.totW*10)/10, avg:Math.round(c.avg*10)/10, lastW:lastW,
    scaleNet:c.scaleNet, diff:c.diff, net:c.net, pending:!!c.pending, miss:(c.miss||[]).slice(0,5),
    houses:(SB_D.houses||[]).filter(x=>x&&x.code).map(x=>x.code).join(', '), isNew:!!SB_ISNEW, ts:Date.now()};
}
async function sbLivePush(payload){ // payload = snapshot หรือ null (= ปิดฟอร์มแล้ว/ว่าง)
  try{
    if(!sbLiveOn()) return;
    const t=await supaToken(); if(!t) return;
    const uid=SUPA&&SUPA.user&&SUPA.user.id; if(!uid) return;
    supaFetch('/rest/v1/sale_stand_live?on_conflict=user_id,session_id',{method:'POST',
      headers:{'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({user_id:uid, session_id:presenceSid(), name:(CURRENT_USER&&CURRENT_USER.name)||'',
        farm:(payload&&payload.farm)||'', bill:payload, updated_at:new Date().toISOString()})});
  }catch(e){}
}
function sbLiveTick(){ // เรียกทุกครั้งที่ตัวเลขในฟอร์มเปลี่ยน — ส่งจริงไม่ถี่กว่า 4 วิ (ตัวท้ายสุดส่งเสมอ ไม่ตกหล่น)
  if(!sbLiveOn()||!SB_D) return;
  _sbLiveWasOpen=true; sbLiveHbStart();
  const now=Date.now();
  const go=()=>{ const s=sbLiveSnap(); if(!s) return;
    const key=[s.billId,s.n,s.totW,s.buyer,s.houses,s.scaleNet,s.net,s.pending].join('|');
    if(key===_sbLiveSentKey) return; _sbLiveSentKey=key; _sbLiveLast=Date.now(); sbLivePush(s); };
  if(now-_sbLiveLast>=4000){ go(); }
  else if(!_sbLiveTimer){ _sbLiveTimer=setTimeout(()=>{ _sbLiveTimer=null; go(); },4200-(now-_sbLiveLast)); }
}
function sbLiveClear(){ if(!_sbLiveWasOpen) return; _sbLiveWasOpen=false; _sbLiveSentKey=''; sbLivePush(null); }
function sbLiveHbStart(){ // จังหวะหัวใจ: ฟอร์มเปิดค้าง (พักพิมพ์) ก็ยังโชว์ "ออนไลน์" บนมอนิเตอร์ · ปิดฟอร์ม → เคลียร์ให้อัตโนมัติ
  if(_sbLiveHb) return;
  _sbLiveHb=setInterval(function(){
    const top=navHist[navHist.length-1], open=!!(SB_D&&top&&top.key==='salebillform');
    if(open){ if(Date.now()-_sbLiveLast>40000){ _sbLiveLast=Date.now(); const s=sbLiveSnap(); if(s) sbLivePush(s); } }
    else{ sbLiveClear(); }
  },20000);
}
/* ---------- 📺 มอนิเตอร์แท่นขาย (เจ้าของ/ผู้ดูแล) — จอเดียวเห็นทุกแท่นสด · การ์ด 1 ใบ = แท่น/เครื่อง 1 ที่
   ดึงจาก sale_stand_live ทุก 5 วิ (เฉพาะตอนเปิดหน้านี้) · บิลที่บันทึกแล้ววันนี้รีเฟรชทุก 30 วิ ---------- */
let _sbMonTimer=null,_sbMonN=0,_sbMonFull=false;
async function sbMonFetch(){ // เครื่องที่มีสัญญาณใน 3 นาที (แถวเก่ากว่านั้นถือว่าออกไปแล้ว)
