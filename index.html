  const typed=prompt('เพื่อความปลอดภัย พิมพ์รหัสหลัง "'+(h.code||'')+'" เพื่อยืนยันการล้าง:');
  if(typed===null) return;
  if((typed||'').trim().toUpperCase()!==String(h.code||'').toUpperCase()){ toast('รหัสหลังไม่ตรง — ยกเลิกการล้าง'); return; }
  const it=h.intake||{};
  const before={intake:{source:it.source||'',dateIn:it.dateIn||'',inN:it.inN||0,price:it.price||0,extra:(it.extra||[]).length},
    received:h.received||0,pigs:h.pigs||0,dailyDays:dl.length,movedIn:movedIn,
    firstDay:dl.length?dl[dl.length-1].date:'',lastDay:dl.length?dl[0].date:'',
    vetRecs:vl.length,meds:(h.meds||[]).length,feedReqs:(h.feedReqs||[]).length};
  h.intake=null; h.dailyLog=[]; h.vetLog=[]; h.meds=[]; h.feedReqs=[]; h.batch=null; h.batchLog=[];
  h.received=0; h.pigs=0; h.dailyAnchor=null; h.closedDate=null; h.cleanStart=null;
  h.deadToday=0; h.cullToday=0; h.soldToday=0; h.moveToday=0; h.sick=0; h.filled=false;
  h.status='ว่าง';
  intakeEditing=false; extraIntakeOpen=false; editIdx=-1;
  logHouseEdit(h,[{label:'ล้างข้อมูลรุ่น',from:sum,to:'ว่าง'}],'🗑️ เจ้าของล้างข้อมูลรุ่น (กรอกผิดหลัง)');
  logAudit('house',h.id,'owner_reset_batch',before,'เจ้าของล้างข้อมูลรุ่นของหลัง '+(h.code||'')+' (กรอกผิดหลัง)');
  syncHouseClerk(h); syncHouseVet(h);
  toast('🗑️ ล้างข้อมูลรุ่นของหลัง '+(h.code||'')+' แล้ว — เล้ากลับเป็น "ว่าง" พร้อมเริ่มใหม่');
  clerkForm();
}

function calcIntake(){
  if(!document.getElementById('i_inN')) return;
  const inN=gv('i_inN'), avgW=gv('i_avgW');
  const t=document.getElementById('i_totalW'); if(t) t.value=Math.round(inN*avgW);
  const pr=gv('i_price'), pn=document.getElementById('i_pigCostNote');
  if(pn) pn.innerHTML=(inN>0&&pr>0)?('มูลค่าลูกหมูรอบนี้: <b style="color:var(--brand)">'+fmt(Math.round(inN*pr))+'</b> บาท ('+fmt(inN)+' ตัว × '+fmt(pr)+') — ใช้คิดต้นทุนตอนปิดชุดอัตโนมัติ'):'';
  let bt=0;
  ['Duroc','Cross2','PureL','PureY'].forEach(k=>{
    const amt=gv('i_n'+k)*gv('i_b'+k); bt+=amt;
    const ae=document.getElementById('i_a'+k); if(ae) ae.textContent=fmt(amt);
  });
  const bte=document.getElementById('i_breedTotal'); if(bte) bte.textContent=fmt(bt);
}
function submitIntake(){
  const g=id=>{const e=document.getElementById(id);return e&&e.value!==''?Number(e.value):0;};
  const t=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const inN=g('i_inN');
  if(inN<=0){toast('กรุณากรอก "จำนวนรับเข้า" ให้มากกว่า 0');return;}
  const h=currentHouse, wasEmpty=(h.pigs||0)<=0, avgW=g('i_avgW');
  // ช่องในฟอร์ม = "รอบแรก" เท่านั้น → ยอดรวมจริง = รอบแรก + รอบรับเข้าเพิ่มเติมที่แยกบันทึกไว้ (กันยอดรอบเพิ่มหายตอนแก้ไข)
  const xArr=(h.intake&&h.intake.extra)||[];
  const xN=xArr.reduce((s,e)=>s+(e.n||0),0), xW=xArr.reduce((s,e)=>s+(e.w||0),0);
  const totalInN=inN+xN, totalW=Math.round(inN*avgW)+xW;
  const oldReceived=h.received||0, delta=totalInN-oldReceived;
  // แก้ไขรุ่นที่กำลังเลี้ยง: ห้ามลดจำนวนรับเข้าจนทำให้ "คงเหลือ" บางวันติดลบ (ยอดตาย/คัด/ขายรวมเกินจำนวนจริง)
  if(!wasEmpty && delta!==0 && (h.dailyLog||[]).length){
    const log=h.dailyLog, newAnchor=(h.dailyAnchor!=null?h.dailyAnchor:oldReceived)+delta;
    let running=newAnchor, minRem=newAnchor;
    for(let k=log.length-1;k>=0;k--){ running-=(log[k].deadN||0)+(log[k].cullN||0)+(log[k].soldN||0)+(log[k].moveN||0)-(log[k].moveInN||0); if(running<minRem) minRem=running; }
    if(minRem<0){ toast('จำนวนรับเข้าน้อยเกินไป: ทำให้ "คงเหลือ" บางวันติดลบ (ยอดตาย/คัด/ขายรวมเกินจำนวนรับเข้า)'); return; }
  }
  const oldIt=Object.assign({},h.intake||{}); // ค่าเดิมไว้เทียบบันทึกประวัติ
  h.intake={ source:t('i_source'), nurseryDays:g('i_nursery'), vet:t('i_vet'), worker:t('i_worker'),
    assistant:t('i_asst'), dateIn:t('i_dateIn'), inN:totalInN, avgW:(totalInN&&totalW?+(totalW/totalInN).toFixed(1):avgW), totalW:totalW, price:g('i_price'), note:t('i_note'),
    breedDurocN:g('i_nDuroc'), breedDuroc:g('i_bDuroc'),
    breedCross2N:g('i_nCross2'), breedCross2:g('i_bCross2'),
    breedPureLN:g('i_nPureL'), breedPureL:g('i_bPureL'),
    breedPureYN:g('i_nPureY'), breedPureY:g('i_bPureY'),
    breedTotal:g('i_nDuroc')*g('i_bDuroc')+g('i_nCross2')*g('i_bCross2')+g('i_nPureL')*g('i_bPureL')+g('i_nPureY')*g('i_bPureY') };
  if(oldIt.extra) h.intake.extra=oldIt.extra; // คงรายการ "รับเข้าเพิ่มเติม" ไว้
  h.received=totalInN;
  if(wasEmpty){ h.pigs=totalInN; h.status='กำลังเลี้ยง'; h.filled=true; h.cleanStart=null; } // เริ่มรุ่นใหม่ → ล้างสถานะ "กำลังล้างคอก"
  else if(delta!==0){ // แก้จำนวนรับเข้าของรุ่นที่กำลังเลี้ยง → เลื่อน anchor + คำนวณ "คงเหลือ" ทุกวันใหม่ ให้ received − pigs = ยอดสูญเสียรวม เสมอ
    if((h.dailyLog||[]).length){ h.dailyAnchor=(h.dailyAnchor!=null?h.dailyAnchor:oldReceived)+delta; recalcDailyRemains(h); }
    else { h.pigs=Math.max(0,(h.pigs||0)+delta); h.dailyAnchor=totalInN; }
  }
  if(h.intake.source) h.source=h.intake.source;
  if(h.intake.vet) h.vet=h.intake.vet;
  if(h.intake.worker) h.worker=h.intake.worker;
  if(h.intake.assistant) h.assistant=h.intake.assistant;
  if(wasEmpty) logHouseEdit(h,[{label:'จำนวนรับเข้า',from:'(ว่าง)',to:fmt(inN)+' ตัว'}],'เริ่มเลี้ยง / บันทึกการรับเข้า');
  else logHouseEdit(h,diffFields(oldIt,h.intake,INTAKE_EDIT_LABELS),'แก้ไขข้อมูลการรับเข้า');
  intakeEditing=false;
  syncHouseClerk(h);
  toast(wasEmpty?('บันทึกการรับเข้า '+(h.code||'')+' · '+fmt(inN)+' ตัว → เริ่มเลี้ยง ✓'):'บันทึกการแก้ไขข้อมูลการรับเข้าแล้ว ✓');
  clerkForm();
}

  // record block: [type select] จำนวน / น้ำหนัก / [นน.เฉลี่ย] / ราคากิโลละ / มูลค่ารวม(auto) / ลูกค้า / เลขที่บิล

function logLines(e){
  const L=[];
  if(e.deadN>0) L.push({grp:'⚰️ ตาย',type:e.deadType||'ตาย',n:e.deadN,avg:0,value:(e.deadW||0)*(e.deadP||0),cust:e.deadCust,bill:e.deadBill});
  if(e.cullN>0) L.push({grp:'🔪 คัดขาย',type:e.cullType||'คัดขาย',n:e.cullN,avg:e.cullW?e.cullW/e.cullN:0,value:(e.cullW||0)*(e.cullP||0),cust:e.cullCust,bill:e.cullBill});
  if(e.soldN>0) L.push({grp:'💰 ขายขุน',type:'ขายขุน',n:e.soldN,avg:e.soldW?e.soldW/e.soldN:0,value:(e.soldW||0)*(e.soldP||0),cust:e.soldCust,bill:e.soldBill});
  if(e.moveN>0) L.push({grp:'🔄 ย้ายออก',type:e.moveDest?'→ หลัง '+e.moveDest:'ย้ายออก',n:e.moveN,avg:e.moveW?e.moveW/e.moveN:0,value:0,cust:e.moveNote||'-',bill:'-'});
  if(e.moveInN>0) L.push({grp:'🔄 ย้ายเข้า',type:e.moveInFrom?'← จากหลัง '+e.moveInFrom:'ย้ายเข้า',n:e.moveInN,avg:e.moveInW?e.moveInW/e.moveInN:0,value:0,cust:e.moveInNote||'-',bill:'-'});
  if(!L.length) L.push({grp:'—',type:'-',n:0,avg:0,value:0,cust:'-',bill:'-'});
  return L;
}
function logRowsHTML(log,withEdit){
  const span=withEdit?10:9;
  if(!log||!log.length) return `<tr><td colspan="${span}" class="sub">ยังไม่มีการบันทึก</td></tr>`;
  let html='';
  log.forEach((e,idx)=>{
    const lines=logLines(e);
    lines.forEach((ln,li)=>{
      const sep=(li===0&&idx>0)?'border-top:2px solid #d8e0ea;':'';
      html+=`<tr>
        <td style="${sep}">${li===0?'<b>'+e.date+'</b>':''}</td>
        <td style="${sep}">${ln.grp}</td>
        <td style="${sep}"><span class="sub">${escA(ln.type)}</span></td>
        <td class="num" style="${sep}">${ln.n}</td>
        <td class="num" style="${sep}">${ln.avg?ln.avg.toFixed(1):'-'}</td>
        <td class="num" style="${sep}">${ln.value?fmt(Math.round(ln.value)):'-'}</td>
        <td style="${sep}">${ln.cust&&ln.cust!=='-'?escA(ln.cust):'-'}</td>
        <td style="${sep}">${ln.bill&&ln.bill!=='-'?escA(ln.bill):'-'}</td>
        <td class="num" style="${sep}">${li===0?fmt(e.remain):''}</td>
        ${withEdit?`<td class="num" style="${sep}">${li===0?'<button class="btn ghost sm" style="color:var(--info)" onclick="editDailyLog('+idx+')">✏️ แก้ไข</button>':''}</td>`:''}
      </tr>`;
    });
  });
  return html;
}

  if(editIdx>=0){ editIdx=-1; clerkForm(); } // ออกจากโหมดแก้ไข → กลับไปหน้าหลัง (สถานะต้องปิดชุด/ปกติ)

function editDailyLog(i){

    :(currentHouse.dailyAnchor!=null?currentHouse.dailyAnchor:(r.remain||0)+(r.deadN||0)+(r.cullN||0)+(r.soldN||0)+(r.moveN||0)-(r.moveInN||0));

  calcDaily();

function dailyVals(){
  const g=id=>{const e=$("#d_"+id);return e&&e.value!==''?Number(e.value):0;};
  const gt=id=>{const e=$("#d_"+id);return e?e.value:'';};
  const pigs=g('pigs');
  const deadN=g('deadN'), deadW=g('deadW'), deadP=g('deadP'), deadVal=deadW*deadP;
  const cullN=g('cullN'), cullW=g('cullW'), cullP=g('cullP'), cullVal=cullW*cullP;
  const soldN=g('soldN'), soldW=g('soldW'), soldP=g('soldP'), soldVal=soldW*soldP;
  const soldAvg=soldN?soldW/soldN:0;
  const moveN=g('moveN'), moveW=g('moveW');
  const outN=cullN+soldN, value=deadVal+cullVal+soldVal;
  const out=deadN+cullN+soldN+moveN;
  return {pigs,deadN,deadW,deadP,deadVal,deadType:gt('deadType'),
    cullN,cullW,cullP,cullVal,cullType:gt('cullType'),
    soldN,soldW,soldP,soldVal,soldAvg,
    moveN,moveW,moveDest:gt('moveDest'),moveNote:gt('moveNote'),
    outN,value,out,remain:pigs-out};
}
function calcDaily(){
  if(!document.getElementById('ds_dead')) return;
  // 💰 เติมราคา/กก. อัตโนมัติตามน้ำหนัก สำหรับ คัดขาย/ตาย (ใช้ นน.เฉลี่ย/ตัว = นน.รวม÷จำนวน · เว้นไว้ถ้าผู้ใช้พิมพ์ราคาเอง)
  ['cull','dead'].forEach(k=>{ const wEl=document.getElementById('d_'+k+'W'), nEl=document.getElementById('d_'+k+'N'), pEl=document.getElementById('d_'+k+'P'); if(!pEl||!wEl) return;
    const w=Number(wEl.value)||0, n=Number(nEl&&nEl.value)||0; if(w<=0) return;
    const auto=priceForWeight(n>0?w/n:w, k), cur=pEl.value;
    if(cur===''||Number(cur)===Number(_autoP[k])){ pEl.value=auto; _autoP[k]=auto; } });
  const x=dailyVals();
  const setV=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
  setV('d_deadVal',fmt(Math.round(x.deadVal)));
  setV('d_cullVal',fmt(Math.round(x.cullVal)));
  setV('d_soldVal',fmt(Math.round(x.soldVal)));
  setV('d_soldAvg',x.soldAvg?x.soldAvg.toFixed(1):'0');
  const setT=(id,v,col)=>{const e=document.getElementById(id);if(e){e.textContent=v;if(col)e.style.color=col;}};
  setT('ds_dead',x.deadN);
  setT('ds_cull',x.cullN);
  setT('ds_sold',x.soldN);
  setT('ds_move',x.moveN);
  setT('ds_avg',x.soldN?x.soldAvg.toFixed(1)+' กก.':'—');
  setT('ds_value',fmt(Math.round(x.value)));
  setT('ds_remain',fmt(x.remain), x.remain<0?'var(--bad)':'var(--ink)');
  const rh=document.getElementById('remainHint');
  if(rh){
    const out=x.deadN+x.cullN+x.soldN+x.moveN;
    let s = out>0
      ? '➖ หัก ⚰️'+x.deadN+' + 🔪'+x.cullN+' + 💰'+x.soldN+' + 🔄'+x.moveN+(x.moveDest?'(→'+x.moveDest+')':'')+' = <b style="color:'+(x.remain<0?'var(--bad)':'var(--ok)')+'">คงเหลือ '+fmt(x.remain)+' ตัว</b>'
      : '';
    if(x.pigs>0 && x.deadN>x.pigs*0.1) s += (s?'<br>':'')+'<span style="color:var(--warn)">⚠️ ตาย '+x.deadN+' ตัว เกิน 10% ของฝูงต้นวัน — โปรดตรวจสอบ</span>';
    rh.innerHTML=s;
  }
  return x;
}
function dailyErrs(){
  const x=dailyVals(),errs={};
  ['deadN','deadW','deadP','cullN','cullW','cullP','soldN','soldW','soldP','moveN','moveW','pigs'].forEach(id=>{
    const e=$("#d_"+id); if(e&&e.value!==''&&Number(e.value)<0) errs[id]='ติดลบ';});
  if(x.moveN>0 && !x.moveDest) errs.move='เลือก "หลังปลายทาง" สำหรับการย้ายออก';
  if(x.out>x.pigs) errs.over='ตาย+คัด+ขาย+ย้าย ('+x.out+') มากกว่าคงเหลือต้นวัน ('+x.pigs+')';
  return errs; // หมายเหตุ: ตายเกิน 10% เป็นแค่ "คำเตือน" (โชว์ใต้ช่องต้นวัน) ไม่บล็อกการบันทึก
}
// วันต่ำสุดที่เลือกได้ในฟอร์มรายวัน = วันที่ของรายการเก่าสุด (กันแทรกก่อนประวัติ) · ถ้ายังไม่มีรายการ → วันรับเข้า
function dailyMinISO(h){
  const log=(h&&h.dailyLog)||[];
  if(log.length){ const iso=thaiDayToISO(log[log.length-1].date); if(iso) return iso; }
  if(h&&h.intake&&h.intake.dateIn){ const iso=thaiDayToISO(h.intake.dateIn); if(iso) return iso; }
  return '';
}
function dailyPickedDate(){ const e=$("#d_date"); return (e&&e.value)?isoToThaiDay(e.value):DEMO_DATE_DAY; } // ISO ที่เลือก → "16 มิ.ย." (ตั้งต้นวันนี้)
function buildDailyEntry(x){
  const v=id=>{const e=$("#d_"+id);return e?e.value:'';};
  return {
    rowId:'r'+Date.now()+'_'+Math.round(Math.random()*1e6), // รหัสประจำแถว — ใช้จับคู่ "ย้ายออก" กับ "หมูระหว่างทาง" ที่หลังปลายทาง (เวลาแก้ไข)
    date:dailyPickedDate(), by:currentHouse.worker||'เสมียน', remain:x.remain,
    deadType:x.deadN?x.deadType:'', deadN:x.deadN, deadW:x.deadW, deadP:x.deadP, deadCust:v('deadCust'), deadBill:v('deadBill'),
    cullType:x.cullN?x.cullType:'', cullN:x.cullN, cullW:x.cullW, cullP:x.cullP, cullCust:v('cullCust'), cullBill:v('cullBill'),
    soldN:x.soldN, soldW:x.soldW, soldP:x.soldP, soldCust:v('soldCust'), soldBill:v('soldBill'),
    moveN:x.moveN, moveW:x.moveW, moveDest:x.moveN?x.moveDest:'', moveNote:v('moveNote'),
    dead:x.deadN, outN:x.outN, avg:x.soldAvg, value:x.value,
    cust:(v('soldCust')||v('cullCust')||v('deadCust')||'-'),
    bill:(v('soldBill')||v('cullBill')||v('deadBill')||'-')
  };
}
function submitDaily(){
  const x=calcDaily(), errs=dailyErrs(), n=Object.keys(errs).length, b=$("#dailyBanner");
  if(n){b.innerHTML='<div class="banner bad">🚫 <div>พบปัญหา: '+Object.values(errs).join(' · ')+'</div></div>';return;}
  const entry=buildDailyEntry(x), wasEdit=editIdx;
  currentHouse.dailyLog=currentHouse.dailyLog||[];
  if(wasEdit>=0){
    const oldEntry=currentHouse.dailyLog[wasEdit];

  if(badK>=0){ h.dailyAnchor=savedAnchor; toast('❌ คงเหลือวัน '+merged[badK].date+' ติดลบ ('+fmt(rems[badK])+' ตัว) — ตาย/คัด/ขายรวมเกินหมูที่มี · ตรวจ "จำนวนรับเข้าตั้งต้น" หรือยอดรายวัน'); return; }
  h.dailyLog=merged; recalcDailyRemains(h);
  if(received>0 && !(h.received>0)) h.received=received;
  const note=[newEntries.length?('เพิ่ม '+newEntries.length+' วัน'):'',updated?('แก้ '+updated+' วัน'):''].filter(Boolean).join(' · ');
  logHouseEdit(h,[{label:'กรอกย้อนหลัง',from:'-',to:note}],'กรอกข้อมูลย้อนหลัง · '+note);
  syncHouseClerk(h);
  toast('✅ บันทึกย้อนหลัง — '+note+(dup?' · ข้าม '+dup+' วันซ้ำ':'')+' → หลัง '+h.code+' · คงเหลือ '+fmt(h.pigs)+' ตัว');
  bfLoadedFor=null; renderBackfill();   // โหลดสถานะล่าสุดกลับมาแสดง (รวมที่เพิ่งบันทึก)
}

// บวก "หมูรับเข้าเพิ่มเติม" เข้าหลัง → ลิงก์ครบ: ยอดจำนวนรับเข้า (intake.inN/totalW) + คงเหลือ (pigs) + บันทึกรายวัน (ย้ายเข้า) + received
// opts: {dateThai:'16 มิ.ย.' (ย้อนหลังได้ · ไม่ใส่=วันนี้), price:ราคาลูกหมู/ตัวของรอบนี้ (ใช้คิดต้นทุนตอนปิดชุด)}
function addIntakeReceipt(h,n,w,from,note,kind,opts){
  n=Math.round(Number(n)||0); if(n<=0) return false;
  w=Math.round(Number(w)||0);
  opts=opts||{};
  const dateThai=opts.dateThai||DEMO_DATE_DAY, price=Math.round(Number(opts.price)||0);
  const oldInN=(h.intake&&h.intake.inN)||0, oldPigs=h.pigs||0; // ค่าเดิมไว้บันทึกประวัติ
  // 1) ยอดจำนวนรับเข้า (ตารางข้อมูลการรับเข้า) — เพิ่มเข้าทันที + เก็บรายการเพิ่มเติมไว้แสดง (แยกรอบ: วันที่/แหล่ง/นน./ราคา ของตัวเอง)
  h.intake=h.intake||{source:from||'',inN:0,totalW:0,dateIn:DEMO_DATE_DAY};
  h.intake.inN=(h.intake.inN||0)+n;
  if(w>0){ h.intake.totalW=(h.intake.totalW||0)+w; h.intake.avgW=h.intake.inN?+(h.intake.totalW/h.intake.inN).toFixed(1):h.intake.avgW; }
  h.intake.extra=h.intake.extra||[];
  h.intake.extra.unshift({n:n,w:w,from:from||'',note:note||'',date:dateThai,kind:kind||'รับเข้าเพิ่ม',price:price,cost:price>0?Math.round(n*price):0});
  h.received=h.intake.inN; // received = ยอดรับเข้ารวม
  // 2) บันทึกรายวัน "ย้ายเข้า" — แทรกตามวันที่ (ใหม่→เก่า) รองรับลงย้อนหลัง แล้วคำนวณคงเหลือใหม่ทั้งสาย
  h.dailyLog=h.dailyLog||[];
  if(!h.dailyLog.length && h.dailyAnchor==null) h.dailyAnchor=(h.pigs||0);
  const entry={date:dateThai,by:h.worker||'เสมียน',remain:0,
    deadN:0,cullN:0,soldN:0,moveN:0, moveInN:n,moveInFrom:from||(kind||''),moveInW:w,moveInNote:note||''};
  const log=h.dailyLog, ek=parseThaiDate(dateThai)||DEMO_DATE;
  let pos=log.length; for(let k=0;k<log.length;k++){ const dk=parseThaiDate(log[k].date)||DEMO_DATE; if(dk<=ek){ pos=k; break; } }
  log.splice(pos,0,entry);
  recalcDailyRemains(h); // คงเหลือทุกวัน + pigs + ตัวนับ "วันนี้" (ย้ายเข้าเพิ่มยอดอย่างเดียว ไม่มีทางทำให้ติดลบ)
  if(dateThai===DEMO_DATE_DAY) h.filled=true; // เฉพาะรับเข้าวันนี้จริง — ลงย้อนหลังไม่นับเป็น "กรอกแล้ววันนี้"
  if(h.pigs>0){ h.status='กำลังเลี้ยง'; h.cleanStart=null; }
  // 3) บันทึกลงประวัติการแก้ไขประจำหลัง
  logHouseEdit(h,[{label:'จำนวนรับเข้า',from:fmt(oldInN),to:fmt(h.intake.inN)},{label:'หมูคงเหลือ',from:fmt(oldPigs),to:fmt(h.pigs)}],(kind||'รับเข้าเพิ่ม')+' +'+fmt(n)+' ตัว'+(from?' · จาก '+escA(from):'')+' · วันที่ '+dateThai+(price>0?' · ราคา '+fmt(price)+' บาท/ตัว':''));
  return true;
}

// รวมปริมาณอาหารจากบันทึกการรับอาหารของหมอ ตามเบอร์อาหาร
function feedAgg(h){
  const m={};
  (h.vetLog||[]).filter(e=>e.type==='feed').forEach(e=>{
    const no=e.feedNo||'(ไม่ระบุเบอร์)';
    if(!m[no]) m[no]={no,kg:0,srcs:{},bills:{}};
    m[no].kg+=Number(e.feedKg)||0;
    if(e.feedSrc) m[no].srcs[e.feedSrc]=1;
    if(e.feedBill) m[no].bills[e.feedBill]=1;
  });
  return Object.values(m).map(x=>({no:x.no,kg:x.kg,src:Object.keys(x.srcs).join('/'),bill:Object.keys(x.bills).join(', ')}));
}
// สรุปการกินได้ต่อวัน (จากบันทึก intake ของหมอ) — ล่าสุด / เฉลี่ย / รวม
function intakeAgg(h){
  const recs=(h.vetLog||[]).filter(e=>e.type==='intake');
  if(!recs.length) return {records:0,latest:null,latestKg:0,latestPerPig:0,avgPerPig:0,totalKg:0};
  const latest=recs[0]; // บันทึกใหม่สุดอยู่หน้าสุด (unshift)
  const latestKg=Number(latest.eatKg)||0;
  const latestPerPig=h.pigs>0?latestKg/h.pigs:0;
  let sumPerPig=0,nPerPig=0,totalKg=0;
  recs.forEach(e=>{const kg=Number(e.eatKg)||0;totalKg+=kg;if(h.pigs>0&&kg){sumPerPig+=kg/h.pigs;nPerPig++;}});
  return {records:recs.length,latest,latestKg,latestPerPig,avgPerPig:nPerPig?sumPerPig/nPerPig:0,totalKg};
}
// สรุปการรับอาหารเข้า (จากบันทึก feed ของหมอ) — รวม กก. + ยาผสมล่าสุด
function feedRecvAgg(h){
  const recs=(h.vetLog||[]).filter(e=>e.type==='feed');
  const totalKg=recs.reduce((s,e)=>s+(Number(e.feedKg)||0),0);
  const lastMed=((recs.find(e=>e.feedMed&&e.feedMed.trim())||{}).feedMed||'').trim();
  return {records:recs.length,totalKg,lastMed};
}

  document.querySelectorAll('#tabBatch input, #tabBatch select').forEach(el=>{if(el.id) snap[el.id]=el.value;});
  snap.extraCosts=bxList();   // ค่าใช้จ่ายอื่นๆ ที่เพิ่มเอง (label+amount)
  return snap;
}
function batchChanges(prev,cur){
  const ch=[];
  Object.keys(BATCH_LABELS).forEach(id=>{
    const before=prev?(prev[id]||''):'', after=cur[id]||'';
    if(String(before)!==String(after)) ch.push({label:BATCH_LABELS[id],from:before||'(ว่าง)',to:after||'(ว่าง)'});
  });
  return ch;
}
function restoreBatch(){
  const b=currentHouse&&currentHouse.batch; if(!b) return;
  // ช่อง "ตาย/คัด/ขาย (จำนวน·นน.·มูลค่า)" ให้ดึงจากบันทึกรายวันล่าสุดเสมอ (batchHTML prefill จาก dailyAgg แล้ว) — ไม่เอาค่าจากร่างเก่ามาทับ กันสรุป③ ไม่ตรงกับบันทึกรายวัน⑤
  const SKIP={b_deadN:1,b_deadW:1,b_deadVal:1,b_cullN:1,b_cullW:1,b_cullVal:1,b_outN:1,b_outW:1,b_outVal:1};
  Object.keys(b).forEach(id=>{if(SKIP[id])return;const el=document.getElementById(id);if(el)el.value=b[id];});
}

// รวมยอดจากบันทึกรายวันทั้งหมดของหลัง
function dailyAgg(h){
  let deadN=0,deadW=0,deadVal=0,cullN=0,cullW=0,cullVal=0,soldN=0,soldW=0,soldVal=0,moveN=0,moveW=0,moveInN=0,moveInW=0;
  (h.dailyLog||[]).forEach(e=>{
    deadN+=e.deadN||0; deadW+=e.deadW||0; deadVal+=(e.deadW||0)*(e.deadP||0); // ขายซาก (ถ้ามีราคา)
    cullN+=e.cullN||0; cullW+=e.cullW||0; cullVal+=(e.cullW||0)*(e.cullP||0);
    soldN+=e.soldN||0; soldW+=e.soldW||0; soldVal+=(e.soldW||0)*(e.soldP||0);
    moveN+=e.moveN||0; moveW+=e.moveW||0; moveInN+=e.moveInN||0; moveInW+=e.moveInW||0;
  });
  return {deadN,deadW,deadVal,cullN,cullW,cullVal,soldN,soldW,soldVal,moveN,moveW,moveInN,moveInW,
    deadPr:deadW?Math.round(deadVal/deadW):'', cullPr:cullW?Math.round(cullVal/cullW):'', soldPr:soldW?Math.round(soldVal/soldW):''};
}

    <input class="cin tl" id="bx_label_${i}" value="${escA(r.label||'')}" placeholder="ชื่อค่าใช้จ่าย เช่น ค่าขนส่ง · ค่าซ่อม · ค่าน้ำ" style="flex:1;min-width:160px" oninput="bxSet(${i},'label',this.value)">

function bxRefresh(){ const el=document.getElementById('bxRows'); if(el) el.innerHTML=bxRowsHTML(); }
function bxAdd(){ if(blockIfReadonly())return; bxCosts.push({label:'',amount:''}); bxRefresh(); }
function bxDel(i){ bxCosts.splice(i,1); bxRefresh(); calcBatch(); }
function bxSet(i,f,v){ if(bxCosts[i]) bxCosts[i][f]=v; }
function bxTotal(){ return bxCosts.reduce((s,r)=>s+(parseFloat(r.amount)||0),0); }
function bxList(){ return bxCosts.map(x=>({label:(x.label||'').trim(),amount:parseFloat(x.amount)||0})).filter(x=>x.amount||x.label); }
function bxInit(h){ bxCosts=(h&&h.batch&&Array.isArray(h.batch.extraCosts))?h.batch.extraCosts.map(x=>({label:x.label||'',amount:x.amount})):[]; }

// รวมทุกชีตเป็น HTML เดียว (สำหรับพรีวิวบนจอ)
function buildBatchExcelHTML(rec){
  return buildBatchSheets(rec).map(s=>'<div style="margin:0 0 22px"><div style="background:#16212e;color:#fff;font-weight:bold;padding:7px 12px;border-radius:6px 6px 0 0">📄 ชีต: '+s.name+'</div>'+s.html+'</div>').join('');
}
function exportBatchExcel(rec){
  const sheets=buildBatchSheets(rec);
  const wsXml=sheets.map(s=>'<x:ExcelWorksheet><x:Name>'+s.name+'</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>').join('');
  const body=sheets.map(s=>s.html).join('');
  const doc='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8">'
    +'<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>'+wsXml+'</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->'
    +'</head><body>'+body+'</body></html>';
  const blob=new Blob(['﻿'+doc],{type:'application/vnd.ms-excel'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='สรุปปิดชุด_'+(rec.code||'house')+'_'+(rec.closedOn||todayISO())+'.xls';
  document.body.appendChild(a);a.click();a.remove();
  toast('ส่งออก Excel หลัง '+(rec.code||'')+' · '+sheets.length+' หน้า (สรุป + ประวัติ) ✓');
}

function vetSubmit(){ if(blockIfReadonly())return;
  const val=id=>{const e=$("#"+id);return e?e.value.trim():'';};

function stockReceiveSubmit(){

  const ref=($("#stkInRef").value||'').trim(), note=($("#stkInNote").value||'').trim();

function stockSetCountIdx(idx){

// ── ตัวกรองประวัติเคลื่อนไหวคลัง: ฟาร์ม/หมอ/หลัง/วันที่/ช่วงวันที่/ชนิด ──
function smHouseOf(m){ if(m.house) return m.house; const x=String(m.ref||'').match(/หลัง\s*([^\s·]+)/); return x?x[1]:''; }
function smVetOf(m){ return m.vet||''; }
function smDateMatch(m){
  if(smDateMode==='range'){ if(!smFrom&&!smTo) return true; const k=reqDateKey(m.date), a=smFrom?reqDateKey(smFrom):-Infinity, b=smTo?reqDateKey(smTo):Infinity; return k>=Math.min(a,b)&&k<=Math.max(a,b); }
  return !smDate || m.date===smDate;
}
function smFarmList(){ const f=stockFarmsForUser(); return (smFarm && f.indexOf(smFarm)>-1)?[smFarm]:f; }
function stockMovesAll(){ // รวมทุกฟาร์มที่เลือก + แนบ _farm และคงเหลือสะสม __after (คิดจากประวัติเต็มของฟาร์มนั้น ไม่ขึ้นกับตัวกรอง · ทำบนสำเนา ไม่แตะต้นฉบับ)
  const out=[];
  smFarmList().forEach(f=>{
    const copies=(farmStock(f).moves||[]).map(m=>Object.assign({_farm:f},m));   // ใหม่→เก่า
    const asc=copies.slice().reverse(), run={};
    asc.forEach(c=>{ const k=stockKey(c.cat,c.name); run[k]=(run[k]||0)+(Number(c.delta)||0); c.__after=run[k]; });
    copies.forEach(c=>out.push(c));
  });
  out.sort((a,b)=>(b.ts||0)-(a.ts||0));
  return out;
}
function stockMovesFiltered(){
  return stockMovesAll().filter(m=> (!stockMoveType||m.type===stockMoveType) && (!smHouse||smHouseOf(m)===smHouse) && (!smVet||smVetOf(m)===smVet) && smDateMatch(m));
}
function smDateOpts(){ const set={}; stockMovesAll().forEach(m=>{ if(m.date) set[m.date]=1; }); return Object.keys(set).sort((a,b)=>reqDateKey(b)-reqDateKey(a)); }
function smHouseOpts(){ const set={}; stockMovesAll().forEach(m=>{ const hh=smHouseOf(m); if(hh) set[hh]=1; }); return Object.keys(set).sort((a,b)=>byCode({code:a},{code:b})); }
function smVetOpts(){ const set={}; stockMovesAll().forEach(m=>{ const vv=smVetOf(m); if(vv) set[vv]=1; }); return Object.keys(set).sort(); }

function stockBalTableHTML(farm){
  const rows=stockRowsOf(farm).filter(r=>r.qty>0||r.min>0); let tot=0;   // เฉพาะรายการที่ฟาร์มมีจริงหรือตั้งขั้นต่ำ (ตัด 0 ที่ไม่เกี่ยวออก)
  const expLbl=iso=>{ const s=expStatus(iso); return !iso?'':(fmtISOThai(iso)+(s==='expired'?' (หมดอายุ)':s==='near'?' (ใกล้หมดอายุ)':'')); };
  const data=rows.map(r=>{ tot+=r.value; const st=r.qty<=0?'หมด':(r.min>0&&r.qty<=r.min?'ใกล้หมด':'พอ');
    return [r.cat,r.name,r.qty,(r.min||0),st,expLbl(stockSoonestExp(farm,r.cat,r.name)),r.price,r.value]; });
  return xlsSheet({
    title:'รายงานยอดคงเหลือคลังยา/อุปกรณ์',
    meta:[{k:'บริษัท',v:'เอสเจเอฟ ฟาร์ม (SJF Farm)'},{k:'ฟาร์ม',v:farm},{k:'จำนวนรายการ',v:fmt(rows.length)+' รายการ'},{k:'ออกเอกสาร',v:DEMO_DATE_SHORT},{k:'ผู้ออกรายงาน',v:(CURRENT_USER&&CURRENT_USER.name)||'-'}],
    columns:[{label:'หมวด',type:'text',w:140},{label:'รายการ',type:'text',w:210},{label:'คงเหลือ',type:'num',w:70},{label:'ขั้นต่ำ',type:'num',w:64},{label:'สถานะ',type:'text',w:74},{label:'วันหมดอายุ (ใกล้สุด)',type:'text',w:160},{label:'ราคา/หน่วย (บาท)',type:'money',w:100},{label:'มูลค่า (บาท)',type:'money',w:110}],
    rows:data,
    totals:['รวมมูลค่าคงเหลือ','','','','','','',tot]
  });
}

function reqCatName(ci){return Object.keys(REQ_DATA)[ci];}
function reqSet(ci,i,field,val){REQ_DATA[reqCatName(ci)][i][field]=val.trim();syncConfig();}
function reqAddItem(ci){if(blockIfReadonly())return;if(!reqEditUnlocked){toast('ใส่รหัสเพื่อปลดล็อกก่อน');return;}REQ_DATA[reqCatName(ci)].push({name:'',price:0,dose:'',note:''});syncConfig();renderRequest();}
function reqDelItem(ci,i){if(blockIfReadonly())return;if(!reqEditUnlocked){toast('ใส่รหัสเพื่อปลดล็อกก่อน');return;}
  const cat=reqCatName(ci), it=REQ_DATA[cat][i]||{};
  // กันลบรายการที่ยังมีของในคลัง (จะทำให้ยอด/มูลค่าหายจากตารางคลังแต่ moves ยังค้าง)
  if(it.name && stockCountable(cat)){ const held=Object.keys(STOCK).filter(f=>stockOnHand(f,cat,it.name)>0); if(held.length){ toast('❌ ลบไม่ได้ — "'+escA(it.name)+'" ยังมีของในคลัง '+held.length+' ฟาร์ม · ปรับยอดเป็น 0 ก่อน'); return; } }
  REQ_DATA[cat].splice(i,1);syncConfig();renderRequest();}
function requestMedRow(cat,ci,i){ if(blockIfReadonly())return;
  const name=($("#rn_"+ci+"_"+i).value||'').trim();
  const price=catalogPriceOf(cat,name);   // ราคาจากแคทาล็อกที่เสมียนตั้งในหน้าคลัง — หมอไม่กรอก/ไม่เห็น (ต้นทุนผูกกับของที่เบิกจริง × ราคาที่เสมียนตั้ง)
  const dose=($("#rd_"+ci+"_"+i).value||'').trim();
  const note=($("#rm_"+ci+"_"+i).value||'').trim();
  const qty=parseInt($("#rq_"+ci+"_"+i).value)||0;
  const code=(reqHouseCode||'').toUpperCase();
  if(!code){toast('กรุณาเลือกรหัสหลังที่เบิก (ด้านบน)');return;}
  if(!name){toast('กรุณาระบุชื่อรายการ');return;}
  if(qty<=0){toast('กรุณาระบุจำนวนที่เบิก');return;}
  const h=HOUSES.find(x=>(x.code||'').toUpperCase()===code);
  if(!h){toast('ไม่พบรหัสหลัง '+code);return;}
  const farm=h.farm||'ไม่ระบุฟาร์ม';
  if(!canSeeFarm(farm)){toast('❌ ไม่มีสิทธิ์เบิกในฟาร์มนี้ ('+escA(farm)+')');return;}   // กันเบิก/ตัดสต็อกข้ามฟาร์มที่ไม่ได้ดูแล
  // คุมสต็อก: บล็อกถ้าคลังฟาร์มนี้ไม่พอ (ยกเว้นหมวดที่ไม่นับสต็อก เช่น ยาสูตร)
  if(stockCountable(cat)){
    const onHand=stockOnHand(farm,cat,name);
    if(qty>onHand){ toast('❌ สต็อกไม่พอ — คลัง '+farm+' มี "'+name+'" เหลือ '+fmt(onHand)+' (ขอเบิก '+fmt(qty)+') · ให้เสมียนรับเข้าคลังก่อน'); return; }
  }
  h.meds=h.meds||[];
  h.meds.unshift({date:DEMO_DATE_DAY,cat,name,dose,note,qty,price,total:price*qty,vet:h.vet||'หมอ'});

function submitFeedReq(){ if(blockIfReadonly())return;

let vetRecSeq=1, vetEdit={hid:null,id:null}, vetDraft=null;
function ensureVetIds(h){(h.vetLog||[]).forEach(e=>{if(e._id==null)e._id='v'+(vetRecSeq++);});}
function escA(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// เก็บ/คืนค่าที่พิมพ์ค้างในฟอร์มกรอกของหมอ เวลาแก้ประวัติแล้ว re-render (กันข้อมูลที่พิมพ์ยังไม่บันทึกหาย)
const VET_DRAFT_IDS=['v_symptoms','v_formula','v_inject','v_note','v_feedSrc','v_feedNo','v_feedKg','v_feedBill','v_feedMed','v_eatNo','v_eatKg'];
function captureVetDraft(){if(!document.getElementById('v_symptoms')){vetDraft=null;return;}vetDraft={};VET_DRAFT_IDS.forEach(id=>{const e=document.getElementById(id);if(e)vetDraft[id]=e.value;});}
function restoreVetDraft(){if(!vetDraft)return;VET_DRAFT_IDS.forEach(id=>{const e=document.getElementById(id);if(e&&vetDraft[id]!=null)e.value=vetDraft[id];});vetDraft=null;}
function rerenderCurrent(){captureVetDraft();const t=navHist[navHist.length-1];if(t&&t.fn)t.fn();}
function startVetEdit(hid,id){vetEdit={hid:hid,id:id};rerenderCurrent();}
function cancelVetEdit(){vetEdit={hid:null,id:null};rerenderCurrent();}
const VET_EDIT_FIELDS={
  treat:[['symptoms','อาการ','text'],['formula','ยาสูตร','text'],['inject','ยาฉีด','text'],['note','หมายเหตุ','text']],
  feed:[['feedSrc','แหล่ง','text'],['feedNo','เบอร์อาหาร','text'],['feedMed','ยาผสม','area'],['feedKg','ปริมาณ(กก.)','num'],['feedBill','เลขที่บิล','text']],
  intake:[['eatNo','อาหารเบอร์','text'],['eatKg','น้ำหนักที่กิน(กก.)','num']]
};
const VET_TYPE_LABEL={treat:'การรักษา',feed:'การรับอาหาร',intake:'การกินได้'};
function saveVetEdit(hid,id){ if(blockIfReadonly())return;
  const h=HOUSES.find(x=>x.id===hid); if(!h) return;
  const rec=(h.vetLog||[]).find(e=>e._id===id); if(!rec) return;
  const changes=[];
  (VET_EDIT_FIELDS[rec.type]||[]).forEach(([key,label,kind])=>{
    const el=document.getElementById('ve_'+id+'_'+key); if(!el) return;
    const ov=(rec[key]==null?'':String(rec[key])).trim();
    const nvRaw=el.value, nvTrim=(nvRaw==null?'':String(nvRaw)).trim();
    let nv,newVal;
    if(kind==='num'){ newVal = nvTrim===''?'':Number(nvTrim); nv = nvTrim===''?'':String(newVal); }
    else { newVal = nvRaw; nv = nvTrim; }
    if(ov!==nv){
      changes.push({label:label,from:ov||'(ว่าง)',to:nv||'(ว่าง)'});
      rec[key]=newVal;
    }
  });
  if(changes.length){
    h.editLog=h.editLog||[];
    h.editLog.unshift({time:nowStamp(),ts:Date.now(),by:whoNow(),role:ROLE_LABEL[ROLE]||'-',_dom:'vet',changes:changes,note:'แก้ไขประวัติหมอ — '+(VET_TYPE_LABEL[rec.type]||'')+' · '+(rec.date||'')});
    syncHouseVet(h); // ซิงก์ช่อง "งานหมอ" (v2) — เก็บการแก้ไขประวัติหมอ + ประวัติแก้ลงช่อง vet
    toast('บันทึกการแก้ไขแล้ว ('+changes.length+' ช่อง) ✓');
  } else toast('ไม่มีการเปลี่ยนแปลง');
  vetEdit={hid:null,id:null};
  rerenderCurrent();
}
// ตารางประวัติของหมอ — การรักษา / รับอาหาร / กินได้ (withEdit=true → แก้ไขในแถวได้)
function vetLogHTML(h,withEdit){
  ensureVetIds(h);

  const inpNum=(rid,k,v)=>`<input class="cin tl" id="ve_${rid}_${k}" type="number" value="${escA(v)}" style="min-width:68px">`;
  const area=(rid,k,v)=>`<textarea class="cin tl" id="ve_${rid}_${k}" rows="2" style="min-width:120px">${escA(v)}</textarea>`;
  const act=e=>!withEdit?'':`<td class="num" style="white-space:nowrap">${isEd(e)
    ? `<button class="btn sm" onclick="saveVetEdit(${h.id},'${e._id}')">💾</button> <button class="btn ghost sm" onclick="cancelVetEdit()">✖</button>`

    : `<tr><td><b>${e.date}</b></td><td>${escA(e.symptoms||'-')}</td><td>${escA(e.formula||'-')}</td><td>${escA(e.inject||'-')}</td><td>${escA(e.note||'-')}</td><td>${escA(e.by||'-')}</td>${act(e)}</tr>`;

    : `<tr><td><b>${e.date}</b></td><td>${escA(e.feedSrc||'-')}</td><td>${escA(e.feedNo||'-')}</td><td>${escA(e.feedMed||'-').replace(/\n/g,'<br>')}</td><td class="num">${e.feedKg?fmt(e.feedKg):'-'}</td><td>${escA(e.feedBill||'-')}</td><td>${escA(e.by||'-')}</td>${act(e)}</tr>`;
  const intakeRow=e=>{const kg=Number(e.eatKg)||0,rate=h.pigs>0?(kg/h.pigs):0;return isEd(e)
    ? `<tr><td><b>${e.date}</b></td><td>${inp(e._id,'eatNo',e.eatNo)}</td><td class="num">${inpNum(e._id,'eatKg',e.eatKg)}</td><td class="num">${fmt(h.pigs)}</td><td class="num">—</td><td>${e.by||'-'}</td>${act(e)}</tr>`

  return `
  <div class="card"><h3>🩺 ประวัติการรักษา <span class="more">${treat.length} ครั้ง</span></h3>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>วันที่</th><th>อาการ</th><th>ยาสูตร</th><th>ยาฉีด</th><th>หมายเหตุ</th><th>หมอ</th>${ehCol}</tr></thead>
      <tbody>${treat.length? treat.map(treatRow).join("") : `<tr><td colspan="${withEdit?7:6}" class="sub">ยังไม่มีบันทึกการรักษา</td></tr>`}</tbody>
    </table></div>
  </div>
  <div class="card"><h3>🌾 ประวัติการรับอาหาร <span class="more">${feed.length} ครั้ง</span></h3>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>วันที่</th><th>แหล่ง</th><th>เบอร์อาหาร</th><th>ยาผสม</th><th class="num">ปริมาณ(กก.)</th><th>เลขที่บิล</th><th>หมอ</th>${ehCol}</tr></thead>
      <tbody>${feed.length? feed.map(feedRow).join("") : `<tr><td colspan="${withEdit?8:7}" class="sub">ยังไม่มีบันทึกการรับอาหาร</td></tr>`}</tbody>
    </table></div>
  </div>
  <div class="card"><h3>🍽️ ประวัติการกินได้ต่อวัน <span class="more">${intake.length} ครั้ง</span></h3>

      <tbody>${intake.length? intake.map(intakeRow).join("") : `<tr><td colspan="${withEdit?7:6}" class="sub">ยังไม่มีบันทึกการกินได้</td></tr>`}</tbody>

  </div>`;
}

  const tok=await supaToken();
  if(!tok) throw new Error('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
  const r=await fetch(CONFIG.supabase.url+'/functions/v1/admin-users',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok,'apikey':CONFIG.supabase.anonKey},
    body:JSON.stringify(payload)});
  const j=await r.json().catch(()=>({error:'เซิร์ฟเวอร์ตอบกลับผิดพลาด'}));
  if(!r.ok) throw new Error(j.error||('ผิดพลาด ('+r.status+')'));
  return j;
}

// ---- ปรับแต่งตัวเลือกฟอร์มเสมียน ----
function cfgArr(key){return key==='death'?DEATH_TYPES:key==='cull'?CULL_TYPES:key==='source'?SOURCE_OPTIONS:CUSTOMERS;}
// เปลี่ยนชื่อตัวเลือก (สาเหตุตาย/ประเภทคัด/แหล่งรับเข้า/ลูกค้า) → กวาดแก้รายการเก่าที่อ้างชื่อเดิมให้ตามไปด้วย (กันข้อมูลหลุดการเชื่อม)
function cascadeOptionRename(key,oldVal,newVal){
  oldVal=(oldVal||'').trim(); newVal=(newVal||'').trim();
  if(!oldVal||oldVal===newVal||!newVal) return {count:0,houses:[]}; // ค่าใหม่ว่าง = ไม่กวาดแก้ (กันลบค่าออกจากรายการเก่าทั้งหมดโดยไม่ตั้งใจ)
  let n=0; const touched=new Set();
  const hit=(o,f)=>{ if(o&&o[f]===oldVal){ o[f]=newVal; n++; return true; } return false; };
  HOUSES.forEach(h=>{ let ch=false;
    (h.dailyLog||[]).forEach(e=>{
      if(key==='death'){ if(hit(e,'deadType'))ch=true; }
      else if(key==='cull'){ if(hit(e,'cullType'))ch=true; }
      else if(key==='cust'){ if(hit(e,'deadCust'))ch=true; if(hit(e,'cullCust'))ch=true; if(hit(e,'soldCust'))ch=true; if(e.cust===oldVal){e.cust=newVal;ch=true;} }
    });
    if(key==='source'){
      if(h.intake){ if(hit(h.intake,'source'))ch=true; (h.intake.extra||[]).forEach(x=>{ if(hit(x,'from'))ch=true; }); }
      (h.closedBatches||[]).forEach(b=>{ if(hit(b,'source'))ch=true; if(b.intake&&hit(b.intake,'source'))ch=true; });
      if(h.source===oldVal){ h.source=newVal; ch=true; }
    }
    if(ch) touched.add(h);
  });
  return {count:n,houses:[...touched]};
}
function countOptionRefs(key,val){ val=(val||'').trim(); if(!val) return 0; let n=0;
  HOUSES.forEach(h=>{ (h.dailyLog||[]).forEach(e=>{
      if(key==='death'&&e.deadType===val)n++;
      else if(key==='cull'&&e.cullType===val)n++;
      else if(key==='cust'&&(e.deadCust===val||e.cullCust===val||e.soldCust===val))n++; });
    if(key==='source'){ if(h.intake&&h.intake.source===val)n++; (h.closedBatches||[]).forEach(b=>{ if(b.source===val)n++; }); } });
  return n;
}
// เปลี่ยน "รหัสหลัง" → กวาดแก้ลิงก์ย้ายหมู (ปลายทาง moveDest + หมูระหว่างทาง from) ให้ตามไปด้วย
function cascadeHouseRename(oldCode,newCode){
  oldCode=(oldCode||'').trim(); newCode=(newCode||'').trim();
  if(!oldCode||oldCode===newCode) return {count:0,houses:[]};
  let n=0; const touched=new Set();
  HOUSES.forEach(h=>{ let ch=false;
    (h.dailyLog||[]).forEach(e=>{ if(e.moveDest===oldCode){ e.moveDest=newCode; n++; ch=true; } });
    (h.incoming||[]).forEach(t=>{ if(t.from===oldCode){ t.from=newCode; n++; ch=true; } });
    if(ch) touched.add(h);
  });
  return {count:n,houses:[...touched]};
}
function cfgSet(key,i,val){ const arr=cfgArr(key), oldVal=arr[i]; val=(val||'').trim(); arr[i]=val;
  const res=cascadeOptionRename(key,oldVal,val); syncConfig();
  if(res.count>0){ res.houses.forEach(h=>syncHouseClerk(h)); queueSave(); toast('แก้ชื่อแล้ว · อัปเดต '+res.count+' รายการที่ใช้ชื่อเดิมตามไปด้วย'); }
}
function cfgAdd(key){cfgArr(key).push('');syncConfig();renderAdmin();}
function cfgDel(key,i){ const arr=cfgArr(key), val=arr[i], refs=countOptionRefs(key,val);
  if(refs>0 && !confirm('ตัวเลือก "'+val+'" ถูกใช้อยู่ใน '+refs+' รายการเดิม\n\nลบได้ — แต่ตัวเลือกจะหายจากเมนู (รายการเก่ายังเก็บชื่อนี้ไว้ ไม่หาย)\nต้องการลบหรือไม่?')) return;
  arr.splice(i,1); syncConfig(); renderAdmin();
}
function cfgBlock(key,label){
  const arr=cfgArr(key);
  return `<div style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)">
    <div style="font-weight:700;font-size:14px;margin-bottom:6px">${label} <span class="sub">(${arr.length} ตัวเลือก)</span></div>
    ${arr.map((v,i)=>`<div class="grid2" style="grid-template-columns:1fr auto;margin-top:6px">
      <input class="cin tl" value="${(v||'').replace(/"/g,'&quot;')}" onchange="cfgSet('${key}',${i},this.value)">
      <button class="btn ghost sm" style="color:var(--bad)" onclick="cfgDel('${key}',${i})">ลบ</button></div>`).join("")}
    <button class="btn ghost sm" style="margin-top:8px" onclick="cfgAdd('${key}')">＋ เพิ่มตัวเลือก</button>
  </div>`;
}
function cfgCardHTML(){
  return `<div class="card">
    <h3>🎛️ การปรับแต่ง (ตัวเลือกฟอร์มเสมียน)</h3>
    <div class="banner info">ℹ️ <div>แก้ไข/เพิ่ม/ลบตัวเลือกที่นี่ — มีผลกับ dropdown ในฟอร์มของเสมียน (บันทึกรายวัน · รับเข้า · ปิดชุด) ทันที และบันทึกถาวร</div></div>
    ${cfgBlock('source','🏭 แหล่งรับเข้า')}
    ${cfgBlock('death','⚰️ ประเภทการตาย')}
    ${cfgBlock('cull','🔪 ประเภทการคัดขาย')}
    ${cfgBlock('cust','👤 ชื่อลูกค้า')}
  </div>`;
}
// ---- ตารางราคาตามน้ำหนัก (ผู้ดูแลแก้ได้) ----
function priceSet(i,field,val){ if(blockIfReadonly())return; if(PRICE_TABLE[i]){ PRICE_TABLE[i][field]=Math.max(0,Math.round(Number(val)||0)); syncConfig(); } }
function priceAddBand(){ if(blockIfReadonly())return; PRICE_TABLE.push({min:0,cull:0,dead:0}); syncConfig(); renderAdmin(); }
function priceDelBand(i){ if(blockIfReadonly())return; PRICE_TABLE.splice(i,1); syncConfig(); renderAdmin(); }
function priceTableCardHTML(){
  const rows=PRICE_TABLE.map((b,i)=>`<tr>
    <td><input class="cin tl" type="number" value="${Number(b.min)||0}" style="min-width:84px" onchange="priceSet(${i},'min',this.value)"></td>
    <td><input class="cin tl" type="number" value="${Number(b.cull)||0}" style="min-width:84px" onchange="priceSet(${i},'cull',this.value)"></td>
    <td><input class="cin tl" type="number" value="${Number(b.dead)||0}" style="min-width:84px" onchange="priceSet(${i},'dead',this.value)"></td>
    <td><button class="btn ghost sm" style="color:var(--bad)" onclick="priceDelBand(${i})">ลบ</button></td></tr>`).join('');
  return `<div class="card">
    <h3>💰 ตารางราคาตามน้ำหนัก <span class="more">${PRICE_TABLE.length} ช่วง</span></h3>
    <div class="banner info">ℹ️ <div>ราคา/กก. ตามช่วงน้ำหนัก — เวลาเสมียนกรอก <b>คัดขาย / ตาย</b> ระบบเติมราคาให้อัตโนมัติตาม<b>น้ำหนักเฉลี่ย/ตัว</b> (แก้เองได้) · "น้ำหนักต่ำสุด" = น้ำหนักเริ่มต้นของช่วงนั้น</div></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>น้ำหนักต่ำสุด (กก.)</th><th>ราคาคัดขาย (บาท/กก.)</th><th>ราคาตาย (บาท/กก.)</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <button class="btn ghost sm" style="margin-top:8px" onclick="priceAddBand()">＋ เพิ่มช่วงน้ำหนัก</button>
  </div>`;
}

        ${e.note?`<div class="sub" style="margin-top:4px">📝 หมายเหตุ: <b style="color:var(--ink)">${escA(e.note)}</b></div>`:''}

// รายการเล้าในหน้าผู้ดูแล — จัดกลุ่มตามฟาร์ม (แต่ละหลังอยู่ใต้ชื่อฟาร์มนั้น)
function adminHousesByFarmHTML(){
  const farmOf=h=>h.farm||'ไม่ระบุฟาร์ม';
  const known=FARMS.filter(f=>HOUSES.some(h=>farmOf(h)===f));
  const extra=[...new Set(HOUSES.map(farmOf))].filter(f=>!FARMS.includes(f));
  return [...known,...extra].map(f=>{
    const hs=HOUSES.filter(h=>farmOf(h)===f).slice().sort(byCode);
    if(!hs.length) return '';
    return `<div class="farmgroup">
      <div class="farmhead">🏭 ${escA(f)}<span class="fcount">${hs.length} หลัง</span></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>รหัส</th><th>สถานะเล้า</th><th>โซน</th><th>🩺 หมอ</th><th>🧑‍🔧 ผู้ช่วย</th><th>👷 พนักงาน</th><th class="num">ความจุ</th><th class="num">พื้นที่</th><th class="num">🌀 พัดลม</th><th></th></tr></thead>
        <tbody>
          ${hs.map(h=>`<tr>
            <td><b>${escA(h.code||'-')}</b></td><td>${penStatus(h)}</td><td>${escA(h.zone)}</td>
            <td>${h.vet?escA(h.vet):'<span class="tag wait">ยังไม่กำหนด</span>'}</td>
            <td>${h.assistant?escA(h.assistant):'<span class="tag wait">—</span>'}</td>
            <td>${h.worker?escA(h.worker):'<span class="tag wait">—</span>'}</td>
            <td class="num">${fmt(h.cap)}</td>
            <td class="num">${h.area?fmt(h.area):'-'}</td>
            <td class="num">${h.fanTotal||0}</td>
            <td class="num" style="white-space:nowrap">
              <button class="btn ghost sm" style="color:var(--info)" onclick="editHouse(${h.id})">✏️</button>
              <button class="btn ghost sm" style="color:var(--bad)" onclick="removeHouse(${h.id})">ลบ</button></td></tr>`).join("")}
        </tbody>
      </table></div>
    </div>`;
  }).join("");
}

/* ---------- manage house count ---------- */
function nextHouseId(){return HOUSES.reduce((m,h)=>Math.max(m,h.id),0)+1}
function makeHouse(opts){
  const id=nextHouseId();
  return Object.assign({
    id, code:"H"+id, name:"หลัง "+String(id).padStart(3,"0"), farm:FARMS[0], zone:ZONES[id%4],
    cap:450, area:"", fanNo:"", fanSh:"", fanTotal:0, pigs:0, received:0, breed:"ขุน", filled:false, deadToday:0, cullToday:0, soldToday:0,
    sick:0, fcr:"2.40", mortality:"1.0",
    vet:"", assistant:"", worker:"",
    source:"", pigletHistory:"", vaccineHistory:"",
    originVet:"", originAsst:"", originWorker:"", note:"", meds:[], dailyLog:[], vetLog:[]
  }, opts||{});
}
let editHouseId=null;
function editHouse(id){
  const h=HOUSES.find(x=>x.id===id); if(!h) return;
  editHouseId=id;
  $("#newFarm").value=h.farm||FARMS[0];
  $("#newCode").value=h.code||'';
  $("#newZone").value=h.zone||ZONES[0];
  $("#newVet").value=h.vet||'';
  $("#newAsst").value=h.assistant||'';
  $("#newWorker").value=h.worker||'';
  $("#newCap").value=h.cap||'';
  $("#newArea").value=h.area||'';
  $("#newFanNo").value=h.fanNo||'';
  $("#newFanSh").value=h.fanSh||'';
  fanSum();
  $("#newEditNote").value='';
  $("#addHouseBtn").textContent='💾 บันทึกการแก้ไข';
  $("#editNote").innerHTML='<div class="banner info" style="margin-top:10px">✏️ <div>กำลังแก้ไขหลัง <b>'+(h.code||'')+'</b> — แก้แล้วกดบันทึก <a href="#" onclick="cancelEditHouse();return false" style="color:var(--info);font-weight:600"> ยกเลิก</a></div></div>';
  document.querySelector('#view .card').scrollIntoView({block:'start'});
}
function cancelEditHouse(){editHouseId=null;renderAdmin();}
function addHouse(){ if(blockIfReadonly())return;
  const code=$("#newCode").value.trim().toUpperCase();
  const farm=$("#newFarm").value.trim();
  const er=$("#codeErr"); er.style.display="none";
  if(!code){er.textContent="กรุณากรอกรหัสหลัง เช่น A1, B32";er.style.display="block";return}
  if(!farm){er.textContent="กรุณากรอกชื่อฟาร์ม";er.style.display="block";return}
  if(HOUSES.some(h=>(h.code||"").toUpperCase()===code && h.id!==editHouseId)){er.textContent="รหัส \""+code+"\" มีอยู่แล้ว ห้ามซ้ำ";er.style.display="block";return}
  const cap=parseInt($("#newCap").value)||450;
  if(!FARMS.includes(farm)) FARMS.push(farm); // ลงทะเบียนชื่อฟาร์มใหม่ ให้โผล่ในรายการแนะนำ/การจัดกลุ่มทุกหน้า
  const data={code, name:"หลัง "+code, farm, zone:$("#newZone").value,
    vet:$("#newVet").value.trim(), assistant:$("#newAsst").value.trim(), worker:$("#newWorker").value.trim(),
    cap, area:$("#newArea").value.trim(),
    fanNo:$("#newFanNo").value.trim(), fanSh:$("#newFanSh").value.trim(), fanTotal:fanSum()};
  if(editHouseId){
    const h=HOUSES.find(x=>x.id===editHouseId);
    const oldCode=h.code;
    const changes=Object.keys(HOUSE_EDIT_LABELS).filter(k=>String(h[k]||'')!==String(data[k]||''))
      .map(k=>({label:HOUSE_EDIT_LABELS[k],from:h[k]||'(ว่าง)',to:data[k]||'(ว่าง)'}));
    Object.assign(h,data);
    let linkMsg='';
    if(oldCode && oldCode!==data.code){ // เปลี่ยนรหัสหลัง → อัปเดตชุดปิดของหลังนี้ + ลิงก์ย้ายหมูข้ามหลัง (กันลิงก์ขาด)
      (h.closedBatches||[]).forEach(b=>{ if(b.code===oldCode) b.code=data.code; });
      const res=cascadeHouseRename(oldCode,data.code);
      if(res.count>0){ res.houses.forEach(x=>syncHouseClerk(x)); queueSave(); linkMsg=' · อัปเดตลิงก์ย้าย '+res.count+' รายการ'; }
    }
    const note=$("#newEditNote").value.trim();
    if(changes.length||note){h.editLog=h.editLog||[];h.editLog.unshift({time:nowStamp(),ts:Date.now(),by:whoNow(),role:ROLE_LABEL[ROLE]||'ผู้ดูแล',changes,note});}
    syncHouseClerk(h); // ผู้ดูแลแก้ข้อมูลหลัง → เขียนช่อง core+clerk (เก็บประวัติแก้ด้วย)
    toast("แก้ไขหลัง "+code+" แล้ว ("+changes.length+" ช่อง)"+linkMsg); editHouseId=null;
  }else{
    const nh=makeHouse(data); HOUSES.push(nh); syncHouseClerk(nh); syncHouseVet(nh); // หลังใหม่ → สร้างครบ 3 ช่อง
    toast("เพิ่มเล้า "+code+" แล้ว · รวม "+houseCount()+" หลัง");
  }
  syncConfig(); // เผื่อมีฟาร์มใหม่เพิ่มเข้า FARMS → ซิงก์รายชื่อฟาร์ม
  renderAdmin();
}
function removeHouse(id){ if(blockIfReadonly())return;
  const h=HOUSES.find(x=>x.id===id);
  const incN=((h&&h.incoming)||[]).reduce((s,t)=>s+(t.n||0),0);
  if(incN>0){ alert('ลบไม่ได้: หลังนี้มี "หมูระหว่างทาง" รอยืนยันรับเข้า '+fmt(incN)+' ตัว — โปรดยืนยันรับเข้า หรือยกเลิกการย้ายจากหลังต้นทางก่อนลบ (กันหมูหายจากระบบ)'); return; } // กันลบหลังที่ยังมีหมูในระหว่างทาง → หมูหายโดยไม่มีร่องรอย
  const outRef=HOUSES.some(x=>x.id!==id && (x.incoming||[]).some(t=>t.fromId===id)); // หลังนี้ส่งหมูออกไปหลังอื่น ยังรอปลายทางยืนยัน
  if(outRef){ alert('ลบไม่ได้: หลังนี้ "ย้ายออก" หมูไปหลังอื่น และยังรอปลายทางยืนยันรับเข้า — โปรดให้หลังปลายทางยืนยันรับเข้า หรือยกเลิกการย้ายก่อน แล้วจึงลบ (กันบันทึกย้ายค้างชี้หลังที่ถูกลบ)'); return; }
  if(!confirm("ลบ "+(h?h.name:"เล้านี้")+" ?\nข้อมูลของหลังนี้จะถูกนำออก")) return;
  HOUSES=HOUSES.filter(x=>x.id!==id);
  if(CONFIG.supabase.backend==='v2') rpcDeleteHouse(id); // ลบแถวหลังในระบบกลาง (v2)
  queueSave(); // เก็บลงเครื่อง (v1 ยิงทั้งก้อนขึ้นคลาวด์ด้วย)
  toast("ลบแล้ว · เหลือ "+houseCount()+" หลัง");
  renderAdmin();
}
// เริ่มต้นแอป: วันที่ + โหลดข้อมูล (คลาวด์ก่อน ถ้าเปิดใช้ ไม่งั้น localStorage) + เตรียม LINE
(async function(){
  var e=document.getElementById('todayDate'); if(e) e.textContent='📅 '+demoDateLong();
  if(CONFIG.line.enabled && CONFIG.line.liffId){           // โหลด LIFF SDK เฉพาะเมื่อจะใช้ LINE
    try{ await new Promise(function(res,rej){var s=document.createElement('script');s.src='https://static.line-scdn.net/liff/edge/2/sdk.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);}); }catch(_){}
  }
  try{
    if(CONFIG.supabase.enabled && loadSession()){            // เคยล็อกอินไว้ → ตรวจ session แล้วเข้าต่อเลย (ไม่ต้องล็อกอินซ้ำ)
      const t=await supaToken();                             // รีเฟรช token ถ้าใกล้หมดอายุ
      if(t){
        const cl=await cloudLoad();
        if(cl==='stale') saveState();          // คลาวด์เป็นข้อมูลรุ่นเก่า → ใช้ตัวอย่างรุ่นใหม่ (ในหน่วยความจำ) แล้วดันขึ้นคลาวด์
        else if(!cl) loadState();               // โหลดคลาวด์ไม่ได้ → ใช้ข้อมูลในเครื่อง (ถ้ามี)
        if(SUPA) doLogin(appProfile(SUPA.user)); else loadState();
      }   // โหลดข้อมูลกลาง + เข้าแอป (ถ้า session ยังดี)
      else { clearSession(); loadState(); }                  // session หมดอายุ/ใช้ไม่ได้ → กลับหน้าล็อกอิน
    } else {
      loadState();                                           // ยังไม่ล็อกอิน → เตรียมข้อมูลในเครื่อง (ถ้ามี) · หน้าล็อกอินแสดงอยู่
    }
  }catch(err){ console.warn(err); }
  const flushSave=function(){ if(_saveTimer){ clearTimeout(_saveTimer); _saveTimer=null; } saveState(); if(CONFIG.supabase.backend==='v2'){ if(_syncTimer2){ clearTimeout(_syncTimer2); _syncTimer2=null; } flushSyncV2(); } }; // เคลียร์คิว + บันทึกทันที (v2: ดันช่องที่ค้างขึ้นคลาวด์ด้วย keepalive)
  window.addEventListener('beforeunload', flushSave);       // กันข้อมูลหายตอนปิด/รีเฟรช
  window.addEventListener('pagehide', flushSave);            // มือถือ: pagehide เชื่อถือได้กว่า beforeunload
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') flushSave(); }); // สลับแอป/ปิดแท็บบนมือถือ
})();
</script>
