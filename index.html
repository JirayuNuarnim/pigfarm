async function sbMonRefresh(){
  const grid=document.getElementById('sbMonGrid'); if(!grid) return;
  const rows=await sbMonFetch();
  const grid2=document.getElementById('sbMonGrid'); if(!grid2) return;  // ระหว่างรอโหลด ผู้ใช้อาจออกจากหน้านี้แล้ว
  if(rows===null){ grid2.innerHTML='<div class="sub">— ต้องออนไลน์ + ล็อกอินบนคลาวด์ จึงเห็นภาพสด (โหมดพรีวิว/ออฟไลน์ไม่แสดง) —</div>'; }
  else{
    // บัญชีเดียวกันหลายแท่น → ติดหมายเลข "ชื่อ 2, 3" ตามลำดับ (เหมือนดาวหางบนแผนผัง)
    const seen={}, cnt={}, list=[];
    rows.slice().sort((a,b)=>String(a.updated_at||'').localeCompare(String(b.updated_at||''))).forEach(r=>{
      if(!r||!r.user_id) return; const key=r.user_id+':'+(r.session_id||''); if(seen[key]) return; seen[key]=1;
      cnt[r.user_id]=(cnt[r.user_id]||0)+1; list.push({row:r,label:(r.name||'ผู้ใช้')+(cnt[r.user_id]>1?' '+cnt[r.user_id]:'')});
    });
    list.sort((a,b)=>((b.row.bill?1:0)-(a.row.bill?1:0))||String(b.row.updated_at||'').localeCompare(String(a.row.updated_at||'')));
    const act=list.filter(x=>x.row.bill).length;
    const chip=document.getElementById('sbMonChip'); if(chip) chip.textContent='🟢 กำลังกรอก '+fmt(act)+' แท่น · ออนไลน์ '+fmt(list.length)+' เครื่อง';
    grid2.innerHTML=list.length?list.map((x,i)=>sbMonCardHTML(x.row,i,x.label)).join('')
      :'<div class="sub">— ยังไม่มีแท่นไหนเปิดฟอร์มบิลอยู่ตอนนี้ — เมื่อเสมียนเริ่มพิมพ์ การ์ดจะเด้งขึ้นเองใน ~5 วินาที —</div>';
  }

  _sbMonN++;

  if(done){
    const today=todayISO();
    const bills=SALE_BILLS.filter(b=>(b.dateISO||'')===today).sort((a,b)=>((b.editLog&&b.editLog[0]&&b.editLog[0].ts)||b.createdAt||0)-((a.editLog&&a.editLog[0]&&a.editLog[0].ts)||a.createdAt||0));
    done.innerHTML=bills.length?bills.map(b=>{ const c=sbCalc(b),K=SB_KIND[b.kind]||SB_KIND.fatten;
      return `<div class="fieldrow" style="cursor:pointer" onclick="sbEdit('${b.id}')"><div class="fmeta"><div class="fn">${K.ico} <b>${escA(b.farm||'-')}</b> → ${escA(b.buyer||'-')} <span class="more">· ✍️ ${escA(b.by||'-')}${b.editLog&&b.editLog[0]?' · '+escA(b.editLog[0].time||''):''}</span></div>
        <div class="sub" style="margin:3px 0 0">${fmt(c.n)} ตัว · ${fmt(Math.round(c.totW))} กก.${c.net!=null?' · <b style="color:var(--ok)">'+fmt(c.net)+' บาท</b>':(c.pending?' · <span style="color:#b7791f;font-weight:700">⏳ รอใส่ราคา</span>':'')}</div></div>
        ${b.locked?'<span>🔒</span>':''}${b.postedAt?'<span title="ลงเข้าหลังแล้ว">⬇️</span>':''}</div>`; }).join('')

  }
}

function scCanEdit(){ return ROLE==='owner'; }
function scNewBands(){ return SB_BANDS_DEF.map(x=>({a:x[0],b:x[1],cull:'',dead:''})); }
function scAdd(){
  if(!scCanEdit()){ toast('เพิ่ม/แก้ราคาลูกค้าได้เฉพาะบัญชีเจ้าของ'); return; }
  const el=document.getElementById('scNewName'), nm=gNrm(el&&el.value);
  if(!nm){ toast('พิมพ์ชื่อลูกค้าก่อน'); return; }
  if(SB_CUST.some(c=>gNrm(c.name)===nm)){ toast('มีชื่อ "'+nm+'" อยู่แล้ว'); return; }
  SB_CUST.push({name:nm, fatP:'', bands:scNewBands()});
  syncConfig(); logAudit('ลูกค้าแท่นขาย', nm, 'เพิ่มลูกค้า', null, '');
  scSel=SB_CUST.length-1; renderSbCustomers();   // เปิดตารางของเจ้าใหม่ให้เลย
  toast('เพิ่มลูกค้า "'+nm+'" แล้ว — ตั้งราคาได้เลย');
}
function scDel(i){
  if(!scCanEdit()) return; const c=SB_CUST[i]; if(!c) return;
  if(!confirm('ลบลูกค้า "'+c.name+'" พร้อมตารางราคา?')) return;
  SB_CUST.splice(i,1); scSel=null; syncConfig(); logAudit('ลูกค้าแท่นขาย', c.name, 'ลบลูกค้า', null, '');
  renderSbCustomers(); toast('ลบแล้ว');
}
function scSet(i,bi,f,v){
  if(!scCanEdit()) return; const c=SB_CUST[i]; if(!c) return;
  if(f!=='name'){ // ช่องราคา: เว้นว่างได้ · ตัวเลขเท่านั้น · ห้ามติดลบ (กันเผลอพิมพ์ค่าประหลาดแล้วไหลไปทั้งระบบ)
    v=String(v==null?'':v).trim();
    if(v!==''){ const n=parseFloat(v); v=(isFinite(n)&&n>=0)?String(n):''; }
  }
  if(bi<0) c[f]=v; else if(c.bands[bi]) c.bands[bi][f]=v;
  syncConfig();
}
function scRename(i){ // ✏️ เปลี่ยนชื่อลูกค้า — ตารางราคาอยู่ครบ (บิลเก่ายังใช้ชื่อเดิม · บิลใหม่พิมพ์ชื่อใหม่แล้วราคาตามปกติ)
  if(!scCanEdit()){ toast('เปลี่ยนชื่อได้เฉพาะบัญชีเจ้าของ'); return; }
  const c=SB_CUST[i]; if(!c) return;
  const nm=gNrm(prompt('เปลี่ยนชื่อลูกค้า "'+c.name+'" เป็น:', c.name)||'');
  if(!nm||nm===c.name) return;
  if(SB_CUST.some((x,xi)=>xi!==i&&gNrm(x.name)===nm)){ toast('มีชื่อ "'+nm+'" อยู่แล้ว'); return; }
  const old=c.name; c.name=nm; syncConfig();
  logAudit('ลูกค้าแท่นขาย', nm, 'เปลี่ยนชื่อลูกค้า', [{label:'ชื่อ',from:old,to:nm}], '');
  renderSbCustomers(); toast('เปลี่ยนชื่อเป็น "'+nm+'" แล้ว — ตารางราคาอยู่ครบ');
}
function scCopyFrom(i){ // คัดลอกราคาจากเจ้าอื่นมาเป็นตัวตั้งต้น
  if(!scCanEdit()) return; const c=SB_CUST[i]; if(!c) return;
  const others=SB_CUST.filter((x,xi)=>xi!==i&&(x.bands||[]).some(b=>b.cull!==''||b.dead!==''));
  if(!others.length){ toast('ยังไม่มีเจ้าอื่นที่ตั้งราคาไว้'); return; }
  const nm=prompt('คัดลอกราคาจากเจ้าไหน?\n'+others.map(o=>'· '+o.name).join('\n'), others[0].name);
  const src=nm&&others.find(o=>gNrm(o.name)===gNrm(nm)); if(!src){ toast('ไม่พบชื่อนั้น'); return; }
  c.bands=JSON.parse(JSON.stringify(src.bands)); if(src.fatP!==''&&src.fatP!=null) c.fatP=src.fatP;
  syncConfig(); renderSbCustomers(); toast('คัดลอกราคาจาก '+src.name+' แล้ว — แก้ต่อได้');
}
let scSel=null; // เจ้าที่กำลังเปิดตารางราคา (null = หน้ารายชื่อทั้งหมด)
function scOpen(i){ scSel=i; renderSbCustomers(); }
function scBack(){ scSel=null; renderSbCustomers(); }
function scSummary(c){ // ป้ายสรุปบนการ์ดชื่อ: ตั้งราคาแล้วกี่ช่วง + ราคาขุน
  const n=(c.bands||[]).filter(b=>(b.cull!==''&&b.cull!=null)||(b.dead!==''&&b.dead!=null)).length;
  const p=[]; if(n) p.push('ช่วงราคา '+fmt(n)+'/'+(c.bands||[]).length); if(c.fatP!==''&&c.fatP!=null) p.push('ขุน '+c.fatP+' ฿');
  return p.length?p.join(' · '):'ยังไม่ได้ตั้งราคา';
}

      <div class="frow" style="max-width:340px;margin-bottom:10px"><label>🐖 ราคาหมูขุน (฿/กก.) — เว้นว่างได้</label>

  const bill30=(function(){ try{ const m={}; sbGraphBuyers().list.forEach(o=>m[gNrm(o.name)]=o); return m; }catch(e){ return {}; } })();

  $("#view").innerHTML=head+`

      ${canE?`<div style="display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:4px">
        <input id="scNewName" class="cin" list="sbBuyerDL" placeholder="ชื่อลูกค้าใหม่ เช่น เฮียมลชัย" style="max-width:260px" onkeydown="if(event.key==='Enter'){event.preventDefault();scAdd();}">

        <datalist id="sbBuyerDL">${[...new Set(SALE_BILLS.map(b=>b.buyer).filter(Boolean).concat(CUSTOMERS))].map(x=>`<option value="${escA(x)}">`).join('')}</datalist>
      </div>`:''}
    </div>
    <div class="card">
      <h3>👥 ลูกค้าทั้งหมด <span class="more">${fmt(SB_CUST.length)} เจ้า · กดชื่อเพื่อเปิดตารางราคา</span></h3>
      <div class="homelist">${chips||'<div class="sub">— ยังไม่มีลูกค้าในทะเบียน '+(canE?'— เพิ่มเจ้าแรกด้านบนได้เลย':'')+' —</div>'}</div>

/* ---------- 💡 จำราคาผู้ซื้อรายเดิม + ⧉ คัดลอกบิล (ตัวช่วยเสมียนขายเจ้าเดิมทุกวัน) ---------- */
function sbBuyerPrefill(){ // พิมพ์ชื่อผู้ซื้อแล้ว → เติมราคาให้เอง: ①ทะเบียนลูกค้า (เจ้าของตั้ง) ②บิลล่าสุดของเจ้านั้น (เฉพาะช่องว่าง — แก้ทับได้เสมอ)
  if(!SB_D) return; const name=gNrm(SB_D.buyer); if(!name) return;
  const reg=SB_CUST.find(c=>gNrm(c.name)===name);
  const past=SALE_BILLS.filter(b=>b.id!==SB_D.id&&gNrm(b.buyer)===name&&b.kind===SB_D.kind)
    .sort((a,b)=>String(b.dateISO||'').localeCompare(String(a.dateISO||'')));
  if(SB_D.kind==='deadcull'){
    let filled=0, srcLabel='';
    const fillFrom=(bands,label)=>{ if(!Array.isArray(bands)) return;
      (SB_D.bands||[]).forEach(bd=>{ const s=bands.find(x=>x&&x.a===bd.a); if(!s) return;
        if((bd.cull===''||bd.cull==null)&&s.cull!==''&&s.cull!=null){ bd.cull=s.cull; filled++; srcLabel=srcLabel||label; }
        if((bd.dead===''||bd.dead==null)&&s.dead!==''&&s.dead!=null){ bd.dead=s.dead; filled++; srcLabel=srcLabel||label; } }); };
    if(reg) fillFrom(reg.bands,'ทะเบียนลูกค้า');
    const srcBill=past.find(b=>(b.bands||[]).some(x=>x&&((x.cull!==''&&x.cull!=null)||(x.dead!==''&&x.dead!=null))));
    if(srcBill) fillFrom(srcBill.bands,'บิลล่าสุด');
    if(filled){ sbRefresh(); toast('💡 เติมราคาของ '+name+' จาก'+srcLabel+' ('+filled+' ช่อง) — แก้ทับได้'); }
  } else {
    if(SB_D.pricePerKg!==''&&SB_D.pricePerKg!=null) return;
    let price=null, label='';
    if(reg&&reg.fatP!==''&&reg.fatP!=null){ price=reg.fatP; label='ทะเบียนลูกค้า'; }
    else { const src=past.find(b=>b.pricePerKg!==''&&b.pricePerKg!=null); if(src){ price=src.pricePerKg; label='บิล '+sbThaiDate(src.dateISO); } }
    if(price==null) return;
    SB_D.pricePerKg=price;
    const el=document.getElementById('sbPriceIn'); if(el) el.value=price;
    sbRefresh(); toast('💡 เติมราคา/กก. ของ '+name+' ('+price+' บาท จาก'+label+') — แก้ทับได้');
  }
}
function sbDuplicate(id){ // คัดลอกบิลเดิม → บิลใหม่วันนี้ (คงผู้ซื้อ/รถ/ฟาร์ม/หลัง/ราคา · ล้างน้ำหนัก-ตาชั่ง-เลขที่ ให้กรอกของวันนี้)
  if(blockIfReadonly())return; if(!sbCanWrite()){ toast('บัญชีนี้สร้างบิลไม่ได้'); return; }
  if(!sbDraftGuard()) return;
  const src=SALE_BILLS.find(x=>x.id===id); if(!src){ toast('ไม่พบบิลต้นฉบับ'); return; }
  const b=JSON.parse(JSON.stringify(src));
  b.id=sbNewId(); b.dateISO=todayISO(); b.time=''; b.billNo='';
  b.weights=[]; b.items=(b.kind==='deadcull'?[{house:'',type:'dead',w:''}]:[]);
  b.scaleIn=''; b.scaleOut=''; b.deducts=[]; b.note=''; b.editLog=[];
  b.by=whoNow(); b.createdAt=Date.now();
  delete b.postedAt; delete b.postedHouses; delete b.postedBy; delete b._synced; delete b._baseTs; delete b.locked; delete b.verifiedBy; delete b.verifiedAt; b.timeStart=''; b.timeEnd='';
  if(b.kind!=='deadcull') b.houses=(src.houses||[]).map(h=>({code:h.code,n:''})); // คงรายชื่อหลัง แต่จำนวนตัวกรอกใหม่
  SB_D=b; SB_ISNEW=true; renderSaleBillForm();
  toast('⧉ คัดลอกบิล '+(src.buyer||'-')+' แล้ว — ราคาเดิมติดมาให้ กรอกน้ำหนักของวันนี้ได้เลย');
}
function sbSave(){
  if(blockIfReadonly())return; if(!sbCanWrite()){toast('บัญชีนี้บันทึกบิลขายไม่ได้');return;}
  if(!SB_D) return;
  const stored=SALE_BILLS.find(x=>x.id===SB_D.id);
  if(stored&&stored.locked&&!['owner','admin'].includes(ROLE)){ toast('🔒 บิลนี้ถูกตรวจ/ล็อกแล้ว — แก้ไขได้เฉพาะเจ้าของ/ผู้ดูแล'); return; }
  if(!SB_D.farm){ toast('เลือกฟาร์มก่อน'); return; }
  if((SB_D.dateISO||'')>todayISO() && !confirm('⚠️ วันที่ขายในบิลเป็นวันอนาคต ('+sbThaiDate(SB_D.dateISO)+')\nถ้าลงเข้าหลังด้วยวันที่อนาคต ยอดคงเหลือของหลังจะคำนวณเพี้ยน\n\nยืนยันใช้วันที่นี้ต่อหรือไม่?')) return;
  const c=sbCalc(SB_D);
  if(SB_D.kind==='deadcull'){
    SB_D.items=(SB_D.items||[]).filter(x=>sbNum(x.w)>0);
    if(!SB_D.items.length){ toast('ยังไม่มีรายการหมู (ใส่น้ำหนักอย่างน้อย 1 ตัว)'); return; }
    const odd=SB_D.items.filter(x=>sbNum(x.w)<1||sbNum(x.w)>300).map(x=>x.w);
    if(odd.length&&!confirm('⚠️ พบน้ำหนักที่ดูผิดปกติ: '+odd.join(', ')+' กก.\nบันทึกต่อหรือไม่?')) return;
  }
  else if(!(SB_D.weights||[]).length){ toast('ยังไม่ได้กรอกน้ำหนักรายตัว'); return; }
  if(SB_ISNEW){ // 🛡️ เตือนบิลซ้ำ: วันเดียวกัน+ผู้ซื้อเดียวกัน+ (เลขที่ตรง หรือ ตัว/น้ำหนักแทบเท่ากัน)
    const dup=SALE_BILLS.find(x=>x.id!==SB_D.id&&x.kind===SB_D.kind&&(x.farm||'')===(SB_D.farm||'')&&gNrm(x.buyer)===gNrm(SB_D.buyer)&&(x.dateISO||'')===(SB_D.dateISO||'')
      &&((SB_D.billNo&&x.billNo===SB_D.billNo)||(function(){const oc=sbCalc(x);return oc.n===c.n&&Math.abs(oc.totW-c.totW)<1;})()));
    if(dup&&!confirm('⚠️ พบบิลที่คล้ายกันมากในระบบ (วันเดียวกัน · ผู้ซื้อเดียวกัน'+(dup.billNo?' · เลขที่ '+dup.billNo:'')+' · '+fmt(sbCalc(dup).n)+' ตัว)\nอาจเป็นบิลซ้ำ — ยืนยันบันทึกต่อหรือไม่?')) return;
  }
  { // 🛡️ กันขายเกินยอดเล้า — จำนวนในบิลมากกว่าหมูคงเหลือของหลัง ต้องเตือนให้คนยืนยันก่อน (ยอดเล้าอาจยังไม่อัปเดต จึงเตือนแรงแต่ไม่บล็อกตาย)
    // ⚠️ ต้องอยู่ "ก่อน" filter ด้านล่าง — ถ้า user กดยกเลิกเพื่อกลับไปแก้ SB_D ต้องไม่ถูก mutate (index แถวบนจอกับใน SB_D จะเพี้ยน ค่าที่พิมพ์หายเงียบ)
    const ov=sbOverList(SB_D);
    if(ov.length&&!confirm('⛔ จำนวนหมูในบิลมากกว่ายอดคงเหลือของเล้า!\n\n'+ov.map(o=>'• หลัง '+o.code+': ลงขาย '+fmt(o.n)+' ตัว แต่เล้าเหลือ '+fmt(o.remain)+' ตัว').join('\n')+'\n\nเช็คเลขหลังและจำนวนกับหน้าเล้าอีกครั้ง\nถ้ายืนยันว่าตัวเลขถูกต้อง (เช่น เล้ายังไม่ได้ลงบันทึกวันนี้) กด "ตกลง" เพื่อบันทึกต่อ')) return;
  }
  SB_D.houses=(SB_D.houses||[]).filter(x=>x.code);
  SB_D.deducts=(SB_D.deducts||[]).filter(x=>x.ref||sbNum(x.amt));
  // 🕘 ประวัติแก้ไขรายช่อง — ตรวจสอบย้อนหลังได้ว่าใครแก้อะไรจากค่าไหนเป็นค่าไหน
  let changes=[];
  if(!SB_ISNEW&&stored){
    const oc=sbCalc(stored);
    const F=[['ผู้ซื้อ',stored.buyer,SB_D.buyer],['ทะเบียนรถ',stored.truck,SB_D.truck],['วันที่',stored.dateISO,SB_D.dateISO],
      ['เล่มที่',stored.billBook,SB_D.billBook],['เลขที่',stored.billNo,SB_D.billNo],['ราคา/กก.',stored.pricePerKg,SB_D.pricePerKg],
      ['จำนวนตัว',oc.n,c.n],['น้ำหนักรวม',Math.round(oc.totW*10)/10,Math.round(c.totW*10)/10],
      ['รถเบา',stored.scaleIn,SB_D.scaleIn],['รถหนัก',stored.scaleOut,SB_D.scaleOut],
      ['ยอดสุทธิ',(oc.net==null?'รอราคา':fmt(oc.net)),(c.net==null?'รอราคา':fmt(c.net))]];
    changes=F.filter(f=>String(f[1]==null?'':f[1])!==String(f[2]==null?'':f[2]))
      .map(f=>({label:f[0],from:String(f[1]==null||f[1]===''?'-':f[1]),to:String(f[2]==null||f[2]===''?'-':f[2])}));
    const bandCh=(stored.bands||[]).reduce((k,bd,i)=>{const nb=(SB_D.bands||[])[i]||{};
      return k+((String(bd.cull==null?'':bd.cull)!==String(nb.cull==null?'':nb.cull))?1:0)+((String(bd.dead==null?'':bd.dead)!==String(nb.dead==null?'':nb.dead))?1:0);},0);
    if(bandCh) changes.push({label:'ราคาช่วงน้ำหนัก',from:'-',to:'แก้ '+bandCh+' ช่อง'});
  }
  SB_D.editLog=SB_D.editLog||[];
  SB_D.editLog.unshift({time:nowStamp(),ts:Date.now(),by:whoNow(),role:ROLE_LABEL[ROLE]||'-',changes:changes,note:(SB_ISNEW?'สร้างบิล':'แก้ไขบิล')+(c.pending?' (ยังไม่ใส่ราคา)':'')});
  const i=SALE_BILLS.findIndex(x=>x.id===SB_D.id);
  if(i>=0){ if(stored){ SB_D.locked=stored.locked; SB_D.verifiedBy=stored.verifiedBy; SB_D.verifiedAt=stored.verifiedAt; } SALE_BILLS[i]=SB_D; }
  else SALE_BILLS.unshift(SB_D);
  syncSaleBill(SB_D);
  logAudit('บิลขาย', SB_D.id, SB_ISNEW?'สร้างบิลขาย':'แก้ไขบิลขาย', changes.length?changes:null, (SB_D.farm||'')+' · '+(SB_KIND[SB_D.kind]||{}).t+' · '+(SB_D.buyer||'-')+' · '+fmt(c.n)+' ตัว '+fmt(Math.round(c.totW))+' กก.'+(c.net!=null?' · '+fmt(c.net)+' บาท':' · รอใส่ราคา'));
  sbDraftDrop(); sbLiveClear();
  toast('บันทึกบิลแล้ว ✓'+(c.pending?' — ติดป้ายรอใส่ราคาให้เจ้าของ':''));
  SB_D=null; renderSaleStand();
}
function sbDelete(id){
  if(!['owner','admin'].includes(ROLE)){ toast('ลบได้เฉพาะเจ้าของ/ผู้ดูแล'); return; }
  const b=SALE_BILLS.find(x=>x.id===id); if(!b) return;
  if(!confirm('ลบบิลขายวันที่ '+sbThaiDate(b.dateISO)+' ('+(b.buyer||'-')+') ?'+(b.postedAt?'\n⚠️ บิลนี้ลงเข้าหลังแล้ว — ระบบจะถอนบันทึกออกจากหลังให้ด้วย':'')+'\nการลบถูกบันทึกในประวัติกันโกง')) return;
  if(b.postedAt) sbUnpost(b.id);
  SALE_BILLS=SALE_BILLS.filter(x=>x.id!==id); delete _dirtySB[id]; sbPersist(); // เอาออกจากคิวซิงก์ด้วย — กันบิลที่เพิ่งลบถูกดันกลับขึ้นคลาวด์
  if(CONFIG.supabase.enabled&&CONFIG.supabase.backend==='v2'){ supaFetch('/rest/v1/rpc/delete_sale_bill',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({p_id:id})}); }
  logAudit('บิลขาย', id, 'ลบบิลขาย', null, (b.farm||'')+' · '+(b.buyer||'-'));
  toast('ลบบิลแล้ว'); SB_D=null; renderSaleStand();
}
/* ---------- ✅ ตรวจ + ล็อกบิล (เจ้าของ/ผู้ดูแล) — บิลที่ตรวจแล้วเสมียนแก้ไม่ได้ · ทุกการล็อก/ปลดลง audit ---------- */
function sbVerify(id){
  if(!['owner','admin'].includes(ROLE)){ toast('ตรวจ/ล็อกบิลได้เฉพาะเจ้าของ/ผู้ดูแล'); return; }
  const b=SALE_BILLS.find(x=>x.id===id); if(!b) return;
  if(!confirm('✅ ยืนยันว่าตรวจบิลนี้ถูกต้องแล้ว และล็อกกันการแก้ไข?\n(เสมียนจะแก้บิลนี้ไม่ได้อีก · เจ้าของ/ผู้ดูแลปลดล็อกได้)')) return;
  b.locked=true; b.verifiedBy=whoNow(); b.verifiedAt=nowStamp();
  b.editLog=b.editLog||[]; b.editLog.unshift({time:nowStamp(),ts:Date.now(),by:whoNow(),role:ROLE_LABEL[ROLE]||'-',note:'✅ ตรวจแล้ว · ล็อกบิล'});
  syncSaleBill(b); logAudit('บิลขาย', id, 'ตรวจ/ล็อกบิล', null, (b.farm||'')+' · '+(b.buyer||'-'));
  toast('✅ ตรวจและล็อกบิลแล้ว'); SB_D=null; renderSaleStand();
}
function sbVerifyAfterSave(id){ sbSave(); if(SB_D===null&&SALE_BILLS.some(x=>x.id===id)) sbVerify(id); } // บันทึกก่อน ตรวจสำเร็จเฉพาะเมื่อบันทึกผ่าน

/* ---------- ⬇️ ลงบิลเข้าบันทึกประจำหลัง (จับรหัสหลังในบิล → dailyLog + ตัดคงเหลือ) ----------
   · แถวที่สร้างติดธง _fromBill = id บิล → กดลงซ้ำ = แทนที่ของเดิม (ไม่ลงซ้อน) · ลบบิล = ถอนแถวออกให้ด้วย
   · ขุน/พันธุ์: น้ำหนักต่อหลัง = เฉลี่ยทั้งคัน × จำนวนตัวของหลังนั้น (บิลจริงไม่แยกน้ำหนักรายหลัง)

function sbBillRef(b){ const r=(b.billBook?b.billBook+'/':'')+(b.billNo||''); return r||'-'; }
function sbRowUid(){ return 'sb'+Date.now()+'_'+Math.round(Math.random()*1e6); }
function sbFindHouse(code,farm){ // บิลระบุฟาร์ม = จับคู่เฉพาะหลังในฟาร์มนั้น (กันรหัสซ้ำข้ามฟาร์ม เช่น A1 มีหลายฟาร์ม → ตัดสต็อกผิดหลัง) · เทียบแบบ normalize ("J.40 "→"J40") ให้ตรงกับ guard กันเกินยอด
  const n0=sbNormCode(code); if(!n0) return null;

  return HOUSES.find(y=>sbNormCode(y.code)===n0)||null;
}
function sbBandVal(b,items,type){ // มูลค่ารวมของหมูกลุ่มนี้ตามช่วงราคา · null = มีช่วงที่ยังไม่ใส่ราคา
  let v=0;
  for(const x of items){ const bd=(b.bands||[])[sbBandIdx(b,sbNum(x.w))]; const r=bd&&bd[type];
    if(r===''||r==null) return null; v+=sbNum(x.w)*sbNum(r); }
  return v;
}
function sbPostRowsFor(b){ // เตรียมแถว dailyLog ต่อหลัง (ยังไม่แตะข้อมูลจริง)
  const c=sbCalc(b), dThai=isoToThaiDay(b.dateISO), ref=sbBillRef(b), buyer=b.buyer||'-';
  const base={date:dThai, by:whoNow(), remain:0,
    deadType:'',deadN:0,deadW:0,deadP:0,deadCust:'-',deadBill:'-',
    cullType:'',cullN:0,cullW:0,cullP:0,cullCust:'-',cullBill:'-',
    soldN:0,soldW:0,soldP:0,soldCust:'-',soldBill:'-',
    moveN:0,moveW:0,moveDest:'',moveNote:'', dead:0,outN:0,avg:0,value:0, cust:'-',bill:'-', _fromBill:b.id};
  const rows=[], miss=[];
  const r1=v=>Math.round(v*10)/10;
  if(b.kind==='deadcull'){
    const g={};
    (b.items||[]).forEach(x=>{ if(!x.house||!sbNum(x.w)) return; (g[x.house]=g[x.house]||{cull:[],dead:[]})[x.type==='cull'?'cull':'dead'].push(x); });
    Object.keys(g).forEach(code=>{
      const H=sbFindHouse(code,b.farm); if(!H){ miss.push(code); return; }
      const e=Object.assign({},base,{rowId:sbRowUid()});
      const dd=g[code].dead, cc=g[code].cull;
      if(dd.length){ e.deadN=dd.length; e.deadW=r1(dd.reduce((s,x)=>s+sbNum(x.w),0));
        const v=sbBandVal(b,dd,'dead'); e.deadP=(v!=null&&e.deadW)?+(v/e.deadW).toFixed(2):0;
        e.deadType='ตาย'; e.deadCust=buyer; e.deadBill=ref; }
      if(cc.length){ e.cullN=cc.length; e.cullW=r1(cc.reduce((s,x)=>s+sbNum(x.w),0));
        const v=sbBandVal(b,cc,'cull'); e.cullP=(v!=null&&e.cullW)?+(v/e.cullW).toFixed(2):0;
        e.cullType='คัดขาย'; e.cullCust=buyer; e.cullBill=ref; }
      e.dead=e.deadN; e.outN=e.cullN; e.value=(e.deadW*e.deadP)+(e.cullW*e.cullP);
      rows.push({code:code,H:H,e:e});
    });
  }else{
    const price=(b.pricePerKg===''||b.pricePerKg==null)?0:sbNum(b.pricePerKg);
    (b.houses||[]).forEach(x=>{ const n=parseInt(x.n)||0; if(!x.code||!n) return;
      const H=sbFindHouse(x.code,b.farm); if(!H){ miss.push(x.code); return; }
      const e=Object.assign({},base,{rowId:sbRowUid()});
      e.soldN=n; e.soldW=r1(c.avg*n); e.soldP=price; e.soldCust=buyer; e.soldBill=ref;
      e.outN=n; e.avg=+(c.avg.toFixed(1)); e.value=Math.round(e.soldW*e.soldP);

}
function sbUnpost(billId,quiet){ // ถอนแถวที่ลงจากบิลนี้ออกจากทุกหลัง (ใช้ตอนลงซ้ำ/ลบบิล)
  let n=0;
  HOUSES.forEach(h=>{
    const L=h.dailyLog||[]; const keep=L.filter(e=>!(e&&e._fromBill===billId));
    if(keep.length!==L.length){ n+=L.length-keep.length; h.dailyLog=keep; recalcDailyRemains(h);
      if(!quiet){ logHouseEdit(h,[{label:'บิลแท่นขาย',from:'ลงแล้ว',to:'ถอนออก'}],'ถอนบันทึกจากบิลแท่นขาย'); }
      syncHouseClerk(h); }
  });
  return n;
}
function sbPostToHouses(id){

    const dup=(r.H.dailyLog||[]).some(e=>e&&e.date===dThai&&e._fromBill!==b.id&&((r.e.soldN&&e.soldN)||(r.e.deadN&&e.deadN)||(r.e.cullN&&e.cullN)));

  if(!confirm(msg)) return;
  // 🛡️ แทนที่ "รายหลังแบบทั้งก้อน" — หลังไหนลงไม่ผ่าน แถวเดิมของหลังนั้นคงอยู่ครบ (เดิมถอนทุกหลังก่อนแล้วค่อยลง → หลังที่ fail แถวเก่าหายถาวร)

    h.dailyLog=merged; recalcDailyRemains(h);

  (b.houses||[]).forEach(x=>{ const age=sbAgeDays(x.code,b.farm);
    const H=HOUSES.find(y=>y.code===x.code&&(!b.farm||(y.farm||'')===b.farm))||HOUSES.find(y=>y.code===x.code)||{};
    noteLines.push('หลัง '+escA(x.code)+' = '+fmt(parseInt(x.n)||0)+' ตัว'+((age||H.vet)?' ('+(age?age+' วัน':'')+(H.vet?(age?' / ':'')+escA(H.vet):'')+')':'')); });
  if(sbNum(b.fastPen)>0||sbNum(b.fastStand)>0) noteLines.push('อดอาหารในเล้า '+sbNum(b.fastPen)+' ชม. · ที่แท่น '+sbNum(b.fastStand)+' ชม.');
  if(c.scaleNet!=null) noteLines.push('นน.รายตัว'+(c.diff>=0?'มากกว่า':'น้อยกว่า')+'ตาชั่งรถ '+fmt(Math.abs(c.diff))+' กก.'+(c.n?' ('+(Math.abs(c.diff)/c.n).toFixed(2)+' กก./ตัว)':''));
  (b.deducts||[]).forEach(d=>noteLines.push('หัก: '+escA(d.ref||'-')+' = '+fmt(sbNum(d.amt))+' บาท'));
  if(b.note) noteLines.push('หมายเหตุ: '+escA(b.note));
  const sumR=(k,v,u,big)=>'<tr><td style="padding:3px 6px;font-size:13px;white-space:nowrap">'+k+'</td>'
    +'<td style="border-bottom:1px dotted #666;text-align:right;font-weight:800;font-size:'+(big?'15px':'13.5px')+';padding:3px 8px">'+v+'</td>'
    +'<td style="font-size:12px;padding:3px 2px;width:38px">'+u+'</td></tr>';
  let right='<table style="width:100%;border-collapse:collapse">';
  if(b.kind==='deadcull'){
    const nc=(b.items||[]).filter(x=>x.type==='cull').length, nd=(b.items||[]).length-nc;
    right+=sumR('จำนวนตัว (คัดขาย / ตาย)',fmt(nc)+' / '+fmt(nd),'ตัว');
  }
  right+=sumR('จำนวนหมูรวม',fmt(c.n),'ตัว')
    +sumR('น้ำหนักรวมสุทธิ',fmt(Math.round(c.totW*10)/10),'กก.')
    +sumR('น้ำหนักเฉลี่ย',c.n?c.avg.toFixed(2):'-','กก.');
  if(b.kind!=='deadcull') right+=sumR('ราคา/กก.',(b.pricePerKg===''||b.pricePerKg==null)?PEND:fmt(sbNum(b.pricePerKg)),'บาท');
  right+=sumR('จำนวนเงินรวม',c.gross!=null?fmt(c.gross):PEND,'บาท');
  if(c.deduct) right+=sumR('หักส่วนลด/ลดบิล','-'+fmt(c.deduct),'บาท');
  right+=sumR('จำนวนเงินสุทธิ',c.net!=null?fmt(c.net):PEND,'บาท',true)+'</table>';
  h+='<table style="width:100%;border-collapse:collapse"><tr>'
    +'<td style="'+BD+';vertical-align:top;width:54%;padding:6px 9px"><div style="font-size:13px;font-weight:800;margin-bottom:3px">หมายเหตุ :</div>'
    +(noteLines.length?noteLines.map(x=>'<div style="font-size:13px;margin:2.5px 0">'+x+'</div>').join(''):'<div style="font-size:13px;color:#999">—</div>')+'</td>'
    +'<td style="'+BD+';vertical-align:top;padding:6px 9px">'+right+'</td></tr></table>';
  // ── รถ + ตาชั่ง ──
  h+='<table style="width:100%;border-collapse:collapse;margin-top:7px"><tr>'
    +'<td style="'+BD+';font-size:13px;padding:4px 9px">ทะเบียนรถขนส่ง: <b>'+escA(b.truck||'-')+'</b></td>'
    +'<td style="'+BD+';font-size:13px;padding:4px 9px;text-align:center">รถเบา: <b>'+(sbNum(b.scaleIn)?fmt(sbNum(b.scaleIn)):'-')+'</b></td>'
    +'<td style="'+BD+';font-size:13px;padding:4px 9px;text-align:center">รถหนัก: <b>'+(sbNum(b.scaleOut)?fmt(sbNum(b.scaleOut)):'-')+'</b></td>'
    +'<td style="'+BD+';font-size:13px;padding:4px 9px;text-align:center">สุทธิ: <b>'+(c.scaleNet!=null?fmt(c.scaleNet):'-')+'</b> กก.</td></tr></table>';
  // ── ลายเซ็น ──
  h+='<table style="width:100%;margin-top:30px;border-collapse:collapse"><tr>'
    +'<td style="text-align:center;font-size:13px;padding:6px">ผู้รับของ ...............................................</td>'
    +'<td style="text-align:center;font-size:13px;padding:6px">ผู้ส่งของ ..........'+escA(b.by||'')+'..........</td></tr></table>';
  return h;
}
/* ---------- หน้าดูบิลในเว็บ + พิมพ์ A4 / PDF ---------- */
let SB_PRINT_B=null;
function sbPrintObj(b){
  if(!b) return;
  SB_PRINT_B=b;
  let ov=document.getElementById('sbPrintOverlay'); if(ov) ov.remove();
  ov=document.createElement('div'); ov.id='sbPrintOverlay';
  ov.innerHTML='<div class="sbp-tools">'
    +'<button class="btn sm" onclick="window.print()">🖨 พิมพ์ / บันทึก PDF (A4)</button>'
    +'<button class="btn ghost sm" onclick="sbExportXlsObj(SB_PRINT_B)">📊 Excel</button>'
    +'<button class="btn ghost sm" onclick="sbPrintClose()">✕ ปิด</button></div>'
    +'<div id="sbPrintPage">'+sbBillPaperHTML(b)+'</div>';
  ov.addEventListener('click',function(e){ if(e.target===ov) sbPrintClose(); });
  document.body.appendChild(ov);
}
function sbPrint(id){ const b=SALE_BILLS.find(x=>x.id===id); if(!b){ toast('ไม่พบบิล'); return; } sbPrintObj(b); }
function sbPrintClose(){ const ov=document.getElementById('sbPrintOverlay'); if(ov) ov.remove(); SB_PRINT_B=null; }
/* ---------- ส่งออกบิลขายเป็น Excel รายบิล (หน้าตาเหมือนบิลกระดาษ · ปริ๊นจาก Excel ได้เลย) ---------- */
function sbExportXls(id){ const b=SALE_BILLS.find(x=>x.id===id); if(!b){ toast('ไม่พบบิล'); return; } sbExportXlsObj(b); }
function sbExportXlsObj(b){
  const c=sbCalc(b), K=SB_KIND[b.kind]||SB_KIND.fatten;
  const meta=[
    {k:'บริษัท',v:'เอสเจเอฟ ฟาร์ม (SJF Farm)'},
    {k:'ประเภท',v:K.t},
    {k:'วันที่ขาย',v:sbThaiDate(b.dateISO)},
    {k:'ฟาร์ม',v:b.farm||'-'},
    {k:'ผู้ซื้อ',v:b.buyer||'-'},
    {k:'ทะเบียนรถ',v:b.truck||'-'},
    {k:'บิลกระดาษ',v:(b.billBook||b.billNo)?('เล่มที่ '+(b.billBook||'-')+' เลขที่ '+(b.billNo||'-')):'-'},
    {k:'ผู้บันทึก',v:b.by||'-'},
    {k:'ออกเอกสาร',v:DEMO_DATE_SHORT+' โดย '+((CURRENT_USER&&CURRENT_USER.name)||'-')}
  ];
  if(b.note) meta.push({k:'หมายเหตุ',v:b.note});
  const PEND='รอใส่ราคา';
  const sumRows=[
    ['จำนวนหมู', c.n, 'ตัว'],
    ['น้ำหนักรวม (รายตัว)', Math.round(c.totW*10)/10, 'กก.'],
    ['น้ำหนักเฉลี่ย/ตัว', c.n?Math.round(c.avg*100)/100:'', 'กก.']
  ];
  if(sbNum(b.scaleIn)>0&&sbNum(b.scaleOut)>0){
    sumRows.push(['ตาชั่งรถ — รถเบา', sbNum(b.scaleIn), 'กก.'],
      ['ตาชั่งรถ — รถหนัก', sbNum(b.scaleOut), 'กก.'],
      ['ตาชั่งรถ — สุทธิ', c.scaleNet, 'กก.'],
      ['ผลต่าง รายตัว − ตาชั่งรถ', c.diff, 'กก.']);
  }
  if(sbNum(b.fastPen)>0) sumRows.push(['อดอาหารในเล้า', sbNum(b.fastPen), 'ชม.']);
  if(sbNum(b.fastStand)>0) sumRows.push(['อดอาหารที่แท่น', sbNum(b.fastStand), 'ชม.']);
  if(b.kind!=='deadcull') sumRows.push(['ราคา/กก.', (b.pricePerKg===''||b.pricePerKg==null)?PEND:sbNum(b.pricePerKg), 'บาท']);
  sumRows.push(['ยอดเงินรวม', c.gross!=null?c.gross:PEND, 'บาท']);
  if(c.deduct) sumRows.push(['หัก/ลดบิล', -c.deduct, 'บาท']);
  sumRows.push(['ยอดสุทธิ', c.net!=null?c.net:PEND, 'บาท']);
  const sheets=[{name:'บิล A4', html:sbBillPaperHTML(b)},
    {name:'สรุปบิล', html:xlsSheet({title:'บิลขายหมู — '+K.t+' · '+(b.farm||'')+' → '+(b.buyer||'-'),
    meta:meta, columns:[{label:'รายการ',w:200},{label:'ค่า',type:'dec',w:120},{label:'หน่วย',w:70}], rows:sumRows})}];
  if((b.houses||[]).length){
    sheets.push({name:'แยกหลัง', html:xlsSheet({title:'มาจากหลังไหนบ้าง',
      columns:[{label:'หลัง',w:100},{label:'จำนวน (ตัว)',type:'num',w:95},{label:'อายุ (วัน)',type:'num',w:85},{label:'หมอผู้ดูแล',w:130}],
      rows:b.houses.map(h=>{ const H=HOUSES.find(x=>x.code===h.code&&(!b.farm||(x.farm||'')===b.farm))||HOUSES.find(x=>x.code===h.code)||{};
        return [h.code, parseInt(h.n)||'', sbAgeDays(h.code,b.farm)||'', H.vet||'']; }),
      totals:['รวม', c.houseN, '', '']})});
  }
  if(b.kind==='deadcull'){
    sheets.push({name:'รายการหมู', html:xlsSheet({title:'รายการหมู (ทีละตัว)',
      columns:[{label:'ลำดับ',type:'num',w:60},{label:'หลัง',w:90},{label:'ประเภท',w:90},{label:'น้ำหนัก (กก.)',type:'dec',w:105}],
      rows:(b.items||[]).map((x,i)=>[i+1, x.house||'-', x.type==='cull'?'คัดขาย':'ตาย', sbNum(x.w)]),
      totals:['','','รวม', Math.round(c.totW*10)/10]})});
    const bandRows=(b.bands||[]).map((bd,i)=>{ const ag=c.bandAgg[i]||{cullW:0,deadW:0}; if(!(ag.cullW||ag.deadW)) return null;
      return [bd.a+'–'+bd.b,
        ag.cullW?Math.round(ag.cullW*10)/10:'', ag.cullW?((bd.cull===''||bd.cull==null)?PEND:sbNum(bd.cull)):'', (ag.cullW&&bd.cull!==''&&bd.cull!=null)?Math.round(ag.cullW*sbNum(bd.cull)):'',
        ag.deadW?Math.round(ag.deadW*10)/10:'', ag.deadW?((bd.dead===''||bd.dead==null)?PEND:sbNum(bd.dead)):'', (ag.deadW&&bd.dead!==''&&bd.dead!=null)?Math.round(ag.deadW*sbNum(bd.dead)):''];
    }).filter(Boolean);
    sheets.push({name:'ช่วงราคา', html:xlsSheet({title:'ราคาตามช่วงน้ำหนัก (แยกคัดขาย/ตาย)',
      columns:[{label:'ช่วง นน. (กก.)',w:105},{label:'คัดขาย (กก.)',type:'dec',w:95},{label:'ราคาคัด/กก.',type:'dec',w:90},{label:'เงินคัด (บาท)',type:'num',w:105},{label:'ตาย (กก.)',type:'dec',w:90},{label:'ราคาตาย/กก.',type:'dec',w:90},{label:'เงินตาย (บาท)',type:'num',w:105}],
      rows:bandRows,
      totals:['รวม', Math.round((c.bandAgg||[]).reduce((s,a)=>s+a.cullW,0)*10)/10, '', c.gross!=null?(b.bands||[]).reduce((s,bd,i)=>{const ag=c.bandAgg[i]||{cullW:0};return s+((ag.cullW&&bd.cull!==''&&bd.cull!=null)?Math.round(ag.cullW*sbNum(bd.cull)):0);},0):'', Math.round((c.bandAgg||[]).reduce((s,a)=>s+a.deadW,0)*10)/10, '', c.gross!=null?(b.bands||[]).reduce((s,bd,i)=>{const ag=c.bandAgg[i]||{deadW:0};return s+((ag.deadW&&bd.dead!==''&&bd.dead!=null)?Math.round(ag.deadW*sbNum(bd.dead)):0);},0):'']})});
  }else{
    // กริดน้ำหนักรายตัวแบบบิลกระดาษ: ไล่ลงทีละคอลัมน์ คอลัมน์ละ 10 ตัว + แถวรวมท้ายคอลัมน์
    const ws=b.weights||[], CC=Math.max(1,Math.ceil(ws.length/10));
    const cols=[]; for(let j=0;j<CC;j++){ cols.push({label:'ตัว',type:'num',w:45},{label:'นน.',type:'dec',w:65}); }
    const rows=[]; for(let r=0;r<10;r++){ const row=[]; for(let j=0;j<CC;j++){ const idx=j*10+r; row.push(idx<ws.length?idx+1:'', idx<ws.length?sbNum(ws[idx]):''); } rows.push(row); }
    const tot=[]; for(let j=0;j<CC;j++){ let s=0; for(let r=0;r<10;r++){ const idx=j*10+r; if(idx<ws.length) s+=sbNum(ws[idx]); } tot.push('รวม', s?Math.round(s*10)/10:''); }
    sheets.push({name:'น้ำหนักรายตัว', html:xlsSheet({title:'น้ำหนักรายตัว (ไล่ลงทีละคอลัมน์ เหมือนบิลกระดาษ)', columns:cols, rows:rows, totals:tot})});
  }
  if((b.deducts||[]).length){
    sheets.push({name:'หัก-ลดบิล', html:xlsSheet({title:'รายการหัก/ลดบิล',
      columns:[{label:'อ้างอิง',w:240},{label:'จำนวนเงิน (บาท)',type:'num',w:130}],
      rows:b.deducts.map(d=>[d.ref||'-', sbNum(d.amt)]), totals:['รวม', c.deduct]})});
  }
  const fname=('บิลขาย_'+K.t+'_'+(b.farm||'ฟาร์ม')+'_'+(b.dateISO||'')+(b.billNo?('_เลขที่'+b.billNo):'')).replace(/[\\\/:*?"<>|]/g,'-')+'.xls';
  downloadXlsMulti(fname, sheets);
  toast('ส่งออกบิลเป็น Excel แล้ว ✓ (เปิดแล้วสั่งพิมพ์ได้เลย)');
}
// เริ่มต้นแอป: วันที่ + โหลดข้อมูล (คลาวด์ก่อน ถ้าเปิดใช้ ไม่งั้น localStorage) + เตรียม LINE
(async function(){
  var e=document.getElementById('todayDate'); if(e) e.textContent='📅 '+demoDateLong();
  if(CONFIG.line.enabled && CONFIG.line.liffId){           // โหลด LIFF SDK เฉพาะเมื่อจะใช้ LINE
    try{ await new Promise(function(res,rej){var s=document.createElement('script');s.src='https://static.line-scdn.net/liff/edge/2/sdk.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);}); }catch(_){}
  }
  try{
    if(CONFIG.supabase.enabled && loadSession()){            // เคยล็อกอินไว้ → ตรวจ session แล้วเข้าต่อเลย (ไม่ต้องล็อกอินซ้ำ)
      const t=await supaToken();                             // รีเฟรช token ถ้าใกล้หมดอายุ
      if(t){
        const cl=await cloudLoad();
        if(cl==='stale') saveState();          // คลาวด์เป็นข้อมูลรุ่นเก่า → ใช้ตัวอย่างรุ่นใหม่ (ในหน่วยความจำ) แล้วดันขึ้นคลาวด์
        else if(!cl) loadState();               // โหลดคลาวด์ไม่ได้ → ใช้ข้อมูลในเครื่อง (ถ้ามี)
        if(SUPA) doLogin(appProfile(SUPA.user)); else loadState();
      }   // โหลดข้อมูลกลาง + เข้าแอป (ถ้า session ยังดี)
      else { clearSession(); loadState(); }                  // session หมดอายุ/ใช้ไม่ได้ → กลับหน้าล็อกอิน
    } else {
      loadState();                                           // ยังไม่ล็อกอิน → เตรียมข้อมูลในเครื่อง (ถ้ามี) · หน้าล็อกอินแสดงอยู่
    }
  }catch(err){ console.warn(err); }
  const flushSave=function(){ if(_saveTimer){ clearTimeout(_saveTimer); _saveTimer=null; } saveState(); if(CONFIG.supabase.backend==='v2'){ if(_syncTimer2){ clearTimeout(_syncTimer2); _syncTimer2=null; } flushSyncV2(); } }; // เคลียร์คิว + บันทึกทันที (v2: ดันช่องที่ค้างขึ้นคลาวด์ด้วย keepalive)
  window.addEventListener('beforeunload', flushSave);       // กันข้อมูลหายตอนปิด/รีเฟรช
  window.addEventListener('pagehide', flushSave);            // มือถือ: pagehide เชื่อถือได้กว่า beforeunload
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') flushSave(); }); // สลับแอป/ปิดแท็บบนมือถือ
})();
</script>
